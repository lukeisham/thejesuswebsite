# nginx-http.conf — http-context directives for thejesuswebsite.org
#
# Include this snippet from the nginx http {} block (e.g. in
# /etc/nginx/conf.d/thejesuswebsite-http.conf or directly in nginx.conf).
# These directives are only valid at the http level, not inside a server block.
#
# Reload with: sudo nginx -t && sudo systemctl reload nginx

# ── Rate-limit zones (shared across all server blocks) ─────────────────────────
# api: 10 req/s per IP with burst of 20 (absorbs floods before Node)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# conn_per_ip: max 10 concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ── Page-level CSP map (only applied to HTML responses) ────────────────────────
# Mirrors api/middleware/security-headers.js for the HTML documents that the
# API middleware can't reach. 'unsafe-inline' on script-src/style-src matches
# the page-boot inline <script> blocks and zoom-variant <style> overrides
# across the static frontend and admin panel.
map $sent_http_content_type $page_csp {
    ~text/html  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'";
}

# ── Gzip compression ─────────────────────────────────────────────────
gzip on;
gzip_types text/html text/css application/javascript application/json image/svg+xml text/xml application/xml;
gzip_min_length 1024;
gzip_vary on;
