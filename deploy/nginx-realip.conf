# nginx-realip.conf — resolve the true client IP behind Cloudflare
#
# Include this file in your nginx http {} block (alongside nginx-http.conf)
# so that $remote_addr becomes the actual visitor IP validated against
# Cloudflare's published ranges, not Cloudflare's edge IP.
#
# Why this matters: without real-IP resolution, every visitor arriving via
# Cloudflare shares a handful of Cloudflare edge IPs. This means:
#   - req.ip in Express always sees a Cloudflare IP, not the visitor's
#   - GeoIP country lookups return nothing (100% "Unknown")
#   - Rate limiting is shared across all visitors instead of per-visitor
#   - ip_hash is effectively shared across all visitors
#
# The set_real_ip_from directive only trusts the X-Forwarded-For / CF-Connecting-IP
# header when the connecting peer is inside Cloudflare's published IP ranges,
# preventing IP spoofing by anyone who reaches the origin server directly.
#
# IMPORTANT: Refresh these ranges periodically from:
#   https://www.cloudflare.com/ips-v4/
#   https://www.cloudflare.com/ips-v6/

# Cloudflare IPv4 ranges
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# Cloudflare IPv6 ranges
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# Use the Cloudflare-provided header for the original client IP
real_ip_header CF-Connecting-IP;

# Recursive search ensures the real IP is found even through multiple proxies
real_ip_recursive on;
