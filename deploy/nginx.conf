# nginx.conf — production server block for thejesuswebsite.org
#
# Place in /etc/nginx/sites-available/thejesuswebsite and symlink to
# sites-enabled. Reload with: sudo nginx -t && sudo systemctl reload nginx
#
# This config:
#   1. Terminates TLS (cert paths are placeholders — replace per VPS)
#   2. Redirects HTTP → HTTPS, and www → the bare apex domain
#   3. Serves the static frontend with try_files (extensionless URLs)
#   4. Proxies /api/ to the Node process (stripping the /api prefix)
#   5. Proxies /mcp to the MCP server (Streamable HTTP endpoint for AI agents)
#   6. Sets HTML-page security headers (CSP, HSTS, frame guard, etc.)
#   7. Applies rate/connection limiting per IP (absorbs floods before Node)
#
# Depends on: public-api-rate-limiting.md / setup/nginx-hardening.md
#
# Canonical origin: passkey login/registration (api/routes/passkey.js) checks
# clientData.origin against ORIGIN in .env (https://thejesuswebsite.org) with
# an exact string match — WebAuthn requires this. If both the apex and `www`
# hosts served content on the same origin block, a user landing on
# https://www.thejesuswebsite.org would register or sign in under a different
# origin than ORIGIN expects, and every assertion would fail with "Client
# data did not match the challenge." even though the passkey itself is valid.
# Every request is therefore redirected to the bare apex domain before it
# reaches the app, so only one origin is ever presented to the browser.

# ── Rate-limit zones (define in http block if not already present) ────────────
# limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
# limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

server {
    listen 80;
    server_name thejesuswebsite.org www.thejesuswebsite.org;
    return 301 https://thejesuswebsite.org$request_uri;
}

# https://www.thejesuswebsite.org → https://thejesuswebsite.org (canonical
# origin — see note above). Must come before the apex server block since
# nginx matches server_name exactly.
server {
    listen 443 ssl http2;
    server_name www.thejesuswebsite.org;

    ssl_certificate     /etc/letsencrypt/live/thejesuswebsite.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thejesuswebsite.org/privkey.pem;

    return 301 https://thejesuswebsite.org$request_uri;
}

server {
    listen 443 ssl http2;
    server_name thejesuswebsite.org;

    # ── TLS (replace paths with actual cert locations) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/thejesuswebsite.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thejesuswebsite.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml text/xml application/xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Document root — the static frontend ────────────────────────────────────
    root /var/www/thejesuswebsite/frontend;
    index index.html;

    # ── Page-level security headers are defined as a http-context map in
    # deploy/nginx-http.conf (the `map` directive is not valid inside a server
    # block). Include that snippet from your nginx http {} block to populate
    # the $page_csp variable used below.

    # ── /mcp — MCP Streamable HTTP endpoint ──────────────────────────────────
    # Proxies to the MCP server process on port 3100. Reuses the same rate-
    # limit zone as /api/ since both serve public read-only data. The
    # proxy_read_timeout is generous because MCP servers hold connections
    # open for SSE (Server-Sent Events).
    location /mcp {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn_per_ip 10;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # ── /api/ — proxy to the Node process ──────────────────────────────────────
    # The trailing slash in proxy_pass strips /api, so the Node server still sees
    # its bare routes (/evidence, /search, etc.). Tests and server code unchanged.
    location /api/ {
        # Rate and connection limiting (absorbs floods before Node)
        limit_req zone=api burst=20 nodelay;
        limit_conn conn_per_ip 10;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Don't buffer JSON responses
        proxy_buffering off;
    }

    # ── /uploads/ — static uploaded files (served directly by nginx) ──────────
    location /uploads/ {
        alias /var/www/thejesuswebsite/public/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── /assets/js/ and /assets/css/ — plain (unhashed) filenames, so a deploy
    # can't bust the cache by changing the URL. Cache briefly and require
    # revalidation (ETag/Last-Modified) so bugfixes reach returning visitors
    # within the hour instead of being stuck behind a year-long immutable
    # cache. This location must come before the /assets/ block below — nginx
    # prefers a matching regex location over a plain prefix location.
    location ~* ^/assets/(?:js|css)/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # ── /assets/images/maps/ — generator-regenerated SVGs at stable URLs; the
    # old sketch maps sat unreachable behind the 1-year immutable cache after
    # the real-geography regeneration. Short cache + revalidation, with ?v=
    # query versioning (maps.image_path) as the hard cache-buster.
    location ~* ^/assets/images/maps/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # ── /assets/ — remaining static assets (images, fonts): long cache ─────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Redirect old /evidence/single/ URLs to /evidence/ (permanent)
    location ^~ /evidence/single/ {
        rewrite ^/evidence/single/(.*)$ /evidence/$1 permanent;
    }

    # ── / — everything else: static files with try_files ──────────────────────
    # try_files resolves extensionless URLs by trying $uri.html and
    # $uri/index.html before falling back to 404.html. This is what makes
    # generated detail pages (e.g. /evidence/pilate-stone) work
    # without a rewrite rule per content type.
    location / {
        try_files $uri $uri.html $uri/index.html /404.html;

        # HTML responses get the page-level CSP and other security headers
        add_header Content-Security-Policy $page_csp always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Link "</llms.txt>; rel=\"llms.txt\"" always;

        # Cache static HTML lightly (1 min) so deploys are visible quickly.
        # This header is also the edge-cache contract with Cloudflare: a
        # dashboard Cache Rule (Caching → Cache Rules, scoped to exclude
        # /api/* and /admin/*) honours this max-age, so HTML served from
        # Cloudflare's edge goes stale and re-fetches origin within the same
        # 60s window a direct-to-origin request would. Deploy visibility stays
        # bounded by max-age=60 regardless of whether a given request is an
        # edge HIT or reaches origin directly — see
        # setup/PLANS/New/3-cloudflare-html-edge-caching.md.
        add_header Cache-Control "public, max-age=60" always;
    }

    # ── /.well-known/ — ACME challenge, Apple passkey association, API catalog ──
    # The `^~` prefix ensures this location takes priority over the regex dotfile
    # deny rule below, so certbot can complete its HTTP-01 challenge and Safari
    # can fetch the apple-app-site-association file.
    location ^~ /.well-known/ {
        location = /.well-known/api-catalog {
            default_type application/linkset+json;
        }
        location = /.well-known/mcp/server-card.json {
            default_type application/json;
        }
    }

    # ── Deny access to dotfiles ────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── /admin/ — admin panel (static HTML, all data behind authenticated API) ─
    # Served as a sibling directory alongside the frontend. The admin panel is
    # static HTML with all data behind the authenticated API, so serving it
    # publicly exposes no data — see Issues.md for sign-off on exposure.
    location /admin/ {
        alias /var/www/thejesuswebsite/admin/;
        index index.html;
        try_files $uri $uri.html $uri/index.html =404;

        add_header Content-Security-Policy $page_csp always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    }
}
