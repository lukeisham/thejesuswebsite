[package]
name    = "app_ui"
version.workspace = true
edition.workspace = true
default-run = "app_ui"

[dependencies]
app_core    = { path = "../app_core" }
app_brain   = { path = "../app_brain" }
app_storage = { path = "../app_storage" }

# Workspace-managed
serde       = { workspace = true }
serde_json  = { workspace = true }
tokio       = { workspace = true }
async-trait = { workspace = true }
thiserror   = { workspace = true }
tracing     = { workspace = true }
uuid        = { workspace = true }

# Crate-specific: Web server
axum             = { version = "0.7", features = ["ws", "macros"] }
futures          = "0.3"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
tower-http       = { version = "0.5", features = ["fs", "trace", "cors", "timeout"] }
tower            = { version = "0.4", features = ["util"] }
dotenvy          = "0.15"
rand             = "0.8"
lettre           = { version = "0.11", features = ["builder", "smtp-transport", "tokio1", "tokio1-native-tls"] }
sqlx             = { version = "0.7", features = ["runtime-tokio", "sqlite", "macros"] }
chrono           = { workspace = true }

# Crate-specific: WASM bindings (login.rs)
wasm-bindgen         = "0.2"
wasm-bindgen-futures = "0.4"
serde-wasm-bindgen   = "0.6"
