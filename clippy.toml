# --- Gold-Standard Clippy Configuration ---

# Max complexity of a single function (cyclomatic complexity)
# Prevents functions in agent.rs or api.rs from becoming "spaghetti"
cognitive-complexity-threshold = 20

# Maximum lines in a function. Encourages breaking code into 
# smaller, testable modules (like your trait_template.rs)
msrv = "1.85.0"
too-many-lines-threshold = 100

# Limits for function arguments. If you need more, use a Struct.
too-many-arguments-threshold = 7

# Disallow specific types that might be "code smells" in your architecture
# For example, forcing the use of your custom 'types' crate over raw Strings
disallowed-types = [
    # { path = "std::collections::HashMap", reason = "Use DashMap for thread-safe UI state if needed" },
]

# Ensure doc comments are consistent across the workspace
doc-valid-idents = [
    "OpenAI",
    "ChromaDB",
    "AppBrain",
    "AppUI",
    "Websocket",
]

# Formatting and naming consistency
enum-variant-name-threshold = 3
struct-field-name-threshold = 3