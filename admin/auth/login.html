<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin Sign In — The Jesus Website</title>
        <link rel="stylesheet" href="login.css" />
        <script defer src="../assets/js/passkey.js"></script>
    </head>
    <body>
        <main>
            <div class="auth-card">
                <h1>Admin Sign In</h1>

                <p class="auth-card__description">
                    Sign in with your registered passkey to access the admin
                    panel.
                </p>

                <button type="button" id="login-btn" class="auth-card__button">
                    Sign in with Passkey
                </button>

                <div
                    id="status"
                    class="auth-card__status"
                    role="status"
                    aria-live="polite"
                ></div>
            </div>
        </main>

        <script>
            (function () {
                const button = document.getElementById("login-btn");
                const status = document.getElementById("status");

                // Show a signed-out confirmation when arriving from the Logout link.
                if (
                    new URLSearchParams(window.location.search).get(
                        "signedout",
                    ) === "1"
                ) {
                    showMessage("You've been signed out.", "success");
                }

                button.addEventListener("click", async () => {
                    button.disabled = true;
                    showMessage("Contacting your authenticator…", "loading");

                    try {
                        await Passkey.loginWithPasskey();

                        showMessage(
                            "Sign in successful — redirecting…",
                            "success",
                        );
                        window.location.href = "../index.html";
                    } catch (error) {
                        showMessage(error.message, "error");
                        button.disabled = false;
                    }
                });

                function showMessage(message, type) {
                    status.className =
                        "auth-card__status auth-card__status--" + type;
                    status.textContent = message;
                }
            })();
        </script>
    </body>
</html>
