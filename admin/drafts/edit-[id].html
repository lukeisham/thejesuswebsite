<!DOCTYPE html>
<html lang="en" class="admin-app">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Draft — Admin</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <script defer src="../assets/js/auth.js"></script>
  <script defer src="../assets/js/admin.js"></script>
  <style>
    .admin-form-actions {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-lg);
      padding-top: var(--space-md);
      border-top: 1px solid var(--admin-border-light);
    }
    .admin-form-card {
      background: var(--admin-surface);
      border: 1px solid var(--admin-border-light);
      border-radius: var(--admin-radius);
      padding: var(--space-lg);
    }
    .admin-form-card__title {
      font-size: 13px;
      font-weight: 600;
      color: var(--admin-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: var(--space-md);
    }
    .admin-checkbox-group {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .admin-checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--admin-accent);
    }
    .admin-checkbox-group label {
      font-size: 14px;
      color: var(--admin-text-primary);
      cursor: pointer;
    }
    .admin-error {
      padding: var(--space-md);
      color: var(--admin-danger);
      background: rgba(220,53,69,0.08);
      border: 1px solid rgba(220,53,69,0.2);
      border-radius: var(--admin-radius);
      margin-bottom: var(--space-md);
    }
    .admin-loading {
      padding: var(--space-xl);
      text-align: center;
      color: var(--admin-text-muted);
      font-size: 14px;
    }
    .admin-delete-section {
      margin-top: var(--space-xl);
      padding-top: var(--space-md);
      border-top: 1px solid var(--admin-danger);
    }
  </style>
</head>
<body>
<div class="admin-shell">

  <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
  <nav class="admin-sidebar" aria-label="Admin navigation">
    <div class="admin-sidebar__brand">⚡ Admin</div>
    <div class="admin-sidebar__nav">
      <a class="admin-sidebar__link" href="../index.html">
        <span class="admin-sidebar__icon">📊</span> Dashboard
      </a>
      <a class="admin-sidebar__link admin-sidebar__link--active" href="index.html">
        <span class="admin-sidebar__icon">📝</span> Drafts
      </a>
      <a class="admin-sidebar__link" href="../evidence/index.html">
        <span class="admin-sidebar__icon">📋</span> Evidence
      </a>
      <a class="admin-sidebar__link" href="../collections/index.html">
        <span class="admin-sidebar__icon">📁</span> Collections
      </a>
      <a class="admin-sidebar__link" href="../resources/index.html">
        <span class="admin-sidebar__icon">📚</span> Resources
      </a>
      <a class="admin-sidebar__link" href="../wikipedia/index.html">
        <span class="admin-sidebar__icon">📖</span> Wikipedia
      </a>
      <a class="admin-sidebar__link" href="../essays/index.html">
        <span class="admin-sidebar__icon">✍️</span> Essays
      </a>
      <a class="admin-sidebar__link" href="../debate/index.html">
        <span class="admin-sidebar__icon">🗣️</span> Debate
      </a>
      <a class="admin-sidebar__link" href="../debate/popular-challenges/index.html">
        <span class="admin-sidebar__icon">📢</span> Popular Challenges
      </a>
      <a class="admin-sidebar__link" href="../debate/academic-challenges/index.html">
        <span class="admin-sidebar__icon">🎓</span> Academic Challenges
      </a>
      <a class="admin-sidebar__link" href="../historiography/index.html">
        <span class="admin-sidebar__icon">🏛️</span> Historiography
      </a>
      <a class="admin-sidebar__link" href="../blog/index.html">
        <span class="admin-sidebar__icon">📰</span> Blog
      </a>
      <a class="admin-sidebar__link" href="../news/index.html">
        <span class="admin-sidebar__icon">📡</span> News
      </a>
      <a class="admin-sidebar__link" href="../diagrams/maps.html">
        <span class="admin-sidebar__icon">🗺️</span> Maps Editor
      </a>
      <a class="admin-sidebar__link" href="../analytics.html">
        <span class="admin-sidebar__icon">📈</span> Analytics
      </a>
      <a class="admin-sidebar__link" href="../settings/index.html">
        <span class="admin-sidebar__icon">⚙️</span> Settings
      </a>
    </div>
    <div class="admin-sidebar__bottom">
      <a class="admin-sidebar__link" href="../auth/login.html">
        <span class="admin-sidebar__icon">🚪</span> Logout
      </a>
    </div>
  </nav>

  <!-- ── Topbar ───────────────────────────────────────────────────────── -->
  <header class="admin-topbar">
    <h1 class="admin-topbar__title">Edit Draft</h1>
    <div class="admin-topbar__actions">
      <a class="admin-btn admin-btn--sm admin-btn--ghost" href="index.html">← Back to Drafts</a>
    </div>
  </header>

  <!-- ── Main Content ─────────────────────────────────────────────────── -->
  <main class="admin-main" id="edit-content">
    <div class="admin-loading" role="status">Loading draft…</div>
  </main>

</div>

<script>
  (async function () {
    const main = document.getElementById('edit-content');

    const ok = await AdminAuth.requireSession();
    if (!ok) {
      main.innerHTML = '<div class="admin-error" role="alert">Unable to verify session. Please check your connection and try again.</div>';
      return;
    }

    // Read id from query string
    const params = new URLSearchParams(window.location.search);
    const draftId = params.get('id');
    const draftType = params.get('type') || 'evidence';

    if (!draftId) {
      main.innerHTML = '<div class="admin-error" role="alert">No draft ID specified. Go back to <a href="index.html">Drafts</a>.</div>';
      return;
    }

    let data;
    try {
      // Load admin detail based on type
      if (draftType === 'evidence') {
        data = await Admin.api.get('/evidence/admin/' + draftId);
      } else {
        main.innerHTML = '<div class="admin-error" role="alert">Editing drafts of type "' + draftType + '" is not yet supported here. <a href="index.html">Go back to Drafts</a>.</div>';
        return;
      }
    } catch (err) {
      main.innerHTML = '<div class="admin-error" role="alert">Failed to load draft: ' + err.message + '</div>';
      return;
    }

    if (!data) {
      main.innerHTML = '<div class="admin-error" role="alert">Draft not found. <a href="index.html">Go back to Drafts</a>.</div>';
      return;
    }

    // Build the edit form
    main.innerHTML = '';

    var formError = document.createElement('div');
    formError.className = 'admin-error';
    formError.style.display = 'none';
    formError.setAttribute('role', 'alert');
    formError.setAttribute('aria-live', 'assertive');
    formError.id = 'form-error';
    main.appendChild(formError);

    var form = document.createElement('form');
    form.className = 'admin-form-grid';
    form.id = 'edit-draft-form';
    form.setAttribute('novalidate', '');

    // Helper to create form-group
    function formGroup(label, id, inputHtml) {
      var div = document.createElement('div');
      div.className = 'admin-form-group';
      var lbl = document.createElement('label');
      lbl.className = 'admin-form-group__label';
      lbl.setAttribute('for', id);
      lbl.innerHTML = label;
      div.appendChild(lbl);
      div.insertAdjacentHTML('beforeend', inputHtml);
      return div;
    }

    // Left column
    var leftCol = document.createElement('div');
    leftCol.className = 'admin-form-grid__main';

    var contentCard = document.createElement('div');
    contentCard.className = 'admin-form-card';

    var contentTitle = document.createElement('div');
    contentTitle.className = 'admin-form-card__title';
    contentTitle.textContent = 'Content';
    contentCard.appendChild(contentTitle);

    contentCard.appendChild(formGroup('Title <span aria-hidden="true">*</span>', 'draft-title',
      '<input class="admin-input" id="draft-title" name="title" type="text" required value="' + (data.title || '').replace(/"/g, '&quot;') + '" aria-describedby="title-error">' +
      '<span class="admin-form-hint" id="title-error" style="display:none;color:var(--admin-danger)" role="alert"></span>'
    ));

    contentCard.appendChild(formGroup('Slug <span aria-hidden="true">*</span>', 'draft-slug',
      '<input class="admin-input" id="draft-slug" name="slug" type="text" required value="' + (data.slug || '').replace(/"/g, '&quot;') + '" aria-describedby="slug-error">' +
      '<span class="admin-form-hint" id="slug-error" style="display:none;color:var(--admin-danger)" role="alert"></span>'
    ));

    contentCard.appendChild(formGroup('Description', 'draft-description',
      '<textarea class="admin-textarea" id="draft-description" name="description" rows="10">' + (data.description || '') + '</textarea>'
    ));

    contentCard.appendChild(formGroup('Primary Verse', 'draft-primary-verse',
      '<input class="admin-input" id="draft-primary-verse" name="primary_verse" type="text" value="' + (data.primary_verse || '').replace(/"/g, '&quot;') + '">'
    ));

    contentCard.appendChild(formGroup('Secondary Verse', 'draft-secondary-verse',
      '<input class="admin-input" id="draft-secondary-verse" name="secondary_verse" type="text" value="' + (data.secondary_verse || '').replace(/"/g, '&quot;') + '">'
    ));

    leftCol.appendChild(contentCard);
    form.appendChild(leftCol);

    // Right column
    var rightCol = document.createElement('div');
    rightCol.className = 'admin-form-grid__sidebar';

    // Classification card
    var classCard = document.createElement('div');
    classCard.className = 'admin-form-card';

    var classTitle = document.createElement('div');
    classTitle.className = 'admin-form-card__title';
    classTitle.textContent = 'Classification';
    classCard.appendChild(classTitle);

    var gospelCats = ['', 'birth', 'baptism', 'temptation', 'ministry', 'miracles', 'parables', 'passion', 'crucifixion', 'resurrection', 'ascension'];
    var gospelLabels = ['— None —', 'Birth / Nativity', 'Baptism', 'Temptation', 'Ministry', 'Miracles', 'Parables', 'Passion', 'Crucifixion', 'Resurrection', 'Ascension'];
    var gospelOpts = gospelCats.map(function (v, i) {
      return '<option value="' + v + '"' + (v === (data.gospel_category || '') ? ' selected' : '') + '>' + gospelLabels[i] + '</option>';
    }).join('');

    classCard.appendChild(formGroup('Gospel Category', 'draft-gospel-category',
      '<select class="admin-select" id="draft-gospel-category" name="gospel_category">' + gospelOpts + '</select>'
    ));

    var eras = ['', 'beginning', 'patriarchs', 'exodus', 'conquest', 'judges', 'kingdom', 'exile', 'return', 'intertestamental', 'jesus-life', 'early-church'];
    var eraLabels = ['— None —', 'Beginning', 'Patriarchs', 'Exodus', 'Conquest', 'Judges', 'Kingdom', 'Exile', 'Return', 'Intertestamental', 'Life of Jesus', 'Early Church'];
    var eraOpts = eras.map(function (v, i) {
      return '<option value="' + v + '"' + (v === (data.timeline_era || '') ? ' selected' : '') + '>' + eraLabels[i] + '</option>';
    }).join('');

    classCard.appendChild(formGroup('Timeline Era', 'draft-timeline-era',
      '<select class="admin-select" id="draft-timeline-era" name="timeline_era">' + eraOpts + '</select>'
    ));

    classCard.appendChild(formGroup('Timeline Period', 'draft-timeline-period',
      '<input class="admin-input" id="draft-timeline-period" name="timeline_period" type="text" value="' + (data.timeline_period || '').replace(/"/g, '&quot;') + '">'
    ));

    rightCol.appendChild(classCard);

    // Map & metadata card
    var mapCard = document.createElement('div');
    mapCard.className = 'admin-form-card';
    mapCard.style.marginTop = 'var(--space-md)';

    var mapTitle = document.createElement('div');
    mapTitle.className = 'admin-form-card__title';
    mapTitle.textContent = 'Map & Metadata';
    mapCard.appendChild(mapTitle);

    mapCard.appendChild(formGroup('Map Location', 'draft-map-location',
      '<input class="admin-input" id="draft-map-location" name="map_location" type="text" value="' + (data.map_location || '').replace(/"/g, '&quot;') + '">'
    ));

    var coordsDiv = document.createElement('div');
    coordsDiv.className = 'admin-form-group';
    coordsDiv.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:var(--space-sm)';
    coordsDiv.innerHTML =
      '<div><label class="admin-form-group__label" for="draft-map-x">Map X</label><input class="admin-input" id="draft-map-x" name="map_x" type="number" step="any" value="' + (data.map_x != null ? data.map_x : '') + '"></div>' +
      '<div><label class="admin-form-group__label" for="draft-map-y">Map Y</label><input class="admin-input" id="draft-map-y" name="map_y" type="number" step="any" value="' + (data.map_y != null ? data.map_y : '') + '"></div>';
    mapCard.appendChild(coordsDiv);

    mapCard.appendChild(formGroup('Keywords', 'draft-keywords',
      '<input class="admin-input" id="draft-keywords" name="metadata_keywords" type="text" value="' + (data.metadata_keywords || '').replace(/"/g, '&quot;') + '">'
    ));

    rightCol.appendChild(mapCard);

    // Publish toggle card
    var pubCard = document.createElement('div');
    pubCard.className = 'admin-form-card';
    pubCard.style.marginTop = 'var(--space-md)';

    var pubGroup = document.createElement('div');
    pubGroup.className = 'admin-form-group';
    pubGroup.innerHTML =
      '<div class="admin-checkbox-group">' +
      '<input type="checkbox" id="draft-publish" name="published_draft" value="1"' + (data.published_draft ? ' checked' : '') + '>' +
      '<label for="draft-publish">Published</label>' +
      '</div>' +
      '<span class="admin-form-hint" style="margin-top:var(--space-xs)">Toggle to publish or unpublish this draft.</span>';
    pubCard.appendChild(pubGroup);

    rightCol.appendChild(pubCard);

    form.appendChild(rightCol);
    main.appendChild(form);

    // Action buttons
    var actions = document.createElement('div');
    actions.className = 'admin-form-actions';

    var saveBtn = document.createElement('button');
    saveBtn.type = 'button';
    saveBtn.className = 'admin-btn admin-btn--primary';
    saveBtn.id = 'btn-save';
    saveBtn.textContent = 'Save Changes';

    var publishBtn = document.createElement('button');
    publishBtn.type = 'button';
    publishBtn.className = 'admin-btn admin-btn--secondary';
    publishBtn.id = 'btn-toggle-publish';
    publishBtn.textContent = data.published_draft ? 'Unpublish' : 'Publish';

    var cancelLink = document.createElement('a');
    cancelLink.className = 'admin-btn admin-btn--ghost';
    cancelLink.href = 'index.html';
    cancelLink.textContent = 'Cancel';

    actions.appendChild(saveBtn);
    actions.appendChild(publishBtn);
    actions.appendChild(cancelLink);
    main.appendChild(actions);

    var submitStatus = document.createElement('div');
    submitStatus.id = 'submit-status';
    submitStatus.setAttribute('role', 'status');
    submitStatus.setAttribute('aria-live', 'polite');
    submitStatus.style.cssText = 'margin-top:var(--space-md);text-align:center;';
    main.appendChild(submitStatus);

    // Delete section
    var deleteSection = document.createElement('div');
    deleteSection.className = 'admin-delete-section';

    var deleteBtn = document.createElement('button');
    deleteBtn.type = 'button';
    deleteBtn.className = 'admin-btn admin-btn--danger';
    deleteBtn.textContent = 'Delete Draft';
    deleteBtn.addEventListener('click', async function () {
      if (!confirm('Are you sure you want to delete this draft? This cannot be undone.')) return;
      deleteBtn.disabled = true;
      deleteBtn.textContent = 'Deleting…';
      try {
        await Admin.api.del('/evidence/' + draftId);
        window.location.href = 'index.html';
      } catch (err) {
        formError.textContent = 'Failed to delete: ' + err.message;
        formError.style.display = 'block';
        deleteBtn.disabled = false;
        deleteBtn.textContent = 'Delete Draft';
      }
    });

    deleteSection.appendChild(deleteBtn);
    main.appendChild(deleteSection);

    // ── Event handlers ─────────────────────────────────────────────────

    var titleInput = document.getElementById('draft-title');
    var slugInput = document.getElementById('draft-slug');
    var titleErr = document.getElementById('title-error');
    var slugErr = document.getElementById('slug-error');

    function clearErrors() {
      formError.style.display = 'none';
      formError.textContent = '';
      if (titleErr) { titleErr.style.display = 'none'; titleErr.textContent = ''; }
      if (slugErr) { slugErr.style.display = 'none'; slugErr.textContent = ''; }
      if (titleInput) titleInput.classList.remove('admin-input--error');
      if (slugInput) slugInput.classList.remove('admin-input--error');
    }

    function validate() {
      clearErrors();
      var valid = true;
      if (!titleInput.value.trim()) {
        titleErr.textContent = 'Title is required.';
        titleErr.style.display = 'block';
        titleInput.classList.add('admin-input--error');
        valid = false;
      }
      if (!slugInput.value.trim()) {
        slugErr.textContent = 'Slug is required.';
        slugErr.style.display = 'block';
        slugInput.classList.add('admin-input--error');
        valid = false;
      }
      return valid;
    }

    function buildPayload() {
      return {
        title: titleInput.value.trim(),
        slug: slugInput.value.trim(),
        description: document.getElementById('draft-description').value.trim() || undefined,
        primary_verse: (document.getElementById('draft-primary-verse') || {}).value ? document.getElementById('draft-primary-verse').value.trim() : undefined,
        secondary_verse: (document.getElementById('draft-secondary-verse') || {}).value ? document.getElementById('draft-secondary-verse').value.trim() : undefined,
        gospel_category: document.getElementById('draft-gospel-category').value || undefined,
        timeline_era: document.getElementById('draft-timeline-era').value || undefined,
        timeline_period: (document.getElementById('draft-timeline-period') || {}).value ? document.getElementById('draft-timeline-period').value.trim() : undefined,
        map_location: document.getElementById('draft-map-location').value.trim() || undefined,
        map_x: document.getElementById('draft-map-x').value ? parseFloat(document.getElementById('draft-map-x').value) : undefined,
        map_y: document.getElementById('draft-map-y').value ? parseFloat(document.getElementById('draft-map-y').value) : undefined,
        metadata_keywords: document.getElementById('draft-keywords').value.trim() || undefined,
        published_draft: document.getElementById('draft-publish').checked ? 1 : 0
      };
    }

    saveBtn.addEventListener('click', async function () {
      clearErrors();
      submitStatus.textContent = '';
      if (!validate()) { titleInput.focus(); return; }
      saveBtn.disabled = true;
      publishBtn.disabled = true;
      submitStatus.textContent = 'Saving…';
      try {
        await Admin.api.put('/evidence/' + draftId, buildPayload());
        submitStatus.innerHTML = '<span style="color:var(--admin-success)">Saved successfully.</span>';
      } catch (err) {
        formError.textContent = 'Failed to save: ' + err.message;
        formError.style.display = 'block';
      } finally {
        saveBtn.disabled = false;
        publishBtn.disabled = false;
      }
    });

    publishBtn.addEventListener('click', async function () {
      clearErrors();
      submitStatus.textContent = '';
      publishBtn.disabled = true;
      saveBtn.disabled = true;

      // First save, then toggle publish
      try {
        await Admin.api.put('/evidence/' + draftId, buildPayload());
      } catch (err) {
        formError.textContent = 'Failed to save before publish: ' + err.message;
        formError.style.display = 'block';
        publishBtn.disabled = false;
        saveBtn.disabled = false;
        return;
      }

      try {
        if (data.published_draft) {
          await Admin.unpublishItem('evidence', draftId);
          data.published_draft = 0;
          publishBtn.textContent = 'Publish';
        } else {
          await Admin.publishItem('evidence', draftId);
          data.published_draft = 1;
          publishBtn.textContent = 'Unpublish';
        }
        document.getElementById('draft-publish').checked = !!data.published_draft;
        submitStatus.innerHTML = '<span style="color:var(--admin-success)">' + (data.published_draft ? 'Published!' : 'Unpublished.') + '</span>';
      } catch (err) {
        formError.textContent = 'Publish action failed: ' + err.message;
        formError.style.display = 'block';
      } finally {
        publishBtn.disabled = false;
        saveBtn.disabled = false;
      }
    });
  })();
</script>
</body>
</html>
