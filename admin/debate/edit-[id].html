<!doctype html>
<html lang="en" class="admin-app">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Edit Response — Admin</title>
        <link rel="stylesheet" href="../assets/css/admin.css" />
        <link rel="stylesheet" href="../assets/css/admin-components/spellcheck.css" />
        <link rel="stylesheet" href="/assets/css/components/toasts.css" />
        <link rel="stylesheet" href="../assets/css/admin-components/toasts.css" />
        <link rel="stylesheet" href="../assets/css/admin-components/admin-editor-shared-forms.css" />
        <script defer src="../assets/js/admin-http.js"></script>
        <script defer src="../assets/js/auth.js"></script>
        <script defer src="../assets/js/admin.js"></script>
        <script defer src="../assets/js/admin-layout.js"></script>
        <script defer src="../assets/js/admin-editor-utils.js"></script>
        <script defer src="../assets/js/admin-editor-scaffold.js"></script>
        <script defer src="../assets/js/admin-form-builder.js"></script>
        <script defer src="../assets/js/admin-figure-shortcodes.js"></script>
        <script defer src="../assets/js/admin-figure-captions.js"></script>
        <script defer src="../assets/js/admin-insert-image.js"></script>
        <script defer src="../assets/js/admin-mla-sources.js"></script>
        <script defer src="../assets/js/admin-shortcode-help.js"></script>
        <script defer src="../assets/js/admin-spellcheck/spellcheck-overlay-render.js"></script>
        <script defer src="../assets/js/admin-spellcheck/spellcheck-dictionary-client.js"></script>
        <script defer src="../assets/js/admin-spellcheck/spellcheck-context-menu.js"></script>
        <script defer src="../assets/js/admin-spellcheck/spellcheck-controller.js"></script>
        <script type="module" src="../assets/js/admin-toasts.js"></script>
    </head>
    <body>
        <div class="admin-shell" id="admin-shell"></div>

        <script>
            document.addEventListener("DOMContentLoaded", async function () {
                var shell = document.getElementById("admin-shell");
                AdminLayout.injectSidebar(shell, "debate");
                AdminLayout.injectTopbar(
                    shell,
                    "Edit Response",
                    "index.html",
                    "Debate",
                );

                var main = document.createElement("main");
                main.className = "admin-main";
                main.id = "edit-content";
                main.innerHTML =
                    '<div class="admin-loading" role="status">Loading response…</div>';
                shell.appendChild(main);

                await AdminEditorScaffold.initializeEditor({
                    main: main,
                    apiPath: "/responses/admin/",
                    entityLabel: "response",
                    backHref: "index.html",
                    onDataLoaded: async function (data, ctx) {
                        var responseId = ctx.id;

                        var formError = document.createElement("div");
                        formError.className = "admin-error";
                        formError.style.display = "none";
                        formError.setAttribute("role", "alert");
                        formError.setAttribute("aria-live", "assertive");
                        formError.id = "form-error";
                        main.appendChild(formError);

                        var form = document.createElement("form");
                        form.className = "admin-form-grid";
                        form.setAttribute("novalidate", "");
                        main.appendChild(form);

                        var mainCol = document.createElement("div");
                        mainCol.className = "admin-form-grid__main";
                        form.appendChild(mainCol);

                        var contentCard = document.createElement("div");
                        contentCard.className = "admin-form-card";
                        mainCol.appendChild(contentCard);

                        var cardTitle = document.createElement("div");
                        cardTitle.className = "admin-form-card__title";
                        cardTitle.textContent = "Content";
                        contentCard.appendChild(cardTitle);

                        AdminFormBuilder.addField(contentCard, {
                            id: "response-title",
                            label: "Title",
                            required: true,
                            placeholder:
                                "e.g. Response to the Minimal Facts Argument",
                            hint: "The response title shown in headings and search results.",
                            value: data.response_title || "",
                        });
                        AdminFormBuilder.addField(contentCard, {
                            id: "response-slug",
                            label: "Slug",
                            required: true,
                            placeholder: "e.g. response-minimal-facts",
                            hint: "URL-friendly identifier.",
                            value: data.slug || "",
                        });
                        AdminFormBuilder.addTextarea(contentCard, {
                            id: "response-content",
                            label: "Response Content",
                            placeholder: "Write your response here…",
                            hint: "The full response body.",
                            value: data.response_content || "",
                        });

                        var sidebar = document.createElement("div");
                        sidebar.className = "admin-form-grid__sidebar";
                        form.appendChild(sidebar);

                        var linkCard = document.createElement("div");
                        linkCard.className = "admin-form-card";
                        sidebar.appendChild(linkCard);

                        var linkTitle = document.createElement("div");
                        linkTitle.className = "admin-form-card__title";
                        linkTitle.textContent = "Linking";
                        linkCard.appendChild(linkTitle);

                        // Challenge picker (select, not free-text). Options are
                        // populated once the full challenge list loads, below.
                        AdminFormBuilder.addSelectField(linkCard, {
                            id: "response-challenge",
                            label: "Challenge",
                            options: [{ value: "", label: "— None —" }],
                            hint: "The challenge this response addresses.",
                        });
                        document
                            .getElementById("response-challenge")
                            .setAttribute(
                                "data-current-id",
                                data.challenge_id != null
                                    ? String(data.challenge_id)
                                    : "",
                            );

                        var metaCard = document.createElement("div");
                        metaCard.className = "admin-form-card";
                        metaCard.style.marginTop = "var(--space-md)";
                        sidebar.appendChild(metaCard);

                        var metaTitle = document.createElement("div");
                        metaTitle.className = "admin-form-card__title";
                        metaTitle.textContent = "Metadata";
                        metaCard.appendChild(metaTitle);

                        AdminFormBuilder.addField(metaCard, {
                            id: "response-keywords",
                            label: "Keywords",
                            placeholder:
                                "e.g. resurrection, minimal facts",
                            hint: "Comma-separated search keywords.",
                            value: data.metadata_keywords || "",
                        });
                        AdminFormBuilder.addField(metaCard, {
                            id: "response-evidence",
                            label: "Linked Evidence IDs",
                            placeholder: "e.g. 1, 3, 7",
                            hint: "Comma-separated evidence IDs.",
                            value: (data.links_evidence || [])
                                .map(function (link) {
                                    return link.target_evidence_id;
                                })
                                .join(", "),
                        });

                        // Two-Column Layout checkbox
                        var twoColWrap = document.createElement("div");
                        twoColWrap.className = "admin-checkbox-group";
                        twoColWrap.style.marginTop = "var(--space-md)";
                        var twoColCheckbox = document.createElement("input");
                        twoColCheckbox.type = "checkbox";
                        twoColCheckbox.id = "response-two-column";
                        twoColCheckbox.checked = !!data.two_column;
                        twoColWrap.appendChild(twoColCheckbox);
                        var twoColLabel = document.createElement("label");
                        twoColLabel.setAttribute("for", "response-two-column");
                        twoColLabel.textContent = "Two-Column Layout";
                        twoColWrap.appendChild(twoColLabel);
                        metaCard.appendChild(twoColWrap);
                        var twoColHint = document.createElement("span");
                        twoColHint.className = "admin-form-hint";
                        twoColHint.textContent =
                            "Render the article body in two columns on wide screens (see STYLE_GUIDE/content-patterns.md §9).";
                        metaCard.appendChild(twoColHint);

                        AdminFormBuilder.addField(metaCard, {
                            id: "response-doi",
                            label: "DOI / Citation",
                            placeholder: "e.g. 10.1234/example",
                            hint: "Digital Object Identifier or formal citation string.",
                            value: data.doi || "",
                        });
                        AdminFormBuilder.addTextarea(metaCard, {
                            id: "response-author-bio",
                            label: "Author Bio",
                            placeholder: "Brief author biography…",
                            hint: "A short author biography displayed below the article title.",
                            value: data.author_bio || "",
                        });

                        // Bibliography card
                        var mlaSourcesPanel = AdminEditorUtils.mountMlaPanel(
                            sidebar,
                            data.mla_sources,
                        );

                        // Formatting reference panel
                        AdminShortcodeHelp.mountFormattingReference(sidebar);

                        var actions = document.createElement("div");
                        actions.className = "admin-form-actions";
                        main.appendChild(actions);

                        // Insert Image button
                        AdminEditorUtils.wireInsertImageButton(
                            "response-content",
                        );
                        var contentField = document.getElementById(
                            "response-content",
                        );

                        // Images panel — mounted after the insert flow so
                        // inserts and the panel share one textarea
                        AdminEditorUtils.mountFigureCaptionsPanel(
                            sidebar,
                            "response-content",
                        );

                        // Spellcheck: init the system and attach to the content textarea
                        await SpellcheckController.init();
                        SpellcheckController.attach(contentField);

                        var saveBtn = document.createElement("button");
                        saveBtn.type = "button";
                        saveBtn.className = "admin-btn admin-btn--primary";
                        saveBtn.textContent = "Save Changes";
                        actions.appendChild(saveBtn);

                        var publishBtn = document.createElement("button");
                        publishBtn.type = "button";
                        publishBtn.className = "admin-btn admin-btn--secondary";
                        publishBtn.textContent = data.published_draft
                            ? "Unpublish"
                            : "Publish";
                        actions.appendChild(publishBtn);

                        var cancelLink = document.createElement("a");
                        cancelLink.className = "admin-btn admin-btn--ghost";
                        cancelLink.href = "index.html";
                        cancelLink.textContent = "Cancel";
                        actions.appendChild(cancelLink);

                        var submitStatus = document.createElement("div");
                        submitStatus.id = "submit-status";
                        submitStatus.setAttribute("role", "status");
                        submitStatus.setAttribute("aria-live", "polite");
                        submitStatus.style.cssText =
                            "margin-top:var(--space-md);text-align:center;";
                        main.appendChild(submitStatus);

                        var deleteSection = document.createElement("div");
                        deleteSection.className = "admin-delete-section";
                        var deleteBtn = document.createElement("button");
                        deleteBtn.type = "button";
                        deleteBtn.className = "admin-btn admin-btn--danger";
                        deleteBtn.textContent = "Delete Response";
                        deleteSection.appendChild(deleteBtn);
                        main.appendChild(deleteSection);

                        // Populate the challenge picker from both kinds and pre-select
                        var challengeSelect = document.getElementById(
                            "response-challenge",
                        );
                        var currentChallengeId =
                            challengeSelect.getAttribute("data-current-id");
                        try {
                            var allChallenges =
                                await Admin.getAllChallenges();
                            allChallenges.forEach(function (c) {
                                var opt = document.createElement("option");
                                opt.value = c.id;
                                opt.textContent =
                                    (c.challenge_title ||
                                        c.slug ||
                                        "(untitled)") +
                                    " (" +
                                    c.type +
                                    ")";
                                if (String(c.id) === currentChallengeId) {
                                    opt.selected = true;
                                }
                                challengeSelect.appendChild(opt);
                            });
                        } catch (e) {
                            // Non-fatal: picker stays as just "— None —"
                        }

                        var titleInput = document.getElementById(
                            "response-title",
                        );
                        var slugInput = document.getElementById(
                            "response-slug",
                        );
                        var titleErr = document.getElementById(
                            "response-title-error",
                        );
                        var slugErr = document.getElementById(
                            "response-slug-error",
                        );

                        var slugAuto = true;
                        titleInput.addEventListener("input", function () {
                            if (slugAuto) {
                                slugInput.value = titleInput.value
                                    .toLowerCase()
                                    .replace(/[^a-z0-9\s-]/g, "")
                                    .replace(/\s+/g, "-")
                                    .replace(/-+/g, "-")
                                    .replace(/^-|-$/g, "");
                            }
                        });
                        slugInput.addEventListener("input", function () {
                            slugAuto = false;
                        });

                        function validateForm() {
                            var valid = AdminEditorUtils.validate(formError, [
                                {
                                    input: titleInput,
                                    errEl: titleErr,
                                    label: "Title",
                                },
                                {
                                    input: slugInput,
                                    errEl: slugErr,
                                    label: "Slug",
                                },
                            ]);
                            if (!valid) titleInput.focus();
                            return valid;
                        }

                        function buildPayload() {
                            var challengeVal = document
                                .getElementById("response-challenge")
                                .value.trim();
                            return {
                                response_title: titleInput.value.trim(),
                                slug: slugInput.value.trim(),
                                response_content:
                                    document
                                        .getElementById("response-content")
                                        .value.trim() || undefined,
                                challenge_id: challengeVal
                                    ? parseInt(challengeVal, 10)
                                    : undefined,
                                metadata_keywords:
                                    document
                                        .getElementById("response-keywords")
                                        .value.trim() || undefined,
                                two_column: document.getElementById(
                                    "response-two-column",
                                ).checked
                                    ? 1
                                    : 0,
                                doi:
                                    document
                                        .getElementById("response-doi")
                                        .value.trim() || undefined,
                                author_bio:
                                    document
                                        .getElementById(
                                            "response-author-bio",
                                        )
                                        .value.trim() || undefined,
                                published_draft: data.published_draft
                                    ? 1
                                    : 0,
                                link_evidence_ids:
                                    AdminEditorUtils.parseIdList(
                                        document.getElementById(
                                            "response-evidence",
                                        ).value,
                                    ),
                                mla_source_ids:
                                    mlaSourcesPanel.getSelectedIds(),
                            };
                        }

                        AdminEditorScaffold.wireFormHandlers({
                            formError: formError,
                            submitStatus: submitStatus,
                            saveBtn: saveBtn,
                            publishBtn: publishBtn,
                            validateForm: validateForm,
                            buildPayload: buildPayload,
                            putPath: "/responses/" + responseId,
                            publishType: "responses",
                            recordId: responseId,
                            data: data,
                            delete: {
                                btn: deleteBtn,
                                path: "/responses/" + responseId,
                                confirmMessage:
                                    "Are you sure you want to permanently delete this response? This cannot be undone.",
                                idleLabel: "Delete Response",
                                redirectHref: "index.html",
                            },
                        });
                    },
                });
            });
        </script>
    </body>
</html>
