    <!-- ── Topbar ───────────────────────────────────────────────────────── -->
    <header class="admin-topbar">
      <h1 class="admin-topbar__title">Analytics</h1>
    </header>

    <!-- ── Main Content ─────────────────────────────────────────────────── -->
    <main class="admin-main">
      <!-- Date-range chip row -->
      <div class="analytics-chip-row">
        <button class="analytics-chip" type="button" data-days="7">Last 7 days</button>
        <button class="analytics-chip analytics-chip--active" type="button" data-days="30">Last 30 days</button>
        <button class="analytics-chip" type="button" data-days="90">Last 90 days</button>
      </div>

      <div id="analytics-content">
        <div class="admin-loading">Loading analytics…</div>
      </div>
    </main>

  </div>

  <!-- ── Inline page script ────────────────────────────────────────────── -->
  <script>
    (async function () {
      // Guard: redirect if not authenticated
      const ok = await AdminAuth.requireSession();
      if (!ok) {
        document.getElementById('analytics-content').innerHTML =
          '<div class="admin-error" role="alert">Unable to verify session. Please check your connection and try again.</div>';
        return;
      }

      // Delegate to the analytics module
      AdminAnalytics.render();
    })();
  </script>
