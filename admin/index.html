<!doctype html>
<html lang="en" class="admin-app">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin · Dashboard</title>
        <link rel="stylesheet" href="assets/css/admin.css" />
        <script defer src="assets/js/auth.js"></script>
        <script defer src="assets/js/admin.js"></script>
        <style>
            .admin-dashboard-filters {
                display: flex;
                gap: var(--space-sm);
                margin-bottom: var(--space-md);
                flex-wrap: wrap;
                align-items: flex-end;
            }
            .admin-dashboard-filters .admin-form-group {
                margin-bottom: 0;
                flex: 1;
                min-width: 140px;
            }
            .admin-loading,
            .admin-empty,
            .admin-error {
                padding: var(--space-xl);
                text-align: center;
                color: var(--admin-text-muted);
                font-size: 14px;
            }
            .admin-error {
                color: var(--admin-danger);
            }
        </style>
    </head>
    <body>
        <div class="admin-shell">
            <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
            <nav class="admin-sidebar">
                <div class="admin-sidebar__brand">⚡ Admin</div>
                <div class="admin-sidebar__nav">
                    <a
                        class="admin-sidebar__link admin-sidebar__link--active"
                        href="index.html"
                    >
                        <span class="admin-sidebar__icon">📊</span> Dashboard
                    </a>
                    <a class="admin-sidebar__link" href="evidence/index.html">
                        <span class="admin-sidebar__icon">📋</span> Evidence
                    </a>
                    <a
                        class="admin-sidebar__link"
                        href="collections/index.html"
                    >
                        <span class="admin-sidebar__icon">📁</span> Collections
                    </a>
                    <a class="admin-sidebar__link" href="resources/index.html">
                        <span class="admin-sidebar__icon">📚</span> Resources
                    </a>
                    <a class="admin-sidebar__link" href="wikipedia/index.html">
                        <span class="admin-sidebar__icon">📖</span> Wikipedia
                    </a>
                    <a class="admin-sidebar__link" href="essays/index.html">
                        <span class="admin-sidebar__icon">✍️</span> Essays
                    </a>
                    <a class="admin-sidebar__link" href="debate/index.html">
                        <span class="admin-sidebar__icon">🗣️</span> Debate
                    </a>
                    <a
                        class="admin-sidebar__link"
                        href="debate/popular-challenges/index.html"
                    >
                        <span class="admin-sidebar__icon">📢</span> Popular
                        Challenges
                    </a>
                    <a
                        class="admin-sidebar__link"
                        href="debate/academic-challenges/index.html"
                    >
                        <span class="admin-sidebar__icon">🎓</span> Academic
                        Challenges
                    </a>
                    <a
                        class="admin-sidebar__link"
                        href="historiography/index.html"
                    >
                        <span class="admin-sidebar__icon">🏛️</span>
                        Historiography
                    </a>
                    <a class="admin-sidebar__link" href="blog/index.html">
                        <span class="admin-sidebar__icon">📰</span> Blog
                    </a>
                    <a class="admin-sidebar__link" href="news/index.html">
                        <span class="admin-sidebar__icon">📡</span> News
                    </a>
                    <a class="admin-sidebar__link" href="diagrams/maps.html">
                        <span class="admin-sidebar__icon">🗺️</span> Maps Editor
                    </a>
                    <a class="admin-sidebar__link" href="diagrams/arbor.html">
                        <span class="admin-sidebar__icon">🌳</span> Arbor Editor
                    </a>
                    <a
                        class="admin-sidebar__link"
                        href="diagrams/timeline.html"
                    >
                        <span class="admin-sidebar__icon">⏳</span> Timeline
                        Editor
                    </a>
                    <a class="admin-sidebar__link" href="analytics.html">
                        <span class="admin-sidebar__icon">📈</span> Analytics
                    </a>
                    <a class="admin-sidebar__link" href="settings/index.html">
                        <span class="admin-sidebar__icon">⚙️</span> Settings
                    </a>
                </div>
                <div class="admin-sidebar__bottom">
                    <a class="admin-sidebar__link" href="auth/login.html">
                        <span class="admin-sidebar__icon">🚪</span> Logout
                    </a>
                </div>
            </nav>

            <!-- ── Topbar ───────────────────────────────────────────────────────── -->
            <header class="admin-topbar">
                <h1 class="admin-topbar__title">Dashboard</h1>
            </header>

            <!-- ── Main Content ─────────────────────────────────────────────────── -->
            <main class="admin-main" id="dashboard-content">
                <div class="admin-loading">Loading dashboard…</div>
            </main>
        </div>

        <!-- ── Inline page script ────────────────────────────────────────────── -->
        <script>
            (function () {
                var TYPE_LABELS = {
                    evidence: "Evidence",
                    essays: "Essay",
                    responses: "Response",
                    historiography: "Historiography",
                    "blog-posts": "Blog Post",
                    collections: "Collection",
                    resources: "Resource",
                    "popular-challenges": "Popular Challenge",
                    "academic-challenges": "Academic Challenge",
                };

                function contentItemUrl(item) {
                    switch (item.type) {
                        case "evidence":
                            return "evidence/edit-[id].html?id=" + item.id;
                        case "essays":
                            return "essays/edit-[id].html?id=" + item.id;
                        case "responses":
                            return "debate/edit-[id].html?id=" + item.id;
                        case "historiography":
                            return (
                                "historiography/edit-[id].html?id=" + item.id
                            );
                        case "blog-posts":
                            return "blog/edit-[id].html?id=" + item.id;
                        case "popular-challenges":
                            return (
                                "debate/popular-challenges/edit-[id].html?id=" +
                                item.id
                            );
                        case "academic-challenges":
                            return (
                                "debate/academic-challenges/edit-[id].html?id=" +
                                item.id
                            );
                        case "collections":
                            return "collections/index.html";
                        case "resources":
                            return (
                                "resources/" + (item.list_key || "") + ".html"
                            );
                        default:
                            return "#";
                    }
                }

                var main = document.getElementById("dashboard-content");

                AdminAuth.requireSession().then(function (ok) {
                    if (!ok) {
                        main.innerHTML =
                            '<div class="admin-error" role="alert">Unable to verify session. Please check your connection and try again.</div>';
                        return;
                    }

                    Admin.api
                        .get("/content")
                        .then(function (data) {
                            main.innerHTML = "";

                            if (!Array.isArray(data) || data.length === 0) {
                                var emptyEl = document.createElement("div");
                                emptyEl.className = "admin-empty";
                                emptyEl.setAttribute("role", "status");
                                emptyEl.textContent =
                                    "No content records found.";
                                main.appendChild(emptyEl);
                                return;
                            }

                            // ── Filter bar ────────────────────────────────────────

                            var filterBar = document.createElement("div");
                            filterBar.className = "admin-dashboard-filters";

                            // Text search input
                            var searchDiv = document.createElement("div");
                            searchDiv.className = "admin-form-group";
                            var searchLabel = document.createElement("label");
                            searchLabel.className = "admin-form-group__label";
                            searchLabel.setAttribute("for", "filter-search");
                            searchLabel.textContent = "Search";
                            var searchInput = document.createElement("input");
                            searchInput.type = "text";
                            searchInput.className = "admin-input";
                            searchInput.id = "filter-search";
                            searchInput.placeholder = "Search by title…";
                            searchDiv.appendChild(searchLabel);
                            searchDiv.appendChild(searchInput);
                            filterBar.appendChild(searchDiv);

                            // Type select
                            var types = [];
                            var seenTypes = {};
                            data.forEach(function (item) {
                                if (!seenTypes[item.type]) {
                                    seenTypes[item.type] = true;
                                    types.push(item.type);
                                }
                            });
                            types.sort();

                            var typeDiv = document.createElement("div");
                            typeDiv.className = "admin-form-group";
                            var typeLabel = document.createElement("label");
                            typeLabel.className = "admin-form-group__label";
                            typeLabel.setAttribute("for", "filter-type");
                            typeLabel.textContent = "Type";
                            var typeSelect = document.createElement("select");
                            typeSelect.className = "admin-select";
                            typeSelect.id = "filter-type";
                            typeSelect.innerHTML =
                                '<option value="">All Types</option>' +
                                types
                                    .map(function (t) {
                                        return (
                                            '<option value="' +
                                            t +
                                            '">' +
                                            (TYPE_LABELS[t] || t) +
                                            "</option>"
                                        );
                                    })
                                    .join("");
                            typeDiv.appendChild(typeLabel);
                            typeDiv.appendChild(typeSelect);
                            filterBar.appendChild(typeDiv);

                            // Status select
                            var statusDiv = document.createElement("div");
                            statusDiv.className = "admin-form-group";
                            var statusLabel = document.createElement("label");
                            statusLabel.className = "admin-form-group__label";
                            statusLabel.setAttribute("for", "filter-status");
                            statusLabel.textContent = "Status";
                            var statusSelect = document.createElement("select");
                            statusSelect.className = "admin-select";
                            statusSelect.id = "filter-status";
                            statusSelect.innerHTML =
                                '<option value="">All</option>' +
                                '<option value="1">Published</option>' +
                                '<option value="0">Draft</option>';
                            statusDiv.appendChild(statusLabel);
                            statusDiv.appendChild(statusSelect);
                            filterBar.appendChild(statusDiv);

                            main.appendChild(filterBar);

                            // ── Table wrapper ────────────────────────────────────

                            var wrapper = document.createElement("div");
                            wrapper.className = "admin-table-wrapper";

                            function renderTable(filteredData) {
                                wrapper.innerHTML = "";

                                if (filteredData.length === 0) {
                                    var emptyMsg =
                                        document.createElement("div");
                                    emptyMsg.className = "admin-empty";
                                    emptyMsg.setAttribute("role", "status");
                                    emptyMsg.textContent =
                                        "No records match the current filters.";
                                    wrapper.appendChild(emptyMsg);
                                    return;
                                }

                                var table = document.createElement("table");
                                table.className = "admin-table";

                                var thead = document.createElement("thead");
                                var hRow = document.createElement("tr");
                                ["Type", "Title", "Status", "Updated"].forEach(
                                    function (label) {
                                        var th = document.createElement("th");
                                        th.textContent = label;
                                        hRow.appendChild(th);
                                    },
                                );
                                thead.appendChild(hRow);
                                table.appendChild(thead);

                                var tbody = document.createElement("tbody");

                                filteredData.forEach(function (item) {
                                    var tr = document.createElement("tr");

                                    // Type badge
                                    var tdType = document.createElement("td");
                                    var label =
                                        TYPE_LABELS[item.type] || item.type;
                                    tdType.appendChild(Admin.typeBadge(label));
                                    tr.appendChild(tdType);

                                    // Title (link)
                                    var tdTitle = document.createElement("td");
                                    var link = document.createElement("a");
                                    link.href = contentItemUrl(item);
                                    link.textContent =
                                        item.title || item.slug || "(untitled)";
                                    link.style.cssText =
                                        "color:var(--admin-accent);text-decoration:none;font-weight:500;";
                                    tdTitle.appendChild(link);
                                    tr.appendChild(tdTitle);

                                    // Status badge
                                    var tdStatus = document.createElement("td");
                                    tdStatus.appendChild(
                                        Admin.statusBadge(item.published_draft),
                                    );
                                    tr.appendChild(tdStatus);

                                    // Updated date
                                    var tdUpdated =
                                        document.createElement("td");
                                    tdUpdated.textContent = Admin.formatDate(
                                        item.updated_at,
                                    );
                                    tr.appendChild(tdUpdated);

                                    tbody.appendChild(tr);
                                });

                                table.appendChild(tbody);
                                wrapper.appendChild(table);
                            }

                            renderTable(data);
                            main.appendChild(wrapper);

                            // ── Filter logic ──────────────────────────────────────

                            function applyFilters() {
                                var searchVal = searchInput.value
                                    .toLowerCase()
                                    .trim();
                                var typeVal = typeSelect.value;
                                var statusVal = statusSelect.value;

                                var filtered = data.filter(function (item) {
                                    // Text search on title
                                    if (
                                        searchVal &&
                                        !(item.title || "")
                                            .toLowerCase()
                                            .includes(searchVal)
                                    ) {
                                        return false;
                                    }
                                    // Type filter
                                    if (typeVal && item.type !== typeVal) {
                                        return false;
                                    }
                                    // Status filter
                                    if (statusVal !== "") {
                                        if (
                                            Number(item.published_draft) !==
                                            Number(statusVal)
                                        ) {
                                            return false;
                                        }
                                    }
                                    return true;
                                });

                                renderTable(filtered);
                            }

                            searchInput.addEventListener("input", applyFilters);
                            typeSelect.addEventListener("change", applyFilters);
                            statusSelect.addEventListener(
                                "change",
                                applyFilters,
                            );
                        })
                        .catch(function (err) {
                            main.innerHTML =
                                '<div class="admin-error" role="alert">' +
                                err.message +
                                "</div>";
                        });
                });
            })();
        </script>
    </body>
</html>
