                    <a class="admin-sidebar__link" href="evidence/index.html">

                    <a

                        <span class="admin-sidebar__icon">📁</span> Collections

                    <a class="admin-sidebar__link" href="resources/index.html">

                    <a class="admin-sidebar__link" href="wikipedia/index.html">

                    <a class="admin-sidebar__link" href="debate/index.html">
                        <span class="admin-sidebar__icon">🗣️</span> Debate
                    </a>
      <a class="admin-sidebar__link" href="debate/popular-challenges/index.html">
        <span class="admin-sidebar__icon">📢</span> Popular Challenges
      </a>
      <a class="admin-sidebar__link" href="debate/academic-challenges/index.html">
        <span class="admin-sidebar__icon">🎓</span> Academic Challenges
      </a>
                    <a class="admin-sidebar__link" href="historiography/index.html">
                        <span class="admin-sidebar__icon">🏛️</span> Historiography
                    </a>
                    <a class="admin-sidebar__link" href="blog/index.html">
                        <span class="admin-sidebar__icon">📰</span> Blog
                    </a>
                    <a class="admin-sidebar__link" href="news/index.html">
                        <span class="admin-sidebar__icon">📡</span> News
                    </a>
                    <a class="admin-sidebar__link" href="diagrams/maps.html">
                        <span class="admin-sidebar__icon">🗺️</span> Maps Editor

                    <a

                    >

                    </a>

                        <span class="admin-sidebar__icon">📈</span> Analytics

                    <a class="admin-sidebar__link" href="settings/index.html">

                <div class="admin-sidebar__bottom">
                    <a class="admin-sidebar__link" href="auth/login.html">
                        <span class="admin-sidebar__icon">🚪</span> Logout

                </div>

            <!-- ── Topbar ───────────────────────────────────────────────────────── -->
            <header class="admin-topbar">
                <h1 class="admin-topbar__title">Dashboard</h1>
            </header>

            <!-- ── Main Content ─────────────────────────────────────────────────── -->
            <main class="admin-main" id="dashboard-content">
                <div class="admin-loading">Loading dashboard…</div>
            </main>
        </div>

        <!-- ── Inline page script ────────────────────────────────────────────── -->
        <script>
            (async function () {
                const main = document.getElementById("dashboard-content");

                // Guard: redirect if not authenticated
                const ok = await AdminAuth.requireSession();
                if (!ok) {
                    main.innerHTML =
                        '<div class="admin-error" role="alert">Unable to verify session. Please check your connection and try again.</div>';
                    return;
                }

                try {
                    // Fetch all dashboard data in parallel
                    const [
                        draftCounts,
                        evidenceData,
                        blogData,
                        collectionsData,
                        resourcesData,
                        analyticsData,
                    ] = await Promise.all([
                        Admin.api.get("/drafts/counts").catch(function () {
                            return {};
                        }),
                        Admin.api.get("/evidence").catch(function () {
                            return [];
                        }),
                        Admin.api.get("/blog-posts").catch(function () {
                            return [];
                        }),
                        Admin.api.get("/collections").catch(function () {
                            return [];
                        }),
                        Admin.api.get("/resources").catch(function () {
                            return [];
                        }),
                        Admin.api.get("/analytics").catch(function () {
                            return {};
                        }),
                    ]);

                    main.innerHTML = "";

                    // ── Record counts ────────────────────────────────────────────────

                    const evidenceCount = Array.isArray(evidenceData)
                        ? evidenceData.length
                        : 0;

                    // Pending drafts: sum up all draft-type counts
                    var pendingDrafts = 0;
                    if (draftCounts && typeof draftCounts === "object") {
                        Object.keys(draftCounts).forEach(function (key) {
                            pendingDrafts += Number(draftCounts[key]) || 0;
                        });
                    }

                    const blogCount = Array.isArray(blogData)
                        ? blogData.length
                        : 0;
                    const collectionsCount = Array.isArray(collectionsData)
                        ? collectionsData.length
                        : 0;
                    const resourcesCount = Array.isArray(resourcesData)
                        ? resourcesData.length
                        : 0;

                    // 7-day page views from analytics
                    var pageViews7d = 0;
                    if (analyticsData && analyticsData.stats) {
                        var pvStat = analyticsData.stats.find(function (s) {
                            return (
                                s.label &&
                                s.label.toLowerCase().indexOf("page view") !==
                                    -1
                            );
                        });
                        if (pvStat) pageViews7d = pvStat.value;
                        // Fallback: sum up pageViews if available
                        if (!pageViews7d && analyticsData.pageViews) {
                            analyticsData.pageViews.forEach(function (pv) {
                                pageViews7d += Number(pv.views) || 0;
                            });
                        }
                    }

                    var stats = [
                        evidenceCount + " evidence records",
                        blogCount + " blog posts",
                        collectionsCount + " collections",
                        resourcesCount + " resource entries",
                        pendingDrafts + " unpublished records across all content types",
                        Admin.formatNumber(pageViews7d) + " page views in the last 7 days",
                    ];

                    var overview = document.createElement("section");
                    overview.style.marginBottom = "var(--space-xl)";

                    var overviewTitle = document.createElement("h3");
                    overviewTitle.className = "analytics-section__title";
                    overviewTitle.textContent = "Site Overview";
                    overview.appendChild(overviewTitle);

                    var list = document.createElement("ul");
                    list.style.cssText =
                        "margin:var(--space-sm) 0 0;padding-left:1.25em;line-height:1.8;";
                    stats.forEach(function (line) {
                        var li = document.createElement("li");
                        li.textContent = line;
                        list.appendChild(li);
                    });
                    overview.appendChild(list);

                    main.appendChild(overview);

                    // ── Instructions ─────────────────────────────────────────────────

                    var help = document.createElement("section");

                    var helpTitle = document.createElement("h3");
                    helpTitle.className = "analytics-section__title";
                    helpTitle.textContent = "How This Works";
                    help.appendChild(helpTitle);

                    var siteHeading = document.createElement("h4");
                    siteHeading.textContent = "The website";
                    help.appendChild(siteHeading);

                    var siteList = document.createElement("ul");
                    siteList.style.cssText =
                        "margin:var(--space-xs) 0 var(--space-md);padding-left:1.25em;line-height:1.8;";
                    [
                        "Evidence is the core content type: a sourced claim or artifact, tagged with a gospel category, timeline era and (optionally) a map location.",
                        "Collections group related Evidence records together under a shared theme.",
                        "Resources hold supporting reference material — people, places, manuscripts, sermons and sayings, external/internal witnesses, and more.",
                        "Essays, Debate (popular and academic challenges) and Historiography hold longer-form argumentative and analytical writing.",
                        "Blog and News are informal, dated updates shown separately from the archival content above.",
                        "Maps, Arbor and Timeline are visual diagrams built from Evidence records.",
                    ].forEach(function (line) {
                        var li = document.createElement("li");
                        li.textContent = line;
                        siteList.appendChild(li);
                    });
                    help.appendChild(siteList);

                    var adminHeading = document.createElement("h4");
                    adminHeading.textContent = "The admin section";
                    help.appendChild(adminHeading);

                    var adminList = document.createElement("ul");
                    adminList.style.cssText =
                        "margin:var(--space-xs) 0;padding-left:1.25em;line-height:1.8;";
                    [
                        "Use the sidebar to go to a content type's list page, where you can search, filter and open existing records.",
                        "Each list page has a button to create a new record of that type.",
                        "Every Evidence record has a \"published\" flag — leave it off to keep working on a record privately, and toggle it on from the Evidence edit page when it's ready to go live.",
                        "Changes saved here update the database immediately, but the public site is only rebuilt from that data on the next deploy.",
                        "Analytics shows traffic to the live site; Settings holds site-wide configuration.",
                    ].forEach(function (line) {
                        var li = document.createElement("li");
                        li.textContent = line;
                        adminList.appendChild(li);
                    });
                    help.appendChild(adminList);

                    main.appendChild(help);
                } catch (err) {
                    main.innerHTML =
                        '<div class="admin-error" role="alert">' +
                        err.message +
                        "</div>";
                }
            })();
        </script>
    </body>
</html>
