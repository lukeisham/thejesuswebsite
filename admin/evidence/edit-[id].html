<!doctype html>
<html lang="en" class="admin-app">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Edit Evidence — Admin</title>
        <link rel="stylesheet" href="../assets/css/admin.css" />
        <link rel="stylesheet" href="../assets/css/admin-components/spellcheck.css" />
        <link rel="stylesheet" href="/assets/css/components/toasts.css" />
        <link rel="stylesheet" href="../assets/css/admin-components/toasts.css" />
        <link rel="stylesheet" href="../assets/css/admin-components/admin-editor-shared-forms.css" />
        <script defer src="../assets/js/admin-http.js"></script>
        <script defer src="../assets/js/auth.js"></script>
        <script defer src="../assets/js/admin.js"></script>
        <script defer src="../assets/js/admin-layout.js"></script>
        <script defer src="../assets/js/admin-editor-utils.js"></script>
        <script defer src="../assets/js/admin-editor-scaffold.js"></script>
        <script defer src="../assets/js/admin-form-builder.js"></script>
        <script defer src="../assets/js/admin-timeline-taxonomy.js"></script>
        <script defer src="../assets/js/admin-insert-image.js"></script>
        <script defer src="../assets/js/admin-image-picker.js"></script>
        <script defer src="../assets/js/admin-mla-sources.js"></script>
        <script defer src="../assets/js/admin-shortcode-help.js"></script>
        <script defer src="../assets/js/admin-spellcheck/spellcheck-overlay-render.js"></script>
        <script defer src="../assets/js/admin-spellcheck/spellcheck-dictionary-client.js"></script>
        <script defer src="../assets/js/admin-spellcheck/spellcheck-context-menu.js"></script>
        <script defer src="../assets/js/admin-spellcheck/spellcheck-controller.js"></script>
        <script type="module" src="../assets/js/admin-toasts.js"></script>
        <style>
            /* Evidence-only rules — everything shared with the other four
               editors lives in admin-editor-shared-forms.css. */
            .admin-relation-tag {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                padding: 2px 8px;
                font-size: 12px;
                background: var(--admin-surface-hover);
                border: 1px solid var(--admin-border-light);
                border-radius: 12px;
                margin: 2px 4px 2px 0;
            }
            .admin-relation-tag button {
                background: none;
                border: none;
                color: var(--admin-text-muted);
                font-size: 14px;
                cursor: pointer;
                padding: 0 2px;
                line-height: 1;
            }
            .admin-relation-tag button:hover {
                color: var(--admin-danger);
            }
        </style>
    </head>
    <body>
        <div class="admin-shell" id="admin-shell"></div>

        <script>
            document.addEventListener("DOMContentLoaded", async function () {
                var shell = document.getElementById("admin-shell");
                AdminLayout.injectSidebar(shell, "evidence");
                AdminLayout.injectTopbar(
                    shell,
                    "Edit Evidence",
                    "index.html",
                    "Evidence",
                );

                var main = document.createElement("main");
                main.className = "admin-main";
                main.id = "edit-content";
                main.innerHTML =
                    '<div class="admin-loading" role="status">Loading evidence…</div>';
                shell.appendChild(main);

                await AdminEditorScaffold.initializeEditor({
                    main: main,
                    apiPath: "/evidence/admin/",
                    entityLabel: "evidence",
                    backHref: "index.html",
                    onDataLoaded: async function (data, ctx) {
                        var evidenceId = ctx.id;

                        var formError = document.createElement("div");
                        formError.className = "admin-error";
                        formError.style.display = "none";
                        formError.setAttribute("role", "alert");
                        formError.setAttribute("aria-live", "assertive");
                        formError.id = "form-error";
                        main.appendChild(formError);

                        var form = document.createElement("form");
                        form.className = "admin-form-grid";
                        form.setAttribute("novalidate", "");

                        // Left column
                        var leftCol = document.createElement("div");
                        leftCol.className = "admin-form-grid__main";

                        var contentCard = document.createElement("div");
                        contentCard.className = "admin-form-card";

                        var contentTitle = document.createElement("div");
                        contentTitle.className = "admin-form-card__title";
                        contentTitle.textContent = "Content";
                        contentCard.appendChild(contentTitle);

                        AdminFormBuilder.addField(contentCard, {
                            id: "ev-title",
                            label: "Title",
                            required: true,
                            value: data.title,
                        });

                        AdminFormBuilder.addField(contentCard, {
                            id: "ev-slug",
                            label: "Slug",
                            required: true,
                            value: data.slug,
                        });

                        var imageGroup = document.createElement("div");
                        imageGroup.className = "admin-form-group";
                        var imageLabel = document.createElement("label");
                        imageLabel.className = "admin-form-group__label";
                        imageLabel.textContent = "Primary Image";
                        imageGroup.appendChild(imageLabel);
                        var imageMount = document.createElement("div");
                        imageMount.id = "evidence-image-picker-mount";
                        imageGroup.appendChild(imageMount);
                        var imageHint = document.createElement("span");
                        imageHint.className = "admin-form-hint";
                        imageHint.textContent =
                            "The featured image displayed at the top of the evidence detail page.";
                        imageGroup.appendChild(imageHint);
                        contentCard.appendChild(imageGroup);

                        AdminFormBuilder.addTextarea(contentCard, {
                            id: "ev-desc",
                            label: "Description",
                            rows: 10,
                            value: data.description,
                        });

                        AdminFormBuilder.addField(contentCard, {
                            id: "ev-primary-verse",
                            label: "Primary Verse",
                            value: data.primary_verse,
                        });

                        AdminFormBuilder.addField(contentCard, {
                            id: "ev-secondary-verse",
                            label: "Secondary Verse",
                            value: data.secondary_verse,
                        });

                        leftCol.appendChild(contentCard);
                        form.appendChild(leftCol);

                        // Right column
                        var rightCol = document.createElement("div");
                        rightCol.className = "admin-form-grid__sidebar";

                        // Classification card
                        var classCard = document.createElement("div");
                        classCard.className = "admin-form-card";

                        var classTitle = document.createElement("div");
                        classTitle.className = "admin-form-card__title";
                        classTitle.textContent = "Classification";
                        classCard.appendChild(classTitle);

                        var gospelCats = [
                            { v: "", l: "— None —" },
                            { v: "theme", l: "Theme" },
                            { v: "events", l: "Events" },
                            { v: "parables", l: "Parables" },
                            { v: "sayings-and-sermons", l: "Sayings & Sermons" },
                            { v: "people", l: "People" },
                            { v: "objects", l: "Objects" },
                            { v: "places", l: "Places" },
                            { v: "miracles", l: "Miracles" },
                        ];
                        AdminFormBuilder.addSelectField(classCard, {
                            id: "ev-gospel-cat",
                            label: "Gospel Category",
                            options: gospelCats.map(function (c) {
                                return { value: c.v, label: c.l };
                            }),
                            selected: data.gospel_category || "",
                        });

                        var eras = [
                            { v: "", l: "— None —" },
                            { v: "PreIncarnation", l: "Pre-Incarnation" },
                            { v: "OldTestament", l: "Old Testament" },
                            { v: "EarlyLife", l: "Early Life" },
                            { v: "Life", l: "Life" },
                            { v: "GalileeMinistry", l: "Galilee Ministry" },
                            { v: "JudeanMinistry", l: "Judean Ministry" },
                            { v: "PassionWeek", l: "Passion Week" },
                            { v: "Post-Passion", l: "Post-Passion" },
                        ];
                        AdminFormBuilder.addSelectField(classCard, {
                            id: "ev-era",
                            label: "Timeline Era",
                            options: eras.map(function (e) {
                                return { value: e.v, label: e.l };
                            }),
                            selected: data.timeline_era || "",
                        });

                        AdminFormBuilder.addSelectField(classCard, {
                            id: "ev-period",
                            label: "Timeline Period",
                            options: [
                                { value: "", label: "— Select an era first —" },
                            ],
                        });

                        rightCol.appendChild(classCard);

                        // Bibliography card
                        var mlaSourcesPanel = AdminEditorUtils.mountMlaPanel(
                            rightCol,
                            data.mla_sources,
                        );

                        // Map & metadata card
                        var mapCard = document.createElement("div");
                        mapCard.className = "admin-form-card";
                        mapCard.style.marginTop = "var(--space-md)";

                        var mapTitle = document.createElement("div");
                        mapTitle.className = "admin-form-card__title";
                        mapTitle.textContent = "Map & Metadata";
                        mapCard.appendChild(mapTitle);

                        AdminFormBuilder.addField(mapCard, {
                            id: "ev-map-loc",
                            label: "Map Location",
                            value: data.map_location,
                        });

                        var coordsWrap = document.createElement("div");
                        coordsWrap.style.cssText =
                            "display:grid;grid-template-columns:1fr 1fr;gap:var(--space-sm)";
                        AdminFormBuilder.addField(coordsWrap, {
                            id: "ev-map-x",
                            label: "Map X",
                            type: "number",
                            value: data.map_x != null ? data.map_x : "",
                        });
                        AdminFormBuilder.addField(coordsWrap, {
                            id: "ev-map-y",
                            label: "Map Y",
                            type: "number",
                            value: data.map_y != null ? data.map_y : "",
                        });
                        mapCard.appendChild(coordsWrap);
                        // step="any" isn't part of AdminFormBuilder's opts — set directly.
                        coordsWrap
                            .querySelectorAll("input")
                            .forEach(function (input) {
                                input.step = "any";
                            });

                        AdminFormBuilder.addField(mapCard, {
                            id: "ev-keywords",
                            label: "Keywords",
                            value: data.metadata_keywords,
                        });

                        AdminFormBuilder.addField(mapCard, {
                            id: "ev-link-evidence",
                            label: "Linked Evidence IDs",
                            placeholder: "e.g. 1, 3, 7",
                            hint: "Comma-separated evidence IDs to link.",
                            value: (data.links_evidence || [])
                                .map(function (link) {
                                    return link.target_evidence_id;
                                })
                                .join(", "),
                        });

                        AdminFormBuilder.addField(mapCard, {
                            id: "ev-link-context",
                            label: "Linked Context Essay IDs",
                            placeholder: "e.g. 1, 3, 7",
                            hint: "Comma-separated context essay IDs to link.",
                            value: (data.links_context || [])
                                .map(function (link) {
                                    return link.target_context_essay_id;
                                })
                                .join(", "),
                        });

                        AdminFormBuilder.addField(mapCard, {
                            id: "ev-identifiers",
                            label: "Identifier IDs",
                            placeholder: "e.g. 1, 3, 7",
                            hint: "Comma-separated identifier IDs to associate.",
                            value: (data.identifiers || [])
                                .map(function (ident) {
                                    return ident.id;
                                })
                                .join(", "),
                        });

                        rightCol.appendChild(mapCard);

                        // Formatting reference panel
                        AdminShortcodeHelp.mountFormattingReference(rightCol);

                        form.appendChild(rightCol);
                        main.appendChild(form);

                        // Cascading timeline era → period dropdowns (JS-3: single
                        // taxonomy source in admin-timeline-taxonomy.js, no
                        // duplicated period lists in page markup or script).
                        var eraSelect = document.getElementById("ev-era");
                        var periodSelect = document.getElementById("ev-period");

                        function populatePeriods(era, selectedValue) {
                            periodSelect.innerHTML = "";
                            var placeholder = document.createElement("option");
                            placeholder.value = "";
                            placeholder.textContent = era
                                ? "— None —"
                                : "— Select an era first —";
                            periodSelect.appendChild(placeholder);

                            var periods = era
                                ? Admin.timelineTaxonomy.getPeriodsForEra(era)
                                : [];
                            periods.forEach(function (period) {
                                var option = document.createElement("option");
                                option.value = period.value;
                                option.textContent = period.label;
                                periodSelect.appendChild(option);
                            });

                            periodSelect.disabled = !era;
                            if (selectedValue) periodSelect.value = selectedValue;
                        }

                        eraSelect.addEventListener("change", function () {
                            populatePeriods(eraSelect.value);
                        });
                        populatePeriods(data.timeline_era, data.timeline_period);

                        // Primary image picker, pre-populated with the existing image
                        var imagePicker = AdminImagePicker.mount(
                            document.getElementById(
                                "evidence-image-picker-mount",
                            ),
                            {
                                initialPath: data.image || "",
                                initialAlt: data.image_alt || "",
                            },
                        );

                        // Action buttons
                        var actions = document.createElement("div");
                        actions.className = "admin-form-actions";

                        var saveBtn = document.createElement("button");
                        saveBtn.type = "button";
                        saveBtn.className = "admin-btn admin-btn--primary";
                        saveBtn.id = "btn-save";
                        saveBtn.textContent = "Save Changes";

                        var publishBtn = document.createElement("button");
                        publishBtn.type = "button";
                        publishBtn.className = "admin-btn admin-btn--secondary";
                        publishBtn.id = "btn-toggle-publish";
                        publishBtn.textContent = data.published_draft
                            ? "Unpublish"
                            : "Publish";

                        var cancelLink = document.createElement("a");
                        cancelLink.className = "admin-btn admin-btn--ghost";
                        cancelLink.href = "index.html";
                        cancelLink.textContent = "Cancel";

                        actions.appendChild(saveBtn);
                        actions.appendChild(publishBtn);
                        actions.appendChild(cancelLink);
                        main.appendChild(actions);

                        // Insert Image button
                        AdminEditorUtils.wireInsertImageButton("ev-desc");
                        var contentField = document.getElementById("ev-desc");

                        // Spellcheck: init the system and attach to the description textarea
                        await SpellcheckController.init();
                        SpellcheckController.attach(contentField);

                        var submitStatus = document.createElement("div");
                        submitStatus.id = "submit-status";
                        submitStatus.setAttribute("role", "status");
                        submitStatus.setAttribute("aria-live", "polite");
                        submitStatus.style.cssText =
                            "margin-top:var(--space-md);text-align:center;";
                        main.appendChild(submitStatus);

                        // Delete section
                        var deleteSection = document.createElement("div");
                        deleteSection.className = "admin-delete-section";
                        var deleteHint = document.createElement("p");
                        deleteHint.className = "admin-text--muted";
                        deleteHint.style.cssText =
                            "font-size:12px;margin-bottom:var(--space-sm);";
                        deleteHint.textContent =
                            "Permanently delete this evidence item and all its relations.";
                        deleteSection.appendChild(deleteHint);

                        var deleteBtn = document.createElement("button");
                        deleteBtn.type = "button";
                        deleteBtn.className = "admin-btn admin-btn--danger";
                        deleteBtn.textContent = "Delete Evidence";
                        deleteSection.appendChild(deleteBtn);
                        main.appendChild(deleteSection);

                        // ── Validation + save/publish/delete wiring ──────────
                        var titleInput = document.getElementById("ev-title");
                        var slugInput = document.getElementById("ev-slug");
                        var titleErr = document.getElementById(
                            "ev-title-error",
                        );
                        var slugErr = document.getElementById("ev-slug-error");

                        function validateForm() {
                            var valid = AdminEditorUtils.validate(formError, [
                                {
                                    input: titleInput,
                                    errEl: titleErr,
                                    label: "Title",
                                },
                                {
                                    input: slugInput,
                                    errEl: slugErr,
                                    label: "Slug",
                                },
                            ]);
                            if (!valid) titleInput.focus();
                            return valid;
                        }

                        function buildPayload() {
                            return {
                                title: titleInput.value.trim(),
                                slug: slugInput.value.trim(),
                                description:
                                    document
                                        .getElementById("ev-desc")
                                        .value.trim() || undefined,
                                primary_verse:
                                    document
                                        .getElementById("ev-primary-verse")
                                        .value.trim() || undefined,
                                secondary_verse:
                                    document
                                        .getElementById("ev-secondary-verse")
                                        .value.trim() || undefined,
                                image:
                                    imagePicker.getValue().image_path ||
                                    undefined,
                                image_alt:
                                    imagePicker.getValue().alt || undefined,
                                gospel_category:
                                    document.getElementById("ev-gospel-cat")
                                        .value || undefined,
                                timeline_era:
                                    document.getElementById("ev-era").value ||
                                    undefined,
                                timeline_period:
                                    document
                                        .getElementById("ev-period")
                                        .value.trim() || undefined,
                                map_location:
                                    document
                                        .getElementById("ev-map-loc")
                                        .value.trim() || undefined,
                                map_x: document.getElementById("ev-map-x")
                                    .value
                                    ? parseFloat(
                                          document.getElementById("ev-map-x")
                                              .value,
                                      )
                                    : undefined,
                                map_y: document.getElementById("ev-map-y")
                                    .value
                                    ? parseFloat(
                                          document.getElementById("ev-map-y")
                                              .value,
                                      )
                                    : undefined,
                                metadata_keywords:
                                    document
                                        .getElementById("ev-keywords")
                                        .value.trim() || undefined,
                                published_draft: data.published_draft ? 1 : 0,
                                link_evidence_ids:
                                    AdminEditorUtils.parseIdList(
                                        document.getElementById(
                                            "ev-link-evidence",
                                        ).value,
                                    ),
                                link_context_ids: AdminEditorUtils.parseIdList(
                                    document.getElementById("ev-link-context")
                                        .value,
                                ),
                                identifier_ids: AdminEditorUtils.parseIdList(
                                    document.getElementById("ev-identifiers")
                                        .value,
                                ),
                                mla_source_ids:
                                    mlaSourcesPanel.getSelectedIds(),
                            };
                        }

                        AdminEditorScaffold.wireFormHandlers({
                            formError: formError,
                            submitStatus: submitStatus,
                            saveBtn: saveBtn,
                            publishBtn: publishBtn,
                            validateForm: validateForm,
                            buildPayload: buildPayload,
                            putPath: "/evidence/" + evidenceId,
                            publishType: "evidence",
                            recordId: evidenceId,
                            data: data,
                            delete: {
                                btn: deleteBtn,
                                path: "/evidence/" + evidenceId,
                                confirmMessage:
                                    "Are you sure you want to permanently delete this evidence item? This cannot be undone.",
                                idleLabel: "Delete Evidence",
                                redirectHref: "index.html",
                            },
                        });
                    },
                });
            });
        </script>
    </body>
</html>
