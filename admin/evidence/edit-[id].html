<!doctype html>
<html lang="en" class="admin-app">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Edit Evidence — Admin</title>
        <link rel="stylesheet" href="../assets/css/admin.css" />
        <script defer src="../assets/js/auth.js"></script>
        <script defer src="../assets/js/admin.js"></script>
        <script defer src="../assets/js/admin-insert-image.js"></script>
        <style>
            .admin-form-actions {
                display: flex;
                gap: var(--space-sm);
                margin-top: var(--space-lg);
                padding-top: var(--space-md);
                border-top: 1px solid var(--admin-border-light);
            }
            .admin-form-card {
                background: var(--admin-surface);
                border: 1px solid var(--admin-border-light);
                border-radius: var(--admin-radius);
                padding: var(--space-lg);
            }
            .admin-form-card__title {
                font-size: 13px;
                font-weight: 600;
                color: var(--admin-text-secondary);
                text-transform: uppercase;
                letter-spacing: 0.03em;
                margin-bottom: var(--space-md);
            }
            .admin-checkbox-group {
                display: flex;
                align-items: center;
                gap: var(--space-sm);
            }
            .admin-checkbox-group input[type="checkbox"] {
                width: 18px;
                height: 18px;
                accent-color: var(--admin-accent);
            }
            .admin-checkbox-group label {
                font-size: 14px;
                color: var(--admin-text-primary);
                cursor: pointer;
            }
            .admin-error {
                padding: var(--space-md);
                color: var(--admin-danger);
                background: rgba(220, 53, 69, 0.08);
                border: 1px solid rgba(220, 53, 69, 0.2);
                border-radius: var(--admin-radius);
                margin-bottom: var(--space-md);
            }
            .admin-loading {
                padding: var(--space-xl);
                text-align: center;
                color: var(--admin-text-muted);
                font-size: 14px;
            }
            .admin-delete-section {
                margin-top: var(--space-xl);
                padding-top: var(--space-md);
                border-top: 1px solid var(--admin-danger);
            }
            .admin-relation-tag {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                padding: 2px 8px;
                font-size: 12px;
                background: var(--admin-surface-hover);
                border: 1px solid var(--admin-border-light);
                border-radius: 12px;
                margin: 2px 4px 2px 0;
            }
            .admin-relation-tag button {
                background: none;
                border: none;
                color: var(--admin-text-muted);
                font-size: 14px;
                cursor: pointer;
                padding: 0 2px;
                line-height: 1;
            }
            .admin-relation-tag button:hover {
                color: var(--admin-danger);
            }
        </style>
    </head>
    <body>
        <div class="admin-shell">
            <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
            <nav class="admin-sidebar" aria-label="Admin navigation">
                <div class="admin-sidebar__brand">⚡ Admin</div>
                <div class="admin-sidebar__nav">
                    <a class="admin-sidebar__link" href="../index.html">
                        <span class="admin-sidebar__icon">📊</span> Dashboard
                    </a>
                    <a
                        class="admin-sidebar__link admin-sidebar__link--active"
                        href="index.html"
                    >
                        <span class="admin-sidebar__icon">📋</span> Evidence
                    </a>
                    <a
                        class="admin-sidebar__link"
                        href="../collections/index.html"
                    >
                        <span class="admin-sidebar__icon">📁</span> Collections
                    </a>
                    <a
                        class="admin-sidebar__link"
                        href="../resources/index.html"
                    >
                        <span class="admin-sidebar__icon">📚</span> Resources
                    </a>
                    <a
                        class="admin-sidebar__link"
                        href="../wikipedia/index.html"
                    >
                        <span class="admin-sidebar__icon">📖</span> Wikipedia
                    </a>
                    <a class="admin-sidebar__link" href="../essays/index.html">
                        <span class="admin-sidebar__icon">✍️</span> Essays
                    </a>
                    <a class="admin-sidebar__link" href="../debate/index.html">
                        <span class="admin-sidebar__icon">🗣️</span> Debate
                    </a>
                    <a
                        class="admin-sidebar__link"
                        href="../debate/popular-challenges/index.html"
                    >
                        <span class="admin-sidebar__icon">📢</span> Popular
                        Challenges
                    </a>
                    <a
                        class="admin-sidebar__link"
                        href="../debate/academic-challenges/index.html"
                    >
                        <span class="admin-sidebar__icon">🎓</span> Academic
                        Challenges
                    </a>
                    <a
                        class="admin-sidebar__link"
                        href="../historiography/index.html"
                    >
                        <span class="admin-sidebar__icon">🏛️</span>
                        Historiography
                    </a>
                    <a class="admin-sidebar__link" href="../blog/index.html">
                        <span class="admin-sidebar__icon">📰</span> Blog
                    </a>
                    <a class="admin-sidebar__link" href="../news/index.html">
                        <span class="admin-sidebar__icon">📡</span> News
                    </a>
                    <a class="admin-sidebar__link" href="../diagrams/maps.html">
                        <span class="admin-sidebar__icon">🗺️</span> Maps Editor
                    </a>
                    <a class="admin-sidebar__link" href="../analytics.html">
                        <span class="admin-sidebar__icon">📈</span> Analytics
                    </a>
                    <a
                        class="admin-sidebar__link"
                        href="../settings/index.html"
                    >
                        <span class="admin-sidebar__icon">⚙️</span> Settings
                    </a>
                </div>
                <div class="admin-sidebar__bottom">
                    <a class="admin-sidebar__link" href="../auth/login.html">
                        <span class="admin-sidebar__icon">🚪</span> Logout
                    </a>
                </div>
            </nav>

            <!-- ── Topbar ───────────────────────────────────────────────────────── -->
            <header class="admin-topbar">
                <h1 class="admin-topbar__title">Edit Evidence</h1>
                <div class="admin-topbar__actions">
                    <a
                        class="admin-btn admin-btn--sm admin-btn--ghost"
                        href="index.html"
                        >← Back to Evidence</a
                    >
                </div>
            </header>

            <!-- ── Main Content ─────────────────────────────────────────────────── -->
            <main class="admin-main" id="edit-content">
                <div class="admin-loading" role="status">Loading evidence…</div>
            </main>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", async function () {
                const main = document.getElementById("edit-content");

                const ok = await AdminAuth.requireSession();
                if (!ok) {
                    main.innerHTML =
                        '<div class="admin-error" role="alert">Unable to verify session.</div>';
                    return;
                }

                const params = new URLSearchParams(window.location.search);
                const evidenceId = params.get("id");

                if (!evidenceId) {
                    main.innerHTML =
                        '<div class="admin-error" role="alert">No evidence ID specified. <a href="index.html">Go back</a>.</div>';
                    return;
                }

                var data;
                try {
                    data = await Admin.api.get("/evidence/admin/" + evidenceId);
                } catch (err) {
                    main.innerHTML =
                        '<div class="admin-error" role="alert">Failed to load evidence: ' +
                        err.message +
                        "</div>";
                    return;
                }

                if (!data) {
                    main.innerHTML =
                        '<div class="admin-error" role="alert">Evidence not found. <a href="index.html">Go back</a>.</div>';
                    return;
                }

                main.innerHTML = "";

                var formError = document.createElement("div");
                formError.className = "admin-error";
                formError.style.display = "none";
                formError.setAttribute("role", "alert");
                formError.setAttribute("aria-live", "assertive");
                formError.id = "form-error";
                main.appendChild(formError);

                var form = document.createElement("form");
                form.className = "admin-form-grid";
                form.setAttribute("novalidate", "");

                function formGroup(labelHtml, id, inputHtml) {
                    var div = document.createElement("div");
                    div.className = "admin-form-group";
                    var lbl = document.createElement("label");
                    lbl.className = "admin-form-group__label";
                    lbl.setAttribute("for", id);
                    lbl.innerHTML = labelHtml;
                    div.appendChild(lbl);
                    div.insertAdjacentHTML("beforeend", inputHtml);
                    return div;
                }

                function esc(val) {
                    return (val || "")
                        .replace(/&/g, "&amp;")
                        .replace(/"/g, "&quot;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;");
                }

                // Left column
                var leftCol = document.createElement("div");
                leftCol.className = "admin-form-grid__main";

                var contentCard = document.createElement("div");
                contentCard.className = "admin-form-card";

                var contentTitle = document.createElement("div");
                contentTitle.className = "admin-form-card__title";
                contentTitle.textContent = "Content";
                contentCard.appendChild(contentTitle);

                contentCard.appendChild(
                    formGroup(
                        'Title <span aria-hidden="true">*</span>',
                        "ev-title",
                        '<input class="admin-input" id="ev-title" name="title" type="text" required value="' +
                            esc(data.title) +
                            '" aria-describedby="title-error">' +
                            '<span class="admin-form-hint" id="title-error" style="display:none;color:var(--admin-danger)" role="alert"></span>',
                    ),
                );

                contentCard.appendChild(
                    formGroup(
                        'Slug <span aria-hidden="true">*</span>',
                        "ev-slug",
                        '<input class="admin-input" id="ev-slug" name="slug" type="text" required value="' +
                            esc(data.slug) +
                            '" aria-describedby="slug-error">' +
                            '<span class="admin-form-hint" id="slug-error" style="display:none;color:var(--admin-danger)" role="alert"></span>',
                    ),
                );

                contentCard.appendChild(
                    formGroup(
                        "Description",
                        "ev-desc",
                        '<textarea class="admin-textarea" id="ev-desc" name="description" rows="10">' +
                            esc(data.description) +
                            "</textarea>",
                    ),
                );

                contentCard.appendChild(
                    formGroup(
                        "Primary Verse",
                        "ev-primary-verse",
                        '<input class="admin-input" id="ev-primary-verse" name="primary_verse" type="text" value="' +
                            esc(data.primary_verse) +
                            '">',
                    ),
                );

                contentCard.appendChild(
                    formGroup(
                        "Secondary Verse",
                        "ev-secondary-verse",
                        '<input class="admin-input" id="ev-secondary-verse" name="secondary_verse" type="text" value="' +
                            esc(data.secondary_verse) +
                            '">',
                    ),
                );

                leftCol.appendChild(contentCard);
                form.appendChild(leftCol);

                // Right column
                var rightCol = document.createElement("div");
                rightCol.className = "admin-form-grid__sidebar";

                // Classification card
                var classCard = document.createElement("div");
                classCard.className = "admin-form-card";

                var classTitle = document.createElement("div");
                classTitle.className = "admin-form-card__title";
                classTitle.textContent = "Classification";
                classCard.appendChild(classTitle);

                var gospelCats = [
                    { v: "", l: "— None —" },
                    { v: "theme", l: "Theme" },
                    { v: "events", l: "Events" },
                    { v: "parables", l: "Parables" },
                    { v: "sayings-and-sermons", l: "Sayings & Sermons" },
                    { v: "people", l: "People" },
                    { v: "objects", l: "Objects" },
                    { v: "places", l: "Places" },
                    { v: "miracles", l: "Miracles" },
                ];
                var gOpts = gospelCats
                    .map(function (c) {
                        return (
                            '<option value="' +
                            c.v +
                            '"' +
                            (c.v === (data.gospel_category || "")
                                ? " selected"
                                : "") +
                            ">" +
                            c.l +
                            "</option>"
                        );
                    })
                    .join("");

                classCard.appendChild(
                    formGroup(
                        "Gospel Category",
                        "ev-gospel-cat",
                        '<select class="admin-select" id="ev-gospel-cat" name="gospel_category">' +
                            gOpts +
                            "</select>",
                    ),
                );

                var eras = [
                    { v: "", l: "— None —" },
                    { v: "theme", l: "Theme" },
                    { v: "pre-incarnation", l: "Pre-Incarnation" },
                    { v: "old-testament", l: "Old Testament" },
                    { v: "intertestamental", l: "Intertestamental" },
                    { v: "birth", l: "Birth" },
                    { v: "childhood", l: "Childhood" },
                    { v: "labourer", l: "Labourer" },
                    { v: "baptism", l: "Baptism" },
                    { v: "ministry-Galilee", l: "Ministry — Galilee" },
                    { v: "ministry-Jerusalem", l: "Ministry — Jerusalem" },
                    { v: "passion", l: "Passion" },
                    { v: "resurrection", l: "Resurrection" },
                    { v: "ascension", l: "Ascension" },
                    { v: "early-church", l: "Early Church" },
                    { v: "return", l: "Return" },
                ];
                var eOpts = eras
                    .map(function (e) {
                        return (
                            '<option value="' +
                            e.v +
                            '"' +
                            (e.v === (data.timeline_era || "")
                                ? " selected"
                                : "") +
                            ">" +
                            e.l +
                            "</option>"
                        );
                    })
                    .join("");

                classCard.appendChild(
                    formGroup(
                        "Timeline Era",
                        "ev-era",
                        '<select class="admin-select" id="ev-era" name="timeline_era">' +
                            eOpts +
                            "</select>",
                    ),
                );

                classCard.appendChild(
                    formGroup(
                        "Timeline Period",
                        "ev-period",
                        '<input class="admin-input" id="ev-period" name="timeline_period" type="text" value="' +
                            esc(data.timeline_period) +
                            '">',
                    ),
                );

                rightCol.appendChild(classCard);

                // Map & metadata card
                var mapCard = document.createElement("div");
                mapCard.className = "admin-form-card";
                mapCard.style.marginTop = "var(--space-md)";

                var mapTitle = document.createElement("div");
                mapTitle.className = "admin-form-card__title";
                mapTitle.textContent = "Map & Metadata";
                mapCard.appendChild(mapTitle);

                mapCard.appendChild(
                    formGroup(
                        "Map Location",
                        "ev-map-loc",
                        '<input class="admin-input" id="ev-map-loc" name="map_location" type="text" value="' +
                            esc(data.map_location) +
                            '">',
                    ),
                );

                var coordsDiv = document.createElement("div");
                coordsDiv.className = "admin-form-group";
                coordsDiv.style.cssText =
                    "display:grid;grid-template-columns:1fr 1fr;gap:var(--space-sm)";
                coordsDiv.innerHTML =
                    '<div><label class="admin-form-group__label" for="ev-map-x">Map X</label><input class="admin-input" id="ev-map-x" name="map_x" type="number" step="any" value="' +
                    (data.map_x != null ? data.map_x : "") +
                    '"></div>' +
                    '<div><label class="admin-form-group__label" for="ev-map-y">Map Y</label><input class="admin-input" id="ev-map-y" name="map_y" type="number" step="any" value="' +
                    (data.map_y != null ? data.map_y : "") +
                    '"></div>';
                mapCard.appendChild(coordsDiv);

                mapCard.appendChild(
                    formGroup(
                        "Keywords",
                        "ev-keywords",
                        '<input class="admin-input" id="ev-keywords" name="metadata_keywords" type="text" value="' +
                            esc(data.metadata_keywords) +
                            '">',
                    ),
                );

                rightCol.appendChild(mapCard);

                // Publish card
                var pubCard = document.createElement("div");
                pubCard.className = "admin-form-card";
                pubCard.style.marginTop = "var(--space-md)";

                var pubGroup = document.createElement("div");
                pubGroup.className = "admin-form-group";
                pubGroup.innerHTML =
                    '<div class="admin-checkbox-group">' +
                    '<input type="checkbox" id="ev-publish" name="published_draft" value="1"' +
                    (data.published_draft ? " checked" : "") +
                    ">" +
                    '<label for="ev-publish">Published</label>' +
                    "</div>" +
                    '<span class="admin-form-hint" style="margin-top:var(--space-xs)">Toggle to publish or unpublish.</span>';
                pubCard.appendChild(pubGroup);

                rightCol.appendChild(pubCard);

                form.appendChild(rightCol);
                main.appendChild(form);

                // Action buttons
                var actions = document.createElement("div");
                actions.className = "admin-form-actions";

                var saveBtn = document.createElement("button");
                saveBtn.type = "button";
                saveBtn.className = "admin-btn admin-btn--primary";
                saveBtn.id = "btn-save";
                saveBtn.textContent = "Save Changes";

                var publishBtn = document.createElement("button");
                publishBtn.type = "button";
                publishBtn.className = "admin-btn admin-btn--secondary";
                publishBtn.id = "btn-toggle-publish";
                publishBtn.textContent = data.published_draft
                    ? "Unpublish"
                    : "Publish";

                var cancelLink = document.createElement("a");
                cancelLink.className = "admin-btn admin-btn--ghost";
                cancelLink.href = "index.html";
                cancelLink.textContent = "Cancel";

                actions.appendChild(saveBtn);
                actions.appendChild(publishBtn);
                actions.appendChild(cancelLink);
                main.appendChild(actions);
                // Insert Image button
                var insertBtn = document.createElement("button");
                insertBtn.type = "button";
                insertBtn.className =
                    "admin-btn admin-btn--secondary admin-btn--sm aimg-insert-btn";
                insertBtn.id = "insert-image-btn";
                insertBtn.textContent = "Insert Image";
                var contentField = document.getElementById("ev-desc");
                if (contentField && contentField.parentNode) {
                    contentField.parentNode.insertBefore(
                        insertBtn,
                        contentField.nextSibling,
                    );
                }
                if (typeof AdminInsertImage !== "undefined") {
                    AdminInsertImage.wire("#insert-image-btn", "#ev-desc");
                }

                var submitStatus = document.createElement("div");
                submitStatus.id = "submit-status";
                submitStatus.setAttribute("role", "status");
                submitStatus.setAttribute("aria-live", "polite");
                submitStatus.style.cssText =
                    "margin-top:var(--space-md);text-align:center;";
                main.appendChild(submitStatus);

                // Delete section
                var deleteSection = document.createElement("div");
                deleteSection.className = "admin-delete-section";
                var deleteHint = document.createElement("p");
                deleteHint.className = "admin-text--muted";
                deleteHint.style.cssText =
                    "font-size:12px;margin-bottom:var(--space-sm);";
                deleteHint.textContent =
                    "Permanently delete this evidence item and all its relations.";
                deleteSection.appendChild(deleteHint);

                var deleteBtn = document.createElement("button");
                deleteBtn.type = "button";
                deleteBtn.className = "admin-btn admin-btn--danger";
                deleteBtn.textContent = "Delete Evidence";
                deleteBtn.addEventListener("click", async function () {
                    if (
                        !confirm(
                            "Are you sure you want to permanently delete this evidence item? This cannot be undone.",
                        )
                    )
                        return;
                    deleteBtn.disabled = true;
                    deleteBtn.textContent = "Deleting…";
                    try {
                        await Admin.api.del("/evidence/" + evidenceId);
                        window.location.href = "index.html";
                    } catch (err) {
                        formError.textContent =
                            "Failed to delete: " + err.message;
                        formError.style.display = "block";
                        deleteBtn.disabled = false;
                        deleteBtn.textContent = "Delete Evidence";
                    }
                });
                deleteSection.appendChild(deleteBtn);
                main.appendChild(deleteSection);

                // ── Event handlers ─────────────────────────────────────────────────

                var titleInput = document.getElementById("ev-title");
                var slugInput = document.getElementById("ev-slug");
                var titleErr = document.getElementById("title-error");
                var slugErr = document.getElementById("slug-error");

                function clearErrors() {
                    formError.style.display = "none";
                    formError.textContent = "";
                    if (titleErr) {
                        titleErr.style.display = "none";
                        titleErr.textContent = "";
                    }
                    if (slugErr) {
                        slugErr.style.display = "none";
                        slugErr.textContent = "";
                    }
                    if (titleInput)
                        titleInput.classList.remove("admin-input--error");
                    if (slugInput)
                        slugInput.classList.remove("admin-input--error");
                }

                function validate() {
                    clearErrors();
                    var valid = true;
                    if (!titleInput.value.trim()) {
                        titleErr.textContent = "Title is required.";
                        titleErr.style.display = "block";
                        titleInput.classList.add("admin-input--error");
                        valid = false;
                    }
                    if (!slugInput.value.trim()) {
                        slugErr.textContent = "Slug is required.";
                        slugErr.style.display = "block";
                        slugInput.classList.add("admin-input--error");
                        valid = false;
                    }
                    return valid;
                }

                function buildPayload() {
                    return {
                        title: titleInput.value.trim(),
                        slug: slugInput.value.trim(),
                        description:
                            document.getElementById("ev-desc").value.trim() ||
                            undefined,
                        primary_verse:
                            document
                                .getElementById("ev-primary-verse")
                                .value.trim() || undefined,
                        secondary_verse:
                            document
                                .getElementById("ev-secondary-verse")
                                .value.trim() || undefined,
                        gospel_category:
                            document.getElementById("ev-gospel-cat").value ||
                            undefined,
                        timeline_era:
                            document.getElementById("ev-era").value ||
                            undefined,
                        timeline_period:
                            document.getElementById("ev-period").value.trim() ||
                            undefined,
                        map_location:
                            document
                                .getElementById("ev-map-loc")
                                .value.trim() || undefined,
                        map_x: document.getElementById("ev-map-x").value
                            ? parseFloat(
                                  document.getElementById("ev-map-x").value,
                              )
                            : undefined,
                        map_y: document.getElementById("ev-map-y").value
                            ? parseFloat(
                                  document.getElementById("ev-map-y").value,
                              )
                            : undefined,
                        metadata_keywords:
                            document
                                .getElementById("ev-keywords")
                                .value.trim() || undefined,
                        published_draft: document.getElementById("ev-publish")
                            .checked
                            ? 1
                            : 0,
                    };
                }

                saveBtn.addEventListener("click", async function () {
                    clearErrors();
                    submitStatus.textContent = "";
                    if (!validate()) {
                        titleInput.focus();
                        return;
                    }
                    saveBtn.disabled = true;
                    publishBtn.disabled = true;
                    submitStatus.textContent = "Saving…";
                    try {
                        await Admin.api.put(
                            "/evidence/" + evidenceId,
                            buildPayload(),
                        );
                        submitStatus.innerHTML =
                            '<span style="color:var(--admin-success)">Saved successfully.</span>';
                    } catch (err) {
                        formError.textContent =
                            "Failed to save: " + err.message;
                        formError.style.display = "block";
                    } finally {
                        saveBtn.disabled = false;
                        publishBtn.disabled = false;
                    }
                });

                publishBtn.addEventListener("click", async function () {
                    clearErrors();
                    submitStatus.textContent = "";
                    publishBtn.disabled = true;
                    saveBtn.disabled = true;

                    try {
                        await Admin.api.put(
                            "/evidence/" + evidenceId,
                            buildPayload(),
                        );
                    } catch (err) {
                        formError.textContent =
                            "Failed to save before publish: " + err.message;
                        formError.style.display = "block";
                        publishBtn.disabled = false;
                        saveBtn.disabled = false;
                        return;
                    }

                    try {
                        if (data.published_draft) {
                            await Admin.unpublishItem("evidence", evidenceId);
                            data.published_draft = 0;
                            publishBtn.textContent = "Publish";
                        } else {
                            await Admin.publishItem("evidence", evidenceId);
                            data.published_draft = 1;
                            publishBtn.textContent = "Unpublish";
                        }
                        document.getElementById("ev-publish").checked =
                            !!data.published_draft;
                        submitStatus.innerHTML =
                            '<span style="color:var(--admin-success)">' +
                            (data.published_draft
                                ? "Published!"
                                : "Unpublished.") +
                            "</span>";
                    } catch (err) {
                        formError.textContent =
                            "Publish action failed: " + err.message;
                        formError.style.display = "block";
                    } finally {
                        publishBtn.disabled = false;
                        saveBtn.disabled = false;
                    }
                });

                // Ctrl+Enter to save
                document.addEventListener("keydown", function (e) {
                    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
                        e.preventDefault();
                        saveBtn.click();
                    }
                });
            });
        </script>
    </body>
</html>
