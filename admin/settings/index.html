        <a class="admin-sidebar__link" href="../wikipedia/index.html">

        <a class="admin-sidebar__link" href="../essays/index.html">

      <a class="admin-sidebar__link" href="../debate/academic-challenges/index.html">

      <a class="admin-sidebar__link" href="../historiography/index.html">

        <a class="admin-sidebar__link" href="../blog/index.html">

        <a class="admin-sidebar__link" href="../news/index.html">

    <!-- ── Topbar ───────────────────────────────────────────────────────── -->
    <header class="admin-topbar">
      <h1 class="admin-topbar__title">Settings</h1>
    </header>

    <!-- ── Main Content ─────────────────────────────────────────────────── -->
    <main class="admin-main" id="settings-content">
      <div class="admin-loading">Loading settings…</div>
    </main>

  </div>

  <!-- ── Inline page script ────────────────────────────────────────────── -->
  <script>
    (async function () {
      const main = document.getElementById('settings-content');

      // Guard
      const ok = await AdminAuth.requireSession();
      if (!ok) {
        main.innerHTML = '<div class="admin-error" role="alert">Unable to verify session. Please check your connection and try again.</div>';
        return;
      }

      try {
        // Load current settings
        const about = await Admin.api.get('/about').catch(function () { return {}; });

        main.innerHTML = '';

        // Build the settings form
        const form = document.createElement('form');
        form.style.maxWidth = '600px';
        form.addEventListener('submit', saveSettings);

        // Site Title
        var group = buildFormGroup('Site Title', 'siteTitle', 'input', about.title || '');
        form.appendChild(group);

        // Site Description
        group = buildFormGroup('Site Description', 'siteDescription', 'textarea', about.description || '');
        form.appendChild(group);

        // Default OG Image URL
        group = buildFormGroup('Default OG Image URL', 'ogImage', 'input', about.ogImage || about.og_image || '');
        form.appendChild(group);

        // Save button
        var btnGroup = document.createElement('div');
        btnGroup.className = 'admin-form-group';
        btnGroup.style.marginTop = 'var(--space-lg)';

        var saveBtn = document.createElement('button');
        saveBtn.type = 'submit';
        saveBtn.className = 'admin-btn admin-btn--primary';
        saveBtn.textContent = 'Save Settings';
        btnGroup.appendChild(saveBtn);

        form.appendChild(btnGroup);
        main.appendChild(form);

        // Message area
        var msg = document.createElement('div');
        msg.id = 'settings-message';
        msg.setAttribute('role', 'status');
        msg.setAttribute('aria-live', 'polite');
        main.appendChild(msg);

      } catch (err) {
        main.innerHTML = '<div class="admin-error" role="alert">' + err.message + '</div>';
      }

      /* ── Helpers ─────────────────────────────────────────────────────── */

      function buildFormGroup(labelText, id, type, value) {
        var div = document.createElement('div');
        div.className = 'admin-form-group';

        var label = document.createElement('label');
        label.className = 'admin-form-group__label';
        label.setAttribute('for', 'field-' + id);
        label.textContent = labelText;
        div.appendChild(label);

        if (type === 'textarea') {
          var el = document.createElement('textarea');
          el.className = 'admin-textarea';
          el.id = 'field-' + id;
          el.name = id;
          el.value = value;
          el.rows = 4;
          div.appendChild(el);
        } else {
          var el = document.createElement('input');
          el.className = 'admin-input';
          el.type = 'text';
          el.id = 'field-' + id;
          el.name = id;
          el.value = value;
          div.appendChild(el);
        }

        return div;
      }

      async function saveSettings(e) {
        e.preventDefault();
        var msg = document.getElementById('settings-message');
        if (!msg) return;

        var payload = {
          title: document.getElementById('field-siteTitle').value.trim(),
          description: document.getElementById('field-siteDescription').value.trim(),
          ogImage: document.getElementById('field-ogImage').value.trim()
        };

        try {
          await Admin.api.put('/about', payload);
          msg.className = '';
          msg.style.color = 'var(--admin-success)';
          msg.style.marginTop = 'var(--space-md)';
          msg.textContent = 'Settings saved successfully.';
        } catch (err) {
          msg.className = 'admin-error';
          msg.setAttribute('role', 'alert');
          msg.style.marginTop = 'var(--space-md)';
          msg.textContent = 'Error: ' + err.message;
        }
      }
    })();
  </script>
</body>
