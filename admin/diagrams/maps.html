<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Maps Editor — Admin</title>
        <link rel="stylesheet" href="../assets/css/admin.css" />
        <link rel="stylesheet" href="../assets/css/admin-diagrams/maps.css" />
        <link
            rel="stylesheet"
            href="../assets/css/admin-diagrams/maps-holding-pen.css"
        />
        <script defer src="../assets/js/admin.js"></script>
        <script defer src="../assets/js/admin-http.js"></script>
        <script defer src="../assets/js/admin-maps/maps-render.js"></script>
        <script defer src="../assets/js/admin-maps/maps-era-utils.js"></script>
        <script
            defer
            src="../assets/js/admin-maps/maps-staged-changes.js"
        ></script>
        <script defer src="../assets/js/admin-maps/maps-pin-menu.js"></script>
        <script defer src="../assets/js/admin-maps/maps-pins.js"></script>
        <script defer src="../assets/js/admin-maps/maps-regions.js"></script>
        <script defer src="../assets/js/admin-maps/maps-gallery.js"></script>
        <script defer src="../assets/js/admin-maps/maps-metadata.js"></script>
        <script
            defer
            src="../assets/js/admin-maps/maps-holding-pen.js"
        ></script>
    </head>
    <body>
        <!-- ── Admin Top Bar ──────────────────────────────────────────────────────── -->
        <header class="admin-topbar">
            <h1>Maps Editor</h1>
            <a href="/admin/index.html" class="admin-topbar__back-link">← Dashboard</a>
            <span id="map-editor-title" class="admin-topbar__subtitle"
                >Loading…</span
            >
        </header>

        <!-- ── Maps Gallery ────────────────────────────────────────────────────────── -->
        <section
            id="maps-gallery"
            class="admin-maps-gallery"
            aria-label="All maps"
        >
            <h2>Maps</h2>
            <div id="maps-gallery-grid" class="admin-maps-gallery__grid"></div>
        </section>

        <!-- ── Toolbar ────────────────────────────────────────────────────────────── -->
        <nav class="admin-maps-toolbar" aria-label="Map editor tools" hidden>
            <div class="admin-maps-toolbar__left">
                <button
                    type="button"
                    id="maps-back-btn"
                    class="admin-maps-toolbar__btn admin-maps-toolbar__btn--secondary"
                    aria-label="Back to all maps"
                >
                    ← All Maps
                </button>

                <select
                    id="map-selector"
                    class="admin-maps-toolbar__select"
                    aria-label="Select map scale"
                >
                    <option value="">Loading maps…</option>
                </select>
            </div>

            <div class="admin-maps-toolbar__right">
                <button
                    type="button"
                    id="map-details-toggle"
                    class="admin-maps-toolbar__btn admin-maps-toolbar__btn--secondary"
                    aria-expanded="false"
                    aria-controls="map-details-panel"
                >
                    ▼ Map Details
                </button>
                <button
                    type="button"
                    id="holding-pen-save"
                    class="admin-maps-toolbar__btn admin-maps-toolbar__btn--primary admin-maps-toolbar__btn--save"
                >
                    <span class="admin-maps-toolbar__btn-label">Save</span>
                    <span
                        id="holding-pen-badge"
                        class="admin-maps-toolbar__btn-count"
                        aria-live="polite"
                    >0</span>
                </button>
            </div>
        </nav>

        <!-- ── Map Details Panel ──────────────────────────────────────────────────── -->
        <section
            id="map-details-panel"
            class="admin-maps-metadata"
            aria-label="Map details"
            hidden
        >
            <form
                id="map-details-form"
                class="admin-maps-metadata__form"
                novalidate
            >
                <div class="admin-maps-metadata__field">
                    <label for="map-details-name">Map Name</label>
                    <input
                        type="text"
                        id="map-details-name"
                        class="admin-maps-metadata__input"
                        maxlength="200"
                        placeholder="e.g. Galilee"
                        required
                    />
                </div>

                <div class="admin-maps-metadata__field">
                    <label for="map-details-description">Description</label>
                    <textarea
                        id="map-details-description"
                        class="admin-maps-metadata__input admin-maps-metadata__textarea"
                        rows="3"
                        maxlength="500"
                        placeholder="Describe this map…"
                    ></textarea>
                </div>

                <div class="admin-maps-metadata__field">
                    <label>Base Image</label>
                    <div class="admin-maps-metadata__image-preview">
                        <img
                            id="map-details-preview"
                            class="admin-maps-metadata__preview-img"
                            src=""
                            alt="Map preview"
                            hidden
                        />
                        <span
                            id="map-details-image-path"
                            class="admin-pin-panel__hint"
                            >(none)</span
                        >
                    </div>
                    <div class="admin-maps-metadata__file-row">
                        <label
                            for="map-image-replace"
                            class="admin-maps-metadata__file-label"
                        >
                            Replace Image
                            <input
                                type="file"
                                id="map-image-replace"
                                class="admin-maps-metadata__file-input"
                                accept="image/png,image/jpeg,image/gif,image/webp"
                            />
                        </label>
                    </div>
                </div>

                <div
                    id="map-details-error"
                    class="admin-pin-panel__error"
                    role="alert"
                    aria-live="assertive"
                ></div>

                <div class="admin-pin-panel__actions">
                    <button
                        type="button"
                        id="map-details-save"
                        class="admin-pin-panel__btn admin-pin-panel__btn--primary"
                    >
                        Save
                    </button>
                </div>
            </form>
        </section>

        <!-- ── Map Editor Canvas ──────────────────────────────────────────────────── -->
        <main hidden>
            <!-- ── Holding Pen ──────────────────────────────────────────────────── -->
            <section
                id="holding-pen"
                class="holding-pen admin-holding-pen-panel"
                aria-label="Unplaced evidence"
            >
                <p class="holding-pen__empty">Loading unplaced evidence…</p>
            </section>

            <div
                id="map-loading"
                class="admin-map-loading"
                role="status"
                aria-live="polite"
            >
                Loading map…
            </div>

            <div id="map-canvas" class="admin-map-canvas" hidden>
                <img
                    id="map-canvas-image"
                    class="admin-map-image"
                    src=""
                    alt=""
                />
                <div id="map-pins-layer" class="admin-map-pins-layer"></div>
            </div>
        </main>

        <!-- ── Pin Edit Panel ─────────────────────────────────────────────────────── -->
        <aside
            id="pin-edit-panel"
            class="admin-pin-panel"
            role="dialog"
            aria-label="Edit pin"
            aria-hidden="true"
        >
            <div class="admin-pin-panel__header">
                <h2 class="admin-pin-panel__title">Edit Pin</h2>
                <button
                    type="button"
                    id="pin-panel-close"
                    class="admin-pin-panel__close"
                    aria-label="Close pin editor"
                >
                    ✕
                </button>
            </div>

            <form id="pin-edit-form" class="admin-pin-panel__form" novalidate>
                <div class="admin-pin-panel__field">
                    <label for="pin-label-input">Label</label>
                    <input
                        type="text"
                        id="pin-label-input"
                        class="admin-pin-panel__input"
                        maxlength="200"
                        placeholder="e.g. Capernaum"
                    />
                </div>

                <div class="admin-pin-panel__field">
                    <label for="pin-evidence-input">Evidence ID</label>
                    <input
                        type="text"
                        id="pin-evidence-input"
                        class="admin-pin-panel__input"
                        inputmode="numeric"
                        pattern="[0-9]*"
                        placeholder="e.g. 42"
                        aria-describedby="pin-evidence-info"
                    />
                    <span
                        id="pin-evidence-info"
                        class="admin-pin-panel__hint"
                    ></span>
                </div>

                <!-- Geo-anchor fields (optional — derive x/y from lat/lng) -->
                <fieldset class="admin-pin-panel__fieldset">
                    <legend class="admin-pin-panel__legend">
                        Geographic Anchor
                    </legend>
                    <div class="admin-pin-panel__field-row">
                        <div
                            class="admin-pin-panel__field admin-pin-panel__field--half"
                        >
                            <label for="pin-lat-input">Latitude</label>
                            <input
                                type="text"
                                id="pin-lat-input"
                                class="admin-pin-panel__input"
                                inputmode="decimal"
                                placeholder="e.g. 32.8811"
                                aria-describedby="pin-geo-info"
                            />
                        </div>
                        <div
                            class="admin-pin-panel__field admin-pin-panel__field--half"
                        >
                            <label for="pin-lng-input">Longitude</label>
                            <input
                                type="text"
                                id="pin-lng-input"
                                class="admin-pin-panel__input"
                                inputmode="decimal"
                                placeholder="e.g. 35.5751"
                                aria-describedby="pin-geo-info"
                            />
                        </div>
                    </div>
                    <span
                        id="pin-geo-info"
                        class="admin-pin-panel__hint"
                    ></span>
                </fieldset>

                <div
                    id="pin-edit-error"
                    class="admin-pin-panel__error"
                    role="alert"
                    aria-live="assertive"
                ></div>

                <div class="admin-pin-panel__actions">
                    <button
                        type="button"
                        id="pin-save-btn"
                        class="admin-pin-panel__btn admin-pin-panel__btn--primary"
                    >
                        Save
                    </button>
                    <button
                        type="button"
                        id="pin-cancel-btn"
                        class="admin-pin-panel__btn admin-pin-panel__btn--secondary"
                    >
                        Cancel
                    </button>
                </div>

                <div class="admin-pin-panel__danger">
                    <button
                        type="button"
                        id="pin-delete-btn"
                        class="admin-pin-panel__btn admin-pin-panel__btn--danger"
                    >
                        Delete Pin
                    </button>
                </div>
            </form>
        </aside>

        <!-- ── Backdrop ────────────────────────────────────────────────────────────── -->
        <div
            id="pin-panel-backdrop"
            class="admin-pin-panel-backdrop"
            hidden
        ></div>

        <!-- ── Bootstrap ───────────────────────────────────────────────────────────── -->
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                // Guard: if the core admin scripts didn't load, fail visibly instead
                // of hanging on a permanent loading state.
                if (typeof window.Admin === "undefined") {
                    var loadingEl = document.getElementById("map-loading");
                    if (loadingEl) {
                        loadingEl.textContent =
                            "Editor failed to load. Check network connection and try refreshing.";
                        loadingEl.classList.add("admin-map-loading--error");
                    }
                    return;
                }

                // Once all deferred scripts have loaded, init each module.
                AdminMapsRender.init();
                AdminMapsPins.init();
                AdminMapsRegions.init();
                AdminMapsMetadata.init();
                AdminMapsHoldingPen.init();
                AdminMapsPinMenu.init();
                AdminMapsGallery.init();

                // Wire the Save button
                const saveBtn = document.getElementById("holding-pen-save");
                if (saveBtn) {
                    saveBtn.addEventListener("click", () => {
                        AdminMapsStaged.saveAll().then(() => {
                            // Reload holding pen after save (new pins may have used evidence)
                            const mapId = AdminMapsStaged._getCurrentMapId
                                ? AdminMapsStaged._getCurrentMapId()
                                : null;
                            if (mapId) AdminMapsHoldingPen.loadForMap(mapId);
                        });
                    });
                }

                // Wire the backdrop to close the panel.
                const backdropEl =
                    document.getElementById("pin-panel-backdrop");
                if (backdropEl) {
                    backdropEl.addEventListener("click", () => {
                        AdminMapsPins.closeEditPanel();
                    });
                }

                // Kick off: load maps list, then render the gallery.
                AdminMapsRegions.loadMaps().then(() => {
                    AdminMapsGallery.render();
                });

                // Sync backdrop visibility with panel state
                const observer = new MutationObserver(() => {
                    const panelEl = document.getElementById("pin-edit-panel");
                    const backdrop =
                        document.getElementById("pin-panel-backdrop");
                    if (panelEl && backdrop) {
                        const open = panelEl.classList.contains(
                            "admin-pin-panel--open",
                        );
                        backdrop.hidden = !open;
                        panelEl.setAttribute(
                            "aria-hidden",
                            open ? "false" : "true",
                        );
                    }
                });

                const panelEl = document.getElementById("pin-edit-panel");
                if (panelEl) {
                    observer.observe(panelEl, {
                        attributes: true,
                        attributeFilter: ["class"],
                    });
                }
            });
        </script>
    </body>
</html>
