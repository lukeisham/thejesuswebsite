<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maps Editor — Admin</title>
  <link rel="stylesheet" href="../assets/css/admin-diagrams/maps.css">
  <script defer src="../assets/js/admin-maps/maps-render.js"></script>
  <script defer src="../assets/js/admin-maps/maps-pins.js"></script>
  <script defer src="../assets/js/admin-maps/maps-regions.js"></script>
</head>
<body>

<!-- ── Admin Top Bar ──────────────────────────────────────────────────────── -->
<header class="admin-topbar">
  <h1>Maps Editor</h1>
  <span id="map-editor-title" class="admin-topbar__subtitle">Loading…</span>
</header>

<!-- ── Toolbar ────────────────────────────────────────────────────────────── -->
<nav class="admin-maps-toolbar" aria-label="Map editor tools">
  <div class="admin-maps-toolbar__left">
    <select id="map-selector" class="admin-maps-toolbar__select" aria-label="Select map scale">
      <option value="">Loading maps…</option>
    </select>

    <button type="button" id="map-prev-btn" class="admin-maps-toolbar__nav-btn" aria-label="Previous map" disabled>◀</button>
    <button type="button" id="map-next-btn" class="admin-maps-toolbar__nav-btn" aria-label="Next map" disabled>▶</button>
  </div>

  <div class="admin-maps-toolbar__right">
    <button type="button" id="add-pin-btn" class="admin-maps-toolbar__btn admin-maps-toolbar__btn--primary">
      Add Pin
    </button>
  </div>
</nav>

<!-- ── Map Editor Canvas ──────────────────────────────────────────────────── -->
<main>
  <div id="map-loading" class="admin-map-loading" role="status" aria-live="polite">
    Loading map…
  </div>

  <div id="map-canvas" class="admin-map-canvas" hidden>
    <img
      id="map-canvas-image"
      class="admin-map-image"
      src=""
      alt=""
    >
    <div id="map-pins-layer" class="admin-map-pins-layer"></div>
  </div>
</main>

<!-- ── Pin Edit Panel ─────────────────────────────────────────────────────── -->
<aside
  id="pin-edit-panel"
  class="admin-pin-panel"
  role="dialog"
  aria-label="Edit pin"
  aria-hidden="true"
>
  <div class="admin-pin-panel__header">
    <h2 class="admin-pin-panel__title">Edit Pin</h2>
    <button
      type="button"
      id="pin-panel-close"
      class="admin-pin-panel__close"
      aria-label="Close pin editor"
    >✕</button>
  </div>

  <form id="pin-edit-form" class="admin-pin-panel__form" novalidate>
    <div class="admin-pin-panel__field">
      <label for="pin-label-input">Label</label>
      <input
        type="text"
        id="pin-label-input"
        class="admin-pin-panel__input"
        maxlength="200"
        placeholder="e.g. Capernaum"
      >
    </div>

    <div class="admin-pin-panel__field">
      <label for="pin-evidence-input">Evidence ID</label>
      <input
        type="text"
        id="pin-evidence-input"
        class="admin-pin-panel__input"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="e.g. 42"
        aria-describedby="pin-evidence-info"
      >
      <span id="pin-evidence-info" class="admin-pin-panel__hint"></span>
    </div>

    <div
      id="pin-edit-error"
      class="admin-pin-panel__error"
      role="alert"
      aria-live="assertive"
    ></div>

    <div class="admin-pin-panel__actions">
      <button type="button" id="pin-save-btn" class="admin-pin-panel__btn admin-pin-panel__btn--primary">
        Save
      </button>
      <button type="button" id="pin-cancel-btn" class="admin-pin-panel__btn admin-pin-panel__btn--secondary">
        Cancel
      </button>
    </div>

    <div class="admin-pin-panel__danger">
      <button type="button" id="pin-delete-btn" class="admin-pin-panel__btn admin-pin-panel__btn--danger">
        Delete Pin
      </button>
    </div>
  </form>
</aside>

<!-- ── Backdrop ────────────────────────────────────────────────────────────── -->
<div id="pin-panel-backdrop" class="admin-pin-panel-backdrop" hidden></div>

<!-- ── Bootstrap ───────────────────────────────────────────────────────────── -->
<script>
  (function () {
    // Once all deferred scripts have loaded, init each module.
    AdminMapsRender.init();
    AdminMapsPins.init();
    AdminMapsRegions.init();

    // Wire the backdrop to close the panel.
    var backdrop = document.getElementById("pin-panel-backdrop");
    if (backdrop) {
      backdrop.addEventListener("click", function () {
        AdminMapsPins.closeEditPanel();
      });
    }

    // Kick off: load maps list, then switch to the first map.
    AdminMapsRegions.loadMaps().then(function () {
      var maps = AdminMapsRegions.getMaps();
      if (maps.length > 0) {
        return AdminMapsRegions.switchToMap(maps[0].map_key);
      }
    });

    // Sync backdrop visibility with panel state
    var observer = new MutationObserver(function () {
      var panel = document.getElementById("pin-edit-panel");
      var backdrop = document.getElementById("pin-panel-backdrop");
      if (panel && backdrop) {
        var open = panel.classList.contains("admin-pin-panel--open");
        backdrop.hidden = !open;
        panel.setAttribute("aria-hidden", open ? "false" : "true");
      }
    });

    var panel = document.getElementById("pin-edit-panel");
    if (panel) {
      observer.observe(panel, { attributes: true, attributeFilter: ["class"] });
    }
  })();
</script>

</body>
</html>
