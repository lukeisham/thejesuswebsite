<!doctype html>
<html lang="en">
    <!-- =============================================================================

     THE JESUS WEBSITE — DASHBOARD
     File:    admin/frontend/dashboard.html
     Version: 1.0.0
     Purpose: Post-login dashboard shell with static header and empty nav containers.
              On DOMContentLoaded, dashboard_auth.js verifies the session cookie
              (redirecting back to admin.html if invalid), then dashboard_init.js
              renders the module tab bar via renderTabBar() and loads the default
              module (records-all) into #admin-canvas.
     Source:  guide_dashboard_appearance.md §7.1

============================================================================= -->

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard | The Jesus Website</title>

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="../../assets/favicon.png" />

        <!-- Core Stylesheets -->
        <link rel="stylesheet" href="../../css/1.0_foundation/dashboard/admin_typography_base.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/dashboard/admin_grid_base.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/dashboard/admin_typography.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/dashboard/admin_buttons.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/dashboard/admin_forms.css" />

        <!-- Admin Specific Stylesheets (Shell & Components) -->
        <link rel="stylesheet" href="../../css/7.0_system/dashboard/auth_login.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/dashboard/admin_shell.css" id="dashboard-admin-css-link" />
        <link rel="stylesheet" href="../../css/1.0_foundation/dashboard/admin_components.css" />

        <!-- Admin Edit Modules Stylesheets -->
        <link rel="stylesheet" href="../../css/2.0_records/dashboard/edit_records.css" />
        <link rel="stylesheet" href="../../css/3.0_visualizations/dashboard/edit_diagram.css" />
        <link rel="stylesheet" href="../../css/4.0_ranked_lists/dashboard/shared_ranks.css" />
        <link rel="stylesheet" href="../../css/4.0_ranked_lists/dashboard/edit_wikipedia.css" />
        <link rel="stylesheet" href="../../css/4.0_ranked_lists/dashboard/edit_challenges.css" />
        <link rel="stylesheet" href="../../css/5.0_essays_responses/dashboard/edit_essays.css" />
        <link rel="stylesheet" href="../../css/5.0_essays_responses/dashboard/edit_responses.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/dashboard/markdown.css" />
        <link rel="stylesheet" href="../../css/6.0_news_blog/dashboard/edit_blog.css" />
        <link rel="stylesheet" href="../../css/6.0_news_blog/dashboard/edit_news.css" />
    </head>
    <body class="dashboard admin-body admin-dashboard-container">
        <header class="admin-header">
            <h1>The JesusWebsite Dashboard</h1>
            <a href="/" class="admin-return-link">Return to Site</a>
            <button id="logout-btn" class="admin-logout-btn">Logout</button>
        </header>

        <nav id="module-tab-bar">
            <!-- Populated on DOMContentLoaded by dashboard_init.js → renderTabBar() -->
        </nav>

        <main class="admin-canvas" id="admin-canvas">
            <!-- Populated by dashboard_app.js → loadModule() -->
        </main>

        <!-- Admin System Scripts (load order per dashboard_page_split plan §T2) -->
        <script src="../../js/7.0_system/dashboard/load_middleware.js"></script>
        <script src="../../js/7.0_system/dashboard/dashboard_auth.js"></script>
        <script src="../../js/7.0_system/dashboard/logout_middleware.js"></script>
        <script src="../../js/7.0_system/dashboard/dashboard_app.js"></script>
        <script src="../../js/7.0_system/dashboard/dashboard_init.js"></script>
        <script src="../../js/7.0_system/dashboard/render_tab_bar.js"></script>

        <!-- Admin Edit Module Scripts -->
        <script src="../../js/2.0_records/dashboard/edit_picture.js"></script>
        <script src="../../js/2.0_records/dashboard/edit_links.js"></script>
        <script src="../../js/2.0_records/dashboard/edit_record.js"></script>
        <script src="../../js/2.0_records/dashboard/edit_bulk_upload.js"></script>
        <script src="../../js/6.0_news_blog/dashboard/edit_blogpost.js"></script>
        <script src="../../js/6.0_news_blog/dashboard/edit_news_snippet.js"></script>
        <script src="../../js/6.0_news_blog/dashboard/edit_news_sources.js"></script>
        <script src="../../js/5.0_essays_responses/dashboard/edit_essay.js"></script>
        <script src="../../js/5.0_essays_responses/dashboard/edit_historiography.js"></script>
        <script src="../../js/5.0_essays_responses/dashboard/edit_response.js"></script>
        <script src="../../js/4.0_ranked_lists/dashboard/edit_wiki_weights.js"></script>

        <script src="../../js/4.0_ranked_lists/dashboard/edit_popular_weights.js"></script>
        <script src="../../js/2.0_records/dashboard/edit_lists.js"></script>
        <script src="../../js/3.0_visualizations/dashboard/edit_diagram.js"></script>
        <script src="../../js/5.0_essays_responses/dashboard/edit_mla_sources.js"></script>

</html>
