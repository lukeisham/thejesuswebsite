<!doctype html>
<!-- =============================================================================
   THE JESUS WEBSITE — ADMIN DASHBOARD SHELL
   File:    admin/frontend/dashboard.html
   Version: 1.2.0
   Purpose: Main dashboard grid orchestrator — session-guarded entry point for all
            admin modules. Contains the Providence 2-column work canvas (optional
            sidebar + main work area) with a permanent 1px divider track between
            them, a 11-card module navigation landing area, universal header, and
            error/status footer. Shared dashboard widgets are loaded from
            js/9.0_cross_cutting/dashboard/ and css/9.0_cross_cutting/dashboard/.
   Trigger: Redirected here from login.html after successful authentication.
   Output:  Dashboard orchestrator initializes session check, renders cards,
            header, and error footer. Module loads replace card grid with the
            Providence 2-column work layout.
============================================================================= -->
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="robots" content="noindex, nofollow" />
        <title>The Jesus Website — Admin Dashboard</title>
        <link rel="icon" href="../../assets/favicon.png" />

        <!-- Providence Theme Foundation -->
        <link rel="stylesheet" href="../../css/1.0_foundation/typography.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/shell.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/grid.css" />

        <!-- Dashboard Core Styles -->
        <link

            rel="stylesheet"

        />

        <!-- Challenge Dashboard Styles (4.0) -->
        <link
            rel="stylesheet"
            href="../../css/4.0_ranked_lists/dashboard/dashboard_challenge.css"
        />

        <!-- Wikipedia Dashboard Styles (4.0) -->
        <link
            rel="stylesheet"
            href="../../css/4.0_ranked_lists/dashboard/dashboard_wikipedia.css"
        />

        <!-- Unified WYSIWYG Dashboard Styles (9.0, cross-cutting) -->
        <link
            rel="stylesheet"
            href="../../css/9.0_cross_cutting/dashboard/wysiwyg_editor.css"
        />
        <link
            rel="stylesheet"
            href="../../css/9.0_cross_cutting/dashboard/wysiwyg_dashboard_layout.css"
        />

        <!-- News Sources Dashboard Styles (6.0) -->
        <link
            rel="stylesheet"
            href="../../css/6.0_news_blog/dashboard/news_sources_dashboard.css"
        />

        <!-- Shared Widget CSS (9.0 Cross-Cutting) -->
        <link
            rel="stylesheet"
            href="../../css/9.0_cross_cutting/dashboard/picture_widget.css"
        />
        <link
            rel="stylesheet"
            href="../../css/9.0_cross_cutting/dashboard/mla_widget.css"
        />
        <link
            rel="stylesheet"
            href="../../css/9.0_cross_cutting/dashboard/context_links_widget.css"
        />
        <link
            rel="stylesheet"
            href="../../css/9.0_cross_cutting/dashboard/external_refs_widget.css"
        />
        <link
            rel="stylesheet"
            href="../../css/9.0_cross_cutting/dashboard/metadata_widget.css?v=1.2.0"
        />

        <!-- System Dashboard Styles (7.0) -->
        <link
            rel="stylesheet"
            href="../../css/7.0_system/dashboard/dashboard_system.css"
        />
    </head>
    <body id="admin-dashboard">
        <!-- =====================================================================
       UNIVERSAL HEADER
       Injected by dashboard_universal_header.js at init time.
       Contains: double favicon, title, Return/Dashboard/Logout nav links.
    ===================================================================== -->
        <header id="admin-header" aria-label="Admin navigation header">
            <!-- Populated by dashboard_universal_header.js -->
        </header>

        <!-- =====================================================================
       MODULE TAB BAR
       Horizontal tab strip for switching between loaded modules.
       Active tab is highlighted via .is-active class.
    ===================================================================== -->
        <nav
            id="module-tab-bar"
            role="tablist"
            aria-label="Dashboard module tabs"
        >
            <!-- Populated dynamically by dashboard_app.js -->
        </nav>

        <!-- =====================================================================
       DASHBOARD CARDS LANDING AREA
       11 cards in a 3x3 + 1 centered bottom row grid.
       Visible on initial load / when no module is active.
       Replaced by Providence work canvas when a module is loaded.
    ===================================================================== -->
        <section id="admin-cards" aria-label="Module navigation cards">
            <!-- Populated by display_dashboard_cards.js -->
        </section>

        <!-- =====================================================================
       PROVIDENCE 2-COLUMN WORK CANVAS
       Hidden on landing. Shown when a module is loaded via loadModule().
       Two content columns with a permanent 1px divider track:
         [sidebar] | [main work area]
       CSS custom property hooks (--sidebar-width, --main-width) let modules
       request custom column widths at render time via _setLayoutColumns().
    ===================================================================== -->
        <main id="admin-canvas" aria-label="Module work area">
            <!-- Sidebar Column (default 280px, overridable) -->
            <section
                id="providence-col-sidebar"
                class="providence-col"
                aria-label="Sidebar"
            >
                <!-- Populated by module render functions via _setColumn() -->
            </section>

            <!-- Divider: sidebar | main -->
            <div
                id="providence-divider"
                class="providence-divider"
                aria-hidden="true"
            ></div>

            <!-- Drag Handle: resizable sidebar width -->
            <div
                id="providence-drag-handle"
                class="sidebar-resize-handle"
                aria-hidden="true"
                title="Drag to resize sidebar"
            ></div>

            <!-- Main Work Area (default 1fr) -->
            <section
                id="providence-col-main"
                class="providence-col"
                aria-label="Main work area"
            >
                <!-- Populated by module render functions via _setColumn() -->
            </section>
        </main>

        <!-- =====================================================================
       ERROR / STATUS FOOTER
       Fixed at the bottom of the viewport. Displays the most recent
       status or error message with timestamp. Injected by
       display_error_footer.js; messages routed via window.surfaceError().
    ===================================================================== -->
        <footer
            id="admin-error-footer"
            role="status"
            aria-live="polite"
            aria-label="Status and error messages"
        >
            <!-- Populated by display_error_footer.js -->
        </footer>

        <!-- =====================================================================
       SCRIPTS — Load order matters.
       1. Shared error handler (must be first — other scripts depend on it)
       2. Session middleware (verifyAdminSession page guard)
       3. Dashboard app core (module router + column hooks)
       4. Sidebar resize utility (initSidebarResize — must load after dashboard_app.js)
       5. Sidebar resize init wrapper (patches _setLayoutColumns — must load after utility)
       6. Header injection + logout
       7. Card rendering
       8. Error footer injection
       9. Dashboard orchestrator (init + session check)
      10. Shared tools (2.0 Records — consumed by 5.0, 6.0 modules)
      11. Essay & Historiography module scripts (5.0)
    ===================================================================== -->
        <script src="../../js/admin_core/error_handler.js"></script>
        <script src="../../js/admin_core/autogen_snippet.js"></script>
        <script src="../../js/admin_core/autogen_slug.js"></script>
        <script src="../../js/admin_core/autogen_meta.js"></script>
        <script src="../../js/admin_core/sidebar_save_metadata.js"></script>
        <script src="../../js/admin_core/sidebar_term_chips.js"></script>
        <script src="../../js/7.0_system/dashboard/load_middleware.js"></script>
        <script src="../../js/7.0_system/dashboard/dashboard_app.js"></script>
        <script src="../../js/7.0_system/dashboard/dashboard_sidebar_resize.js"></script>
        <script src="../../js/7.0_system/dashboard/dashboard_sidebar_resize_init.js"></script>
        <script src="../../js/7.0_system/dashboard/dashboard_universal_header.js"></script>
        <script src="../../js/7.0_system/dashboard/display_dashboard_cards.js"></script>
        <script src="../../js/7.0_system/dashboard/display_error_footer.js"></script>
        <script src="../../js/7.0_system/dashboard/dashboard_orchestrator.js"></script>

        <!-- Shared Tools (9.0 Cross-Cutting — formerly owned by plan_dashboard_records_single) -->
        <script src="../../js/9.0_cross_cutting/dashboard/picture_handler.js"></script>
        <script src="../../js/9.0_cross_cutting/dashboard/mla_source_handler.js"></script>
        <script src="../../js/9.0_cross_cutting/dashboard/context_link_handler.js"></script>
        <script src="../../js/9.0_cross_cutting/dashboard/external_refs_handler.js"></script>
        <script src="../../js/2.0_records/dashboard/url_array_editor.js"></script>
        <script src="../../js/2.0_records/dashboard/snippet_generator.js"></script>
        <script src="../../js/9.0_cross_cutting/dashboard/metadata_widget.js?v=1.2.0"></script>

        <!-- Records Module (2.0) -->
        <script src="../../js/2.0_records/dashboard/dashboard_records_all.js"></script>
        <script src="../../js/2.0_records/dashboard/dashboard_records_single.js"></script>

        <!-- Arbor Diagram Module (3.0) -->
        <script src="../../js/3.0_visualizations/dashboard/fetch_arbor_data.js"></script>
        <script src="../../js/3.0_visualizations/dashboard/render_arbor_node.js"></script>
        <script src="../../js/3.0_visualizations/dashboard/draw_arbor_connections.js"></script>
        <script src="../../js/3.0_visualizations/dashboard/handle_node_drag.js"></script>
        <script src="../../js/3.0_visualizations/dashboard/update_node_parent.js"></script>
        <script src="../../js/3.0_visualizations/dashboard/dashboard_arbor.js"></script>

        <!-- Challenge Module (4.0) -->
        <script src="../../js/4.0_ranked_lists/dashboard/challenge_response_list_display.js"></script>
        <script src="../../js/4.0_ranked_lists/dashboard/challenge_response_load_content.js"></script>
        <script src="../../js/4.0_ranked_lists/dashboard/challenge_response_status_handler.js"></script>
        <script src="../../js/4.0_ranked_lists/dashboard/dashboard_challenge_response.js"></script>
        <script src="../../js/4.0_ranked_lists/dashboard/challenge_list_display.js"></script>
        <script src="../../js/4.0_ranked_lists/dashboard/challenge_weighting_handler.js"></script>

        <script src="../../js/6.0_news_blog/dashboard/news_sources_handler.js"></script>
        <script src="../../js/6.0_news_blog/dashboard/news_sources_sidebar_handler.js"></script>
        <script src="../../js/6.0_news_blog/dashboard/launch_news_crawler.js"></script>
        <script src="../../js/6.0_news_blog/dashboard/dashboard_news_sources.js"></script>

        <!-- Shared Dashboard Tools (owned by plan_standardize_dashboard_buttons) -->
        <script src="../../js/7.0_system/dashboard/gather_trigger.js"></script>
        <script src="../../js/7.0_system/dashboard/field_persistence.js"></script>

        <!-- System Dashboard Module (7.0) -->
        <script src="../../js/7.0_system/dashboard/dashboard_system.js"></script>
        <script src="../../js/7.0_system/dashboard/display_system_data.js"></script>

</html>
