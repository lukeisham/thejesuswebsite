<!doctype html>
<!-- =============================================================================
   THE JESUS WEBSITE — NEWS DASHBOARD EDITOR
   File:    admin/frontend/dashboard_news_sources.html
   Version: 2.0.0
   Module:  6.0 — News & Blog
   Purpose: Dual-pane News dashboard. Main area displays ranked news articles
            found by the crawler (type=news_article, sub-type=NULL). Sidebar
            edits the source configuration (sub-type=news_source) and search
            terms (sub-type=news_search_term) for the selected article group.
            All rows in a group share the same ULID id. Save Draft / Publish /
            Delete / Gather buttons control the draft/publish cycle and
            automated news ingestion.
   Trigger: Loaded via fetch by dashboard_news_sources.js and injected into the
            Providence main column.
============================================================================= -->

<!-- FUNCTION BAR -->
<section id="news-function-bar" class="function-bar" aria-label="News actions">
    <div class="function-bar__actions-group">
        <button id="btn-save-draft" class="btn btn--draft" type="button">
            Save Draft
        </button>
        <button id="btn-publish" class="btn btn--publish" type="button">
            Publish
        </button>
        <button id="btn-delete" class="btn btn--delete" type="button">
            Delete
        </button>
        <button id="btn-gather" class="btn btn--accent" type="button">
            Gather
        </button>
    </div>
</section>

<!-- SPLIT-PANE LAYOUT -->
<article
    id="news-editor-layout"
    class="news-editor-layout"
    aria-label="News editor"
>
    <!-- SIDEBAR: Source Config + Search Terms -->
    <aside
        id="news-sidebar"
        class="news-sidebar"
        aria-label="Source configuration"
    >
        <header class="news-sidebar__header">
            <h2 class="news-sidebar__heading">SOURCE CONFIG</h2>
            <p id="news-record-title" class="news-sidebar__record-title">—</p>
        </header>

        <!-- Source URL -->
        <section
            id="news-source-section"
            class="news-sidebar__section"
            aria-label="Source URL"
        >
            <header class="news-sidebar__subheader">
                <h3 class="news-sidebar__subheading">Source URL</h3>
            </header>
            <div class="news-source-url__form">
                <input
                    id="news-source-url-input"
                    class="news-source-url__input"
                    type="url"
                    placeholder="https://example.com/rss"
                    aria-label="News source URL"
                />
                <button
                    id="btn-news-save-url"
                    class="btn btn--draft"
                    type="button"
                >
                    Save URL
                </button>
            </div>
        </section>

        <hr class="news-sidebar__divider" aria-hidden="true" />

        <!-- Search Terms (separate sub-type rows) -->
        <section
            id="news-search-terms-section"
            class="news-sidebar__section"
            aria-label="Search terms"
        >
            <header class="news-sidebar__subheader">
                <h3 class="news-sidebar__subheading">Search Terms</h3>
            </header>
            <div class="news-search-terms__editor">
                <ul
                    id="news-search-terms-list"
                    class="news-search-terms__list"
                    aria-label="Active search terms"
                ></ul>
                <div class="news-search-terms__add-row">
                    <input
                        id="news-search-term-input"
                        class="news-search-terms__add-input"
                        type="text"
                        placeholder="Add search term..."
                        aria-label="New search term"
                    />
                    <button
                        id="btn-news-add-term"
                        class="btn btn--draft"
                        type="button"
                    >
                        Add
                    </button>
                </div>
            </div>
        </section>

        <hr class="news-sidebar__divider" aria-hidden="true" />

        <!-- Metadata Widget -->
        <section
            id="metadata-widget-container"
            class="news-sidebar__section"
            aria-label="Metadata widget"
        ></section>
    </aside>

    <!-- Divider -->
    <div class="news-divider" aria-hidden="true"></div>

    <!-- MAIN: Articles Table -->
    <section
        id="news-list-area"
        class="news-list-area"
        aria-label="News articles list"
    >
        <div id="news-list-loading" class="state-loading" role="status">
            <span class="state-loading__label">Loading articles...</span>
        </div>

        <table
            id="news-articles-table"
            class="news-articles-table"
            aria-label="News articles"
        >
            <thead>
                <tr>
                    <th
                        scope="col"
                        class="news-articles-table__th news-articles-table__th--title"
                    >
                        Article Title
                    </th>
                    <th
                        scope="col"
                        class="news-articles-table__th news-articles-table__th--link"
                    >
                        Link
                    </th>
                    <th
                        scope="col"
                        class="news-articles-table__th news-articles-table__th--crawled"
                    >
                        Last Crawled
                    </th>
                    <th
                        scope="col"
                        class="news-articles-table__th news-articles-table__th--status"
                    >
                        Status
                    </th>
                    <th
                        scope="col"
                        class="news-articles-table__th news-articles-table__th--select"
                    >
                        <span class="sr-only">Select</span>
                    </th>
                </tr>
            </thead>
            <tbody id="news-articles-table-body">
                <!-- Dynamically populated -->
            </tbody>
        </table>

        <div id="news-list-empty" class="state-empty" aria-hidden="true">
            <p class="state-empty__label">
                No articles found. Configure a source and run the crawler.
            </p>
        </div>

        <div id="news-list-error" class="state-error" aria-hidden="true">
            <p class="state-error__label">Unable to load articles list.</p>
        </div>
    </section>
</article>
