<!-- =============================================================================
   THE JESUS WEBSITE — WIKIPEDIA DASHBOARD EDITOR
   File:    admin/frontend/dashboard_wikipedia.html
   Version: 1.0.0
   Module:  4.0 — Ranked Lists
   Purpose: Wikipedia list management container — dual-pane layout with a
            contextual record-detail sidebar (title, slug, weighting criteria
            list matching Challenge styling, search terms textarea matching
            Challenge styling, snippet/slug/meta editing with auto-gen
            buttons, and per-record recalculate) alongside a main scrollable
            list of ranked Wikipedia articles. Refresh/Publish buttons
            control the draft/publish cycle.
   Trigger: Loaded via fetch by dashboard_wikipedia.js and injected into the
            Providence main column when the user navigates to the Wikipedia
            module.
============================================================================= -->

<!-- =============================================================================
   FUNCTION BAR — Wikipedia actions
   Sticky bar with Refresh, Publish, and Recalculate buttons.
============================================================================= -->
<section
    id="wikipedia-function-bar"
    class="function-bar"
    aria-label="Wikipedia actions"
>
    <!-- Actions Group -->
    <div class="function-bar__actions-group">
        <button
            id="btn-save-draft"
            class="btn btn--draft"
            type="button"
            title="Save sidebar state as draft"
        >
            Save Draft
        </button>
        <button
            id="btn-publish"
            class="btn btn--publish"
            type="button"
            title="Publish current ranked order to live site"
        >
            Publish
        </button>
        <button
            id="btn-delete"
            class="btn btn--delete"
            type="button"
            title="Delete the selected record"
        >
            Delete
        </button>
        <button
            id="btn-gather"
            class="btn btn--accent"
            type="button"
            title="Gather new Wikipedia articles from pipeline"
        >
            Gather
        </button>
        <button
            id="btn-calculate"
            class="btn btn--secondary"
            type="button"
            title="Re-rank list using saved weights"
        >
            Calculate
        </button>
    </div>
</section>

<!-- =============================================================================
   SPLIT-PANE LAYOUT — Record-detail sidebar + Wikipedia list main area
   Two columns: sidebar (record detail: info, weight, search terms, metadata,
   actions) | main (ranked Wikipedia article list).
   CSS Grid for macro layout; Flexbox for micro alignment within columns.
============================================================================= -->
<article
    id="wikipedia-editor-layout"
    class="wikipedia-editor-layout"
    aria-label="Wikipedia editor"
>
    <!-- Sidebar Column: Record Detail -->
    <aside
        id="wikipedia-sidebar"
        class="wikipedia-sidebar"
        aria-label="Record detail"
    >
        <header class="wikipedia-sidebar__header">
            <h2 class="wikipedia-sidebar__heading">RECORD DETAIL</h2>
        </header>

        <!-- Section 1: Record Info (read-only) -->
        <section
            id="wikipedia-record-info"
            class="wikipedia-sidebar__section"
            aria-label="Record information"
        >
            <header class="wikipedia-sidebar__subheader">
                <h3 class="wikipedia-sidebar__subheading">Record</h3>
            </header>
            <div class="wikipedia-record-info__content">
                <p
                    id="wikipedia-record-title"
                    class="wikipedia-record-info__title"
                >
                    —
                </p>
                <p
                    id="wikipedia-record-slug"
                    class="wikipedia-record-info__slug"
                >
                    —
                </p>
            </div>
        </section>

        <hr class="wikipedia-sidebar__divider" aria-hidden="true" />

        <!-- Section 2: Wikipedia Weight (matching Challenge weighting criteria list style) -->
        <section
            id="wikipedia-weight-editor"
            class="wikipedia-sidebar__section"
            aria-label="Wikipedia weight editor"
        >
            <header class="wikipedia-sidebar__subheader">
                <h3 class="wikipedia-sidebar__subheading">Wikipedia Weight</h3>
            </header>
            <!-- Weighting Criteria List — populated by wikipedia_weights.js -->
            <div
                id="wikipedia-weighting-list"
                class="wikipedia-weighting-list"
                aria-label="Weighting criteria"
            >
                <!-- Dynamically populated -->
            </div>

            <!-- New Weighting Criterion Form -->
            <div id="wikipedia-new-weight" class="wikipedia-new-weight">
                <div class="wikipedia-new-weight__form">
                    <input
                        id="wikipedia-new-weight-name"
                        class="wikipedia-new-weight__name"
                        type="text"
                        placeholder="New name"
                        aria-label="New weight name"
                    />
                    <input
                        id="wikipedia-new-weight-value"
                        class="wikipedia-new-weight__value"
                        type="number"
                        min="0"
                        max="100"
                        step="1"
                        placeholder="Val"
                        aria-label="New weight value"
                    />
                    <button
                        id="btn-wikipedia-add-weight"
                        class="btn btn--draft"
                        type="button"
                        title="Add new weighting criterion"
                    >
                        Add
                    </button>
                </div>
            </div>
        </section>

        <hr class="wikipedia-sidebar__divider" aria-hidden="true" />

        <!-- Section 3: Wikipedia Search Terms (matching Challenge search terms textarea style) -->
        <section
            id="wikipedia-search-terms"
            class="wikipedia-sidebar__section"
            aria-label="Wikipedia search terms"
        >
            <header class="wikipedia-sidebar__subheader">
                <h3 class="wikipedia-sidebar__subheading">Search Terms</h3>
            </header>

            <!-- Saved Search Terms Overview — read-only list, matching Challenge pattern -->
            <div class="wikipedia-search-terms-overview">
                <ul
                    id="wikipedia-search-terms-overview-list"
                    class="wikipedia-search-terms-overview-list"
                    aria-label="Saved search terms"
                >
                    <!-- Dynamically populated by wikipedia_sidebar_handler.js -->
                </ul>
            </div>

            <div class="wikipedia-search-terms__editor">
                <textarea
                    id="wikipedia-search-terms-input"
                    class="wikipedia-search-terms__textarea"
                    rows="4"
                    placeholder="Enter search terms (one per line or comma-separated).&#10;These are used to discover Wikipedia articles."
                    aria-label="Search terms editor"
                ></textarea>
                <span
                    id="wikipedia-search-terms-hint"
                    class="wikipedia-search-terms__hint"
                    >Currently editing:
                    <strong id="wikipedia-search-terms-field-label"
                        >Wikipedia</strong
                    >
                    search terms</span
                >
            </div>
        </section>

        <hr class="wikipedia-sidebar__divider" aria-hidden="true" />

        <!-- Section 4: Metadata (Slug / Snippet / Keywords) -->
        <section
            id="wikipedia-metadata-container"
            class="wikipedia-sidebar__section"
            aria-label="Metadata editor"
        >
            <!-- Standardized metadata widget injected here by wikipedia_sidebar_handler.js -->
        </section>

        <hr class="wikipedia-sidebar__divider" aria-hidden="true" />

        <!-- Section 5: Actions -->
        <section
            id="wikipedia-actions"
            class="wikipedia-sidebar__section"
            aria-label="Record actions"
        >
            <button
                id="btn-wikipedia-recalculate-record"
                class="btn btn--secondary btn--full"
                type="button"
                title="Recalculate Wikipedia data for this record"
            >
                Recalculate This Record
            </button>
        </section>
    </aside>

    <!-- Divider between sidebar and main -->
    <div class="wikipedia-divider" aria-hidden="true"></div>

    <!-- Main Column: Ranked Wikipedia List -->
    <section
        id="wikipedia-list-area"
        class="wikipedia-list-area"
        aria-label="Wikipedia list"
    >
        <!-- Loading State -->
        <div id="wikipedia-list-loading" class="state-loading" role="status">
            <span class="state-loading__label"
                >Loading Wikipedia articles...</span
            >
        </div>

        <!-- Wikipedia List Container — populated by wikipedia_list_display.js -->
        <ol
            id="wikipedia-ranked-list"
            class="wikipedia-ranked-list"
            aria-label="Ranked Wikipedia articles"
        >
            <!-- Dynamically populated -->
        </ol>

        <!-- Empty State -->
        <div id="wikipedia-list-empty" class="state-empty" aria-hidden="true">
            <p class="state-empty__label">
                No Wikipedia articles found. Run "Recalculate All" to fetch data
                from Wikipedia.
            </p>
        </div>

        <!-- Error State -->
        <div id="wikipedia-list-error" class="state-error" aria-hidden="true">
            <p class="state-error__label">Unable to load Wikipedia list.</p>
        </div>
    </section>
</article>
