<!doctype html>
<html lang="en">
    <!-- =============================================================================

     THE JESUS WEBSITE — ADMIN PORTAL
     File:    admin/frontend/admin.html
     Version: 1.1.0
     Purpose: Secure entry portal for admin editing features and dashboard shell.
     Source:  guide_dashboard_appearance.md §6.1

============================================================================= -->

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin Portal | The Jesus Website</title>

        <!-- Core Stylesheets -->
        <link rel="stylesheet" href="../../css/1.0_foundation/typography.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/grid.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/elements/buttons.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/elements/forms.css" />

        <!-- Admin Specific Stylesheets (Shell & Components) -->
        <link rel="stylesheet" href="../../css/7.0_system/dashboard/auth_login.css" />
        <link rel="stylesheet" href="../../css/7.0_system/dashboard/admin_shell.css" id="dashboard-admin-css-link" />
        <link rel="stylesheet" href="../../css/7.0_system/dashboard/admin_components.css" />

        <!-- Admin Edit Modules Stylesheets -->
        <link rel="stylesheet" href="../../css/2.0_records/dashboard/edit_records.css" />
        <link rel="stylesheet" href="../../css/3.0_visualizations/dashboard/edit_diagram.css" />
        <link rel="stylesheet" href="../../css/4.0_ranked_lists/dashboard/shared_ranks.css" />
        <link rel="stylesheet" href="../../css/4.0_ranked_lists/dashboard/edit_wikipedia.css" />
        <link rel="stylesheet" href="../../css/4.0_ranked_lists/dashboard/edit_challenges.css" />
        <link rel="stylesheet" href="../../css/5.0_essays_responses/dashboard/edit_essays.css" />
        <link rel="stylesheet" href="../../css/5.0_essays_responses/dashboard/edit_responses.css" />
        <link rel="stylesheet" href="../../css/5.0_essays_responses/dashboard/markdown.css" />
        <link rel="stylesheet" href="../../css/6.0_news_blog/dashboard/edit_blog.css" />
        <link rel="stylesheet" href="../../css/6.0_news_blog/dashboard/edit_news.css" />
    </head>
    <body class="dashboard admin-body">
        <!-- Login View (Visible by default until authenticated) -->
        <div id="login-view" class="login-container">
            <div class="login-box">
                <h1>Admin Portal</h1>
                <p class="login-subtitle">
                    Secure access to The Jesus Website database.
                </p>

                <div id="login-error" class="error-message">
                    Invalid credentials.
                </div>

                <form id="admin-login-form">
                    <label for="admin-password">Master Password</label>
                    <input
                        type="password"
                        id="admin-password"
                        name="password"
                        required
                        autocomplete="current-password"
                        placeholder="Enter secure password..."
                    />

                    <button
                        type="submit"
                        id="login-submit-btn"
                        class="btn-primary"
                    >
                        Login
                    </button>
                </form>
            </div>
        </div>

        <!-- Dashboard Shell (Hidden by default, used by dashboard_app.js) -->
        <div
            id="dashboard-app"
            class="dashboard-shell is-hidden admin-full-height"
        >
            <!-- Dashboard structure will be mapped here by dashboard_app.js -->
        </div>

        <!-- Admin System Scripts -->
        <script src="load_middleware.js"></script>
        <script src="logout_middleware.js"></script>
        <script src="admin_login.js"></script>

        <!-- Admin Edit Modules -->
        <script src="edit_modules/edit_picture.js"></script>
        <script src="edit_modules/edit_links.js"></script>
        <script src="edit_modules/edit_record.js"></script>
        <script src="edit_modules/edit_bulk_upload.js"></script>
        <script src="edit_modules/edit_blogpost.js"></script>
        <script src="edit_modules/edit_news_snippet.js"></script>
        <script src="edit_modules/edit_news_sources.js"></script>
        <script src="edit_modules/edit_essay.js"></script>
        <script src="edit_modules/edit_historiography.js"></script>
        <script src="edit_modules/edit_response.js"></script>
        <script src="edit_modules/edit_wiki_weights.js"></script>
        <script src="edit_modules/edit_academic_weights.js"></script>
        <script src="edit_modules/edit_popular_weights.js"></script>
        <script src="edit_modules/edit_lists.js"></script>
        <script src="edit_modules/edit_diagram.js"></script>
        <script src="edit_modules/edit_mla_sources.js"></script>
        <script src="edit_modules/edit_insert_response_academic.js"></script>
        <script src="edit_modules/edit_insert_response_popular.js"></script>

        <script src="render_tab_bar.js"></script>
        <script src="dashboard_app.js"></script>
    </body>
</html>
