<!doctype html>
<html lang="en">
    <!-- =============================================================================

     THE JESUS WEBSITE — ADMIN LOGIN
     File:    admin/frontend/admin.html
     Version: 2.0.0
     Purpose: Login-only entry portal for admin authentication. On successful
              login, the browser redirects to dashboard.html via admin_login.js.
     Source:  guide_dashboard_appearance.md §7.1

============================================================================= -->

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin Portal | The Jesus Website</title>

        <!-- Typography Base (CSS variables, fonts, body styles) -->
        <link rel="stylesheet" href="../../css/1.0_foundation/dashboard/admin_typography_base.css" />

        <!-- Login Stylesheet -->
        <link rel="stylesheet" href="../../css/7.0_system/dashboard/auth_login.css" />
    </head>
    <body>
        <main id="login-view" class="login-container">
            <section class="login-box">
                <h1>Admin Portal</h1>
                <p class="login-subtitle">
                    Secure access to The Jesus Website database.
                </p>

                <div id="login-error" class="error-message">
                    Invalid credentials.
                </div>

                <form id="admin-login-form">
                    <label for="admin-password">Master Password</label>
                    <input
                        type="password"
                        id="admin-password"
                        name="password"
                        required
                        autocomplete="current-password"
                        placeholder="Enter secure password..."
                    />

                    <button
                        type="submit"
                        id="login-submit-btn"
                        class="btn-primary"
                    >
                        Login
                    </button>
                </form>
            </section>
        </main>

        <!-- Login Script -->
        <script src="../../js/7.0_system/dashboard/admin_login.js"></script>
    </body>
</html>
