<!doctype html>
<!-- =============================================================================
   THE JESUS WEBSITE — CHALLENGE RESPONSE DASHBOARD EDITOR
   File:    admin/frontend/dashboard_challenge_response.html
   Version: 1.0.0
   Module:  4.0 — Ranked Lists
   Purpose: Split-pane WYSIWYG editor for authoring challenge responses.
            Follows the unified wysiwyg-* BEM namespace. Features a sticky
            function bar (Save Draft | Publish | Delete — no "+ New" button
            as responses are created from the challenge list insert dialog),
            sidebar document list (Published/Drafts + metadata widget), and
            main editor area (title, markdown toolbar, split panes, MLA
            bibliography, context links). Omits picture upload per schema
            (challenge_response type has no picture fields).
   Trigger: Loaded by dashboard_app.js when user navigates from challenge list
            "Insert Response" dialog. Injected via _setColumn() into the
            Providence main work area.
============================================================================= -->

<!-- =============================================================================
   FUNCTION BAR — Status Actions (no "+ New" — responses created from challenge list)
============================================================================= -->
<section
    id="wysiwyg-function-bar"
    class="wysiwyg-function-bar"
    aria-label="Challenge response actions"
>
    <div
        class="wysiwyg-function-bar__status-group"
        role="group"
        aria-label="Document status actions"
    >
        <button id="btn-save-draft" class="btn btn--draft" type="button">
            Save Draft
        </button>
        <button id="btn-publish" class="btn btn--publish" type="button">
            Publish
        </button>
        <button id="btn-delete" class="btn btn--delete" type="button">
            Delete
        </button>
    </div>
</section>

<!-- =============================================================================
   SPLIT-PANE EDITOR LAYOUT
   Sidebar (search + document list) | WYSIWYG Editor (title, toolbar, markdown)
============================================================================= -->
<section
    id="wysiwyg-editor-layout"
    class="wysiwyg-editor-layout"
    aria-label="Challenge response editor"
>
    <!-- =========================================================================
       EDITOR SIDEBAR — Search bar + Published/Drafts response lists
    ========================================================================= -->
    <aside
        id="wysiwyg-sidebar"
        class="wysiwyg-sidebar"
        aria-label="Response list sidebar"
    >
        <!-- Sidebar Search Bar -->
        <div id="wysiwyg-sidebar-search" class="wysiwyg-sidebar-search">
            <input
                id="wysiwyg-search-input"
                class="wysiwyg-sidebar-search__input"
                type="text"
                placeholder="Filter by title..."
                aria-label="Filter responses by title"
            />
        </div>

        <!-- Published Responses Group -->
        <div id="wysiwyg-published-group" class="wysiwyg-sidebar-group">
            <h3
                id="wysiwyg-published-header"
                class="wysiwyg-sidebar-group__header"
            >
                Published
            </h3>
            <ul
                id="wysiwyg-published-list"
                class="wysiwyg-sidebar-list"
                aria-labelledby="wysiwyg-published-header"
            >
                <!-- Populated by challenge_response_list_display.js -->
            </ul>
        </div>

        <!-- Draft Responses Group -->
        <div id="wysiwyg-drafts-group" class="wysiwyg-sidebar-group">
            <h3
                id="wysiwyg-drafts-header"
                class="wysiwyg-sidebar-group__header"
            >
                Drafts
            </h3>
            <ul
                id="wysiwyg-drafts-list"
                class="wysiwyg-sidebar-list"
                aria-labelledby="wysiwyg-drafts-header"
            >
                <!-- Populated by challenge_response_list_display.js -->
            </ul>
        </div>

        <!-- Shared metadata widget (slug, snippet, metadata, timestamps, generate all) -->
        <div
            id="metadata-widget-container"
            class="wysiwyg-sidebar-group"
            aria-label="Metadata widget"
        ></div>
    </aside>

    <!-- =========================================================================
       WYSIWYG EDITOR AREA
    ========================================================================= -->
    <article
        id="wysiwyg-editor-area"
        class="wysiwyg-editor-area"
        aria-label="Response editor"
    >
        <!-- Response Title -->
        <div class="wysiwyg-editor-field">
            <label for="wysiwyg-title-input" class="wysiwyg-editor-field__label"
                >Title</label
            >
            <input
                id="wysiwyg-title-input"
                class="wysiwyg-editor-field__input wysiwyg-editor-field__input--title"
                type="text"
                placeholder="Enter response title..."
                aria-label="Response title"
            />
        </div>

        <!-- Markdown Toolbar -->
        <div
            id="markdown-toolbar"
            class="markdown-toolbar"
            role="toolbar"
            aria-label="Markdown formatting toolbar"
        >
            <button
                class="markdown-toolbar__btn"
                data-action="bold"
                type="button"
                title="Bold (Ctrl+B)"
            >
                <strong>B</strong>
            </button>
            <button
                class="markdown-toolbar__btn"
                data-action="italic"
                type="button"
                title="Italic (Ctrl+I)"
            >
                <em>I</em>
            </button>
            <button
                class="markdown-toolbar__btn"
                data-action="underline"
                type="button"
                title="Underline"
            >
                <u>U</u>
            </button>
            <button
                class="markdown-toolbar__btn"
                data-action="link"
                type="button"
                title="Insert Link"
            >
                Link
            </button>
            <button
                class="markdown-toolbar__btn"
                data-action="image"
                type="button"
                title="Insert Image"
            >
                Image
            </button>
            <button
                class="markdown-toolbar__btn"
                data-action="code"
                type="button"
                title="Code"
            >
                Code
            </button>
        </div>

        <!-- Split Editor: Markdown Input | Live Preview -->
        <div id="markdown-editor-panes" class="markdown-editor-panes">
            <!-- Markdown Input -->
            <div class="markdown-editor-pane markdown-editor-pane--input">
                <label
                    for="markdown-textarea"
                    class="markdown-editor-pane__label"
                    >Markdown</label
                >
                <textarea
                    id="markdown-textarea"
                    class="markdown-editor-textarea"
                    placeholder="Write your response content here..."
                    aria-label="Markdown content editor"
                ></textarea>
            </div>

            <!-- Live Preview -->
            <div class="markdown-editor-pane markdown-editor-pane--preview">
                <span class="markdown-editor-pane__label">Preview</span>
                <div
                    id="markdown-preview"
                    class="markdown-editor-preview"
                    aria-label="Live HTML preview"
                >
                    <p class="markdown-editor-preview__placeholder">
                        Live preview will appear here as you type...
                    </p>
                </div>
            </div>
        </div>

        <!-- MLA Sources Container -->
        <div
            id="wysiwyg-bibliography-container"
            class="wysiwyg-editor-section"
            aria-label="MLA sources editor"
        >
            <!-- Populated by mla_source_handler.js -->
        </div>

        <!-- Context Links Container -->
        <div
            id="wysiwyg-context-links-container"
            class="wysiwyg-editor-section"
            aria-label="Context links editor"
        >
            <!-- Populated by context_link_handler.js -->
        </div>

        <!-- External References Container -->
        <div
            id="wysiwyg-external-refs-container"
            class="wysiwyg-editor-section"
            aria-label="External references"
        >
            <h4 class="wysiwyg-editor-section__heading">External References</h4>
            <div class="form-field">
                <label for="record-iaa" class="form-field__label"
                    >IAA Reference</label
                >
                <input
                    id="record-iaa"
                    class="form-field__input"
                    type="text"
                    placeholder="IAA reference identifier"
                />
            </div>
            <div class="form-field">
                <label for="record-pledius" class="form-field__label"
                    >Pledius Reference</label
                >
                <input
                    id="record-pledius"
                    class="form-field__input"
                    type="text"
                    placeholder="Pledius reference identifier"
                />
            </div>
            <div class="form-field">
                <label for="record-manuscript" class="form-field__label"
                    >Manuscript Ref</label
                >
                <input
                    id="record-manuscript"
                    class="form-field__input"
                    type="text"
                    placeholder="Manuscript reference identifier"
                />
            </div>
        </div>

        <!-- NOTE: No Picture Upload section — challenge_response type has no
             picture_name/picture_bytes/picture_thumbnail fields per schema. -->
    </article>
</section>

<!-- =============================================================================
   ERROR / STATUS DISPLAY
   Error messages are routed through window.surfaceError() to the shared
   Status Bar footer (js/admin_core/error_handler.js), which is already
   present in the dashboard shell.
============================================================================= -->
