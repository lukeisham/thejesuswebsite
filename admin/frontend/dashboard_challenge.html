<!-- =============================================================================
   THE JESUS WEBSITE — CHALLENGE DASHBOARD EDITOR
   File:    admin/frontend/dashboard_challenge.html
   Version: 1.0.0
   Module:  4.0 — Ranked Lists
   Purpose: Dual-list challenge management container for Academic and Popular
            debate lists. Features a toggle-driven function bar to switch
            between lists, a weighting sidebar for fine-tuning ranking logic,
            and a main area for viewing and publishing the ranked challenges.
            Includes insert response functionality to create and link a new
            response to a parent challenge.
   Trigger: Loaded via fetch by dashboard_challenge.js and injected into the
            Providence main column when the user navigates to the Challenge
            module.
============================================================================= -->

<!-- =============================================================================
   FUNCTION BAR — Academic/Popular toggle + challenge actions
   Sticky bar with list toggle (Academic | Popular), Refresh, Publish,
   Agent Search, and Insert Response buttons.
============================================================================= -->
<section id="challenge-function-bar" class="function-bar" aria-label="Challenge actions">
    <!-- Toggle: Academic / Popular -->
    <div class="function-bar__toggle-group">
        <button id="btn-toggle-academic" class="btn--toggle btn--toggle-active" type="button" aria-pressed="true">
            Academic
        </button>
        <button id="btn-toggle-popular" class="btn--toggle" type="button" aria-pressed="false">
            Popular
        </button>
    </div>

    <!-- Actions Group -->
    <div class="function-bar__actions-group">
        <button id="btn-challenge-refresh" class="btn btn--draft" type="button" title="Refresh and recalculate rankings">Refresh</button>
        <button id="btn-challenge-publish" class="btn btn--publish" type="button" title="Publish current ranked order to live site">Publish</button>
        <button id="btn-challenge-agent-search" class="btn btn--secondary" type="button" title="Run agent search for selected record">Agent Search</button>
        <button id="btn-challenge-insert-response" class="btn btn--secondary" type="button" title="Create a new response linked to the selected challenge">Insert Response</button>
    </div>
</section>

<!-- =============================================================================
   SPLIT-PANE LAYOUT — Weighting sidebar + challenge list main area
   Two columns: sidebar (weighting controls) | main (ranked challenge list).
   CSS Grid for macro layout; Flexbox for micro alignment within columns.
============================================================================= -->
<article id="challenge-editor-layout" class="challenge-editor-layout" aria-label="Challenge editor">
    <!-- Sidebar Column: Weighting Ranks -->
    <aside id="challenge-sidebar" class="challenge-sidebar" aria-label="Weighting controls">
        <header class="challenge-sidebar__header">
            <h2 class="challenge-sidebar__heading">WEIGHTING RANKS</h2>
        </header>

        <!-- Weighting Criteria List — populated by challenge_weighting_handler.js -->
        <section id="challenge-weighting-list" class="challenge-weighting-list" aria-label="Weighting criteria">
            <!-- Dynamically populated -->
        </section>

        <!-- Search Terms Section -->
        <section id="challenge-search-terms" class="challenge-search-terms" aria-label="Search terms">
            <header class="challenge-sidebar__subheader">
                <h3 class="challenge-sidebar__subheading">Search Terms</h3>
            </header>
            <div class="challenge-search-terms__editor">
                <textarea id="challenge-search-terms-input" class="challenge-search-terms__textarea" rows="4" placeholder="Enter search terms (one per line or comma-separated).&#10;These are used by the agent to discover articles on the open web." aria-label="Search terms editor"></textarea>
                <span id="challenge-search-terms-hint" class="challenge-search-terms__hint">Currently editing: <strong id="challenge-search-terms-field-label">Academic</strong> search terms</span>
            </div>
        </section>

        <!-- New Weighting Criterion Form -->
        <section id="challenge-new-weight" class="challenge-new-weight" aria-label="Add weighting criterion">
            <header class="challenge-sidebar__subheader">
                <h3 class="challenge-sidebar__subheading">Add Criterion</h3>
            </header>
            <div class="challenge-new-weight__form">
                <input id="challenge-new-weight-name" class="challenge-new-weight__name" type="text" placeholder="New name" aria-label="New criterion name" />
                <input id="challenge-new-weight-value" class="challenge-new-weight__value" type="number" min="0" max="100" step="1" placeholder="Val" aria-label="New criterion value" />
                <button id="btn-challenge-add-weight" class="btn btn--draft" type="button" title="Publish new weighting criterion">Publish</button>
            </div>
        </section>
    </aside>

    <!-- Divider between sidebar and main -->
    <div class="challenge-divider" aria-hidden="true"></div>

    <!-- Main Column: Ranked Challenge List -->
    <section id="challenge-list-area" class="challenge-list-area" aria-label="Challenge list">
        <!-- Loading State -->
        <div id="challenge-list-loading" class="state-loading" role="status">
            <span class="state-loading__label">Loading challenges...</span>
        </div>

        <!-- Challenge List Container — populated by challenge_list_display.js -->
        <ol id="challenge-ranked-list" class="challenge-ranked-list" aria-label="Ranked challenges">
            <!-- Dynamically populated -->
        </ol>

        <!-- Empty State -->
        <div id="challenge-list-empty" class="state-empty" aria-hidden="true">
            <p class="state-empty__label">No challenges found for this category.</p>
        </div>

        <!-- Error State -->
        <div id="challenge-list-error" class="state-error" aria-hidden="true">
            <p class="state-error__label">Unable to load challenge list.</p>
        </div>
    </section>
</article>

<!-- =============================================================================
   INSERT RESPONSE DIALOG (Hidden by default)
   Shown when Insert Response is clicked and no challenge is selected.
============================================================================= -->
<dialog id="challenge-insert-response-dialog" class="challenge-dialog" aria-label="Insert response to challenge">
    <header class="challenge-dialog__header">
        <h3 class="challenge-dialog__heading">Create Response</h3>
    </header>
    <div class="challenge-dialog__body">
        <label for="challenge-response-title-input" class="challenge-dialog__label">Response Title</label>
        <input id="challenge-response-title-input" class="challenge-dialog__input" type="text" placeholder="Enter response title" aria-label="Response title" />
        <p id="challenge-response-parent-label" class="challenge-dialog__parent-label"></p>
    </div>
    <footer class="challenge-dialog__footer">
        <button id="btn-challenge-response-cancel" class="btn btn--draft" type="button">Cancel</button>
        <button id="btn-challenge-response-create" class="btn btn--publish" type="button">Create Draft Response</button>
    </footer>
</dialog>
