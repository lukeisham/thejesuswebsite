name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/thejesuswebsite
            git fetch origin main
            git reset --hard origin/main
            PROCESS_MANAGER=pm2 ./deploy.sh

      # Purge Cloudflare's edge cache so the deploy is visible immediately,
      # instead of waiting out the HTML edge cache's max-age=60 window. Must
      # run after the SSH deploy step succeeds — purging before origin serves
      # the new content would just re-cache stale bytes.
      - name: Purge Cloudflare cache
        run: |
          set -euo pipefail
          response=$(curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_PURGE_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$response"
          echo "$response" | grep -q '"success":true'
