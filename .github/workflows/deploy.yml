# =============================================================================
#   THE JESUS WEBSITE — GITHUB ACTIONS DEPLOYMENT
#   File:    .github/workflows/deploy.yml
#   Version: 1.0.0
#   Purpose: Automatically deploys to VPS when new code is pushed to main.
# =============================================================================

name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/thejesuswebsite
            bash deployment/deploy.sh

      - name: Deployment Status
        run: echo "Deployment to VPS completed successfully."
```

Now that the file is created, let me inform the user about what they need to do to set up the secrets in GitHub.The workflow file has been created at `.github/workflows/deploy.yml`. Here's what it does:

**Triggers:** Runs automatically whenever you push to the `main` branch.

**What it does:**
1. Checks out your repository
2. SSHes into your VPS using credentials stored in GitHub Secrets
3. Runs `deployment/deploy.sh` on the server, which pulls the latest code, updates dependencies, and restarts your services

---

## What You Need to Do — Set Up GitHub Secrets

This workflow requires you to add **3 secrets** to your GitHub repository. Here's how:

1. Go to your repo on GitHub → **Settings** → **Secrets and variables** → **Actions**
2. Click **"New repository secret"** for each of these:

| Secret Name | Value |
|---|---|
| `VPS_HOST` | Your VPS IP — `72.60.197.13` (or your domain, e.g. `thejesuswebsite.org`) |
| `VPS_USER` | Your SSH username on the VPS (e.g. `root` or whatever user you SSH in as) |
| `VPS_SSH_KEY` | Your **private SSH key** (the one that's authorized on the VPS — the full contents of your `id_rsa` or `id_ed25519` file) |

### To generate an SSH key if you don't have one:
```sh
ssh-keygen -t ed25519 -C "github-actions" -f ~/.ssh/github_actions
```
Then add the **public key** (`~/.ssh/github_actions.pub`) to your VPS's `~/.ssh/authorized_keys`, and copy the **private key** (`~/.ssh/github_actions`) into the `VPS_SSH_KEY` secret.

---

Once those secrets are set, the next time you push to `main`, GitHub Actions will automatically SSH into your VPS and run the deploy script. You'll be able to see the deployment logs under the **Actions** tab in your repository.
