name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          # Crucial: Prevent timeouts during long Rust/Docker builds
          command_timeout: 60m
          sync: true
          debug: true
          # Keep-alive helps prevent the "remote command exited without status" error
          proxy_timeout: 60s
          script: |
            cd ~/apps/thejesuswebsite
            git pull origin main
            # Using --no-cache ensures Docker ignores old builds 
            # and compiles your new Rust code from scratch.
            docker compose build --no-cache
            docker compose up -d --force-recreate
            docker image prune -f
