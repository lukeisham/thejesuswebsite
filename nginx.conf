# =============================================================================
#   THE JESUS WEBSITE — NGINX CONFIGURATION
#   File:    nginx.conf
#   Version: 1.1.0
#   Purpose: Web server static routing, API proxies, and SSL termination.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name thejesuswebsite.com www.thejesuswebsite.com;

    # Enforce HTTPS redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thejesuswebsite.com www.thejesuswebsite.com;

    # SSL Certificates (managed by Certbot ideally)
    # ssl_certificate /etc/letsencrypt/live/thejesuswebsite.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/thejesuswebsite.com/privkey.pem;

    root /var/www/thejesuswebsite;
    index index.html;

    # Security Headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Main Static HTML Navigation
    location / {
        try_files $uri $uri/ /index.html;
    }

    # CSS & JS Asset Catch
    location ~* \.(css|js|wasm|sqlite)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    # Reverse Proxy for Secure Admin API (FastAPI)
    location /api/admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse Proxy for MCP Server (SSE Transport)
    location /mcp/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }
}
