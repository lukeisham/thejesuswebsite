# =============================================================================
#   THE JESUS WEBSITE — NGINX CONFIGURATION
#   File:    nginx.conf
#   Version: 1.2.0
#   Purpose: Web server static routing, API proxies, and SSL termination.
# =============================================================================

server {
    listen 80;
    # Add your IP here too so we can test via IP if DNS isn't ready
    server_name thejesuswebsite.org www.thejesuswebsite.org 72.60.197.13 localhost;

    root /var/www/thejesuswebsite;
    index index.html;

    location / {
        # Check if the file exists as a static file first
        try_files $uri @proxy;
    }

    location @proxy {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # This is the bridge to your working Python app
        proxy_pass http://unix:/var/www/thejesuswebsite/thejesuswebsite.sock;
    }
}