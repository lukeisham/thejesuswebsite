# =============================================================================
#   THE JESUS WEBSITE — NGINX CONFIGURATION
#   File:    nginx.conf
#   Version: 1.4.0 (Rate limiting + directory protection)
#   Purpose: Web server static routing, clean URL rewrites, legacy redirects,
#            API proxies, SSL termination, and DDoS protection.
# =============================================================================

# --- Rate Limiting Zone (DDoS / flood control) ---
# 30 requests per second per IP; excess requests get 429.
# This directive must be at the http level. If this file is included from
# a parent http block, the directive is valid here.
limit_req_zone $binary_remote_addr zone=flood_limit:10m rate=30r/s;

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name thejesuswebsite.org www.thejesuswebsite.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name thejesuswebsite.org www.thejesuswebsite.org;

    ssl_certificate     /etc/letsencrypt/live/thejesuswebsite.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thejesuswebsite.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/thejesuswebsite;
    index index.html;

    # --- Admin directory: forbid directory listing ---
    # Prevents casual browsing of the admin source tree on the filesystem.
    # Admin pages are served as explicit .html files or via the /api/ proxy.
    location /admin {
        autoindex off;
    }

    # Rate-limit all API requests
    location /api/ {
        limit_req zone=flood_limit burst=20 nodelay;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/var/www/thejesuswebsite/thejesuswebsite.sock;
    }

    location / {

        # ====================================================================
        # 1. LEGACY REDIRECTS (External - Browser URI changes)
        # ====================================================================

        # Redirect query params like /record.html?slug=name to /record/name
        if ($arg_slug) {
            return 301 /record/$arg_slug;
        }
        if ($arg_id) {
            return 301 /record/$arg_id;
        }

        # Redirect old .html paths to clean slugs
        rewrite ^/frontend/pages/records\.html$       /records       permanent;
        rewrite ^/frontend/pages/evidence\.html$      /evidence      permanent;
        rewrite ^/frontend/pages/timeline\.html$       /timeline      permanent;
        rewrite ^/frontend/pages/maps\.html$           /maps          permanent;
        rewrite ^/frontend/pages/context\.html$        /context       permanent;
        rewrite ^/frontend/pages/context_essay\.html$  /context/essay permanent;
        rewrite ^/frontend/pages/debate\.html$         /debate        permanent;
        rewrite ^/frontend/pages/resources\.html$      /resources     permanent;
        rewrite ^/frontend/pages/news_and_blog\.html$  /news          permanent;
        rewrite ^/frontend/pages/news\.html$           /news/feed     permanent;
        rewrite ^/frontend/pages/blog\.html$           /blog          permanent;
        rewrite ^/frontend/pages/blog_post\.html$      /blog/post     permanent;
        rewrite ^/frontend/pages/about\.html$          /about         permanent;

        # Debate subdirectory redirects
        rewrite ^/frontend/pages/debate/academic_challenge\.html$  /debate/academic-challenges  permanent;
        rewrite ^/frontend/pages/debate/popular_challenge\.html$   /debate/popular-challenges   permanent;
        rewrite ^/frontend/pages/debate/wikipedia\.html$           /debate/wikipedia-articles   permanent;
        rewrite ^/frontend/pages/debate/historiography\.html$      /debate/historiography       permanent;
        rewrite ^/frontend/pages/debate/response\.html$            /debate/response             permanent;
        rewrite ^/debate/response/(.+)$                          /debate/$1                   permanent;

        # Resources subdirectory redirects
        rewrite ^/frontend/pages/resources/Events\.html$              /resources/events              permanent;
        rewrite ^/frontend/pages/resources/External\ witnesses\.html$ /resources/external-witnesses  permanent;
        rewrite ^/frontend/pages/resources/Internal\ witnesses\.html$ /resources/internal-witnesses  permanent;
        rewrite ^/frontend/pages/resources/Manuscripts\.html$         /resources/manuscripts         permanent;
        rewrite ^/frontend/pages/resources/Miracles\.html$            /resources/miracles            permanent;
        rewrite ^/frontend/pages/resources/OT\ Verses\.html$          /resources/ot-verses           permanent;
        rewrite ^/frontend/pages/resources/Objects\.html$             /resources/objects             permanent;
        rewrite ^/frontend/pages/resources/People\.html$              /resources/people              permanent;
        rewrite ^/frontend/pages/resources/Places\.html$             /resources/places             permanent;
        rewrite ^/frontend/pages/resources/Sermons\ and\ Sayings\.html$ /resources/sermons-and-sayings permanent;
        rewrite ^/frontend/pages/resources/Sites\.html$               /resources/sites               permanent;
        rewrite ^/frontend/pages/resources/Sources\.html$             /resources/sources             permanent;
        rewrite ^/frontend/pages/resources/World\ Events\.html$       /resources/world-events        permanent;

        # ====================================================================
        # 2. INTERNAL MAPPINGS (Internal - Browser bar stays clean)
        #    Using 'break' prevents Nginx from re-scanning and hitting 301s.
        # ====================================================================

        # Top-level page slugs
        rewrite ^/records$            /frontend/pages/records.html              break;
        rewrite ^/evidence$           /frontend/pages/evidence.html             break;
        rewrite ^/timeline$           /frontend/pages/timeline.html             break;
        rewrite ^/maps$               /frontend/pages/maps.html                 break;
        rewrite ^/context$            /frontend/pages/context.html              break;
        rewrite ^/context/essay$      /frontend/pages/context_essay.html        break;
        rewrite ^/debate$             /frontend/pages/debate.html               break;
        rewrite ^/resources$          /frontend/pages/resources.html            break;
        rewrite ^/news$               /frontend/pages/news_and_blog.html        break;
        rewrite ^/news/feed$          /frontend/pages/news.html                 break;
        rewrite ^/blog$               /frontend/pages/blog.html                 break;
        rewrite ^/blog/post$          /frontend/pages/blog_post.html            break;
        rewrite ^/about$              /frontend/pages/about.html                break;

        # Record deep-dive
        rewrite ^/record/(.+)$        /frontend/pages/record.html?slug=$1       break;

        # Dynamic slug pages — essay, response, blog post
        rewrite ^/context/([a-z0-9_-]+)$  /frontend/pages/context_essay.html?slug=$1   break;
        rewrite ^/blog/([a-z0-9_-]+)$     /frontend/pages/blog_post.html?slug=$1       break;

        # Debate subdirectory slugs
        rewrite ^/debate/academic-challenges$  /frontend/pages/debate/academic_challenge.html  break;
        rewrite ^/debate/popular-challenges$   /frontend/pages/debate/popular_challenge.html   break;
        rewrite ^/debate/wikipedia-articles$   /frontend/pages/debate/wikipedia.html           break;
        rewrite ^/debate/historiography$       /frontend/pages/debate/historiography.html      break;
        rewrite ^/debate/response$             /frontend/pages/debate/response.html            break;
        rewrite ^/debate/([a-z0-9_-]+)$        /frontend/pages/debate/response.html?slug=$1    break;

        # Resources subdirectory slugs
        rewrite ^/resources/events$               /frontend/pages/resources/Events.html              break;
        rewrite ^/resources/external-witnesses$   /frontend/pages/resources/External\ witnesses.html break;
        rewrite ^/resources/internal-witnesses$   /frontend/pages/resources/Internal\ witnesses.html break;
        rewrite ^/resources/manuscripts$          /frontend/pages/resources/Manuscripts.html         break;
        rewrite ^/resources/miracles$             /frontend/pages/resources/Miracles.html            break;
        rewrite ^/resources/ot-verses$            /frontend/pages/resources/OT\ Verses.html          break;
        rewrite ^/resources/objects$              /frontend/pages/resources/Objects.html             break;
        rewrite ^/resources/people$               /frontend/pages/resources/People.html              break;
        rewrite ^/resources/places$              /frontend/pages/resources/Places.html             break;
        rewrite ^/resources/sermons-and-sayings$  /frontend/pages/resources/Sermons\ and\ Sayings.html break;
        rewrite ^/resources/sites$                /frontend/pages/resources/Sites.html               break;
        rewrite ^/resources/sources$              /frontend/pages/resources/Sources.html             break;
        rewrite ^/resources/world-events$         /frontend/pages/resources/World\ Events.html       break;

        # Static file fallback
        try_files $uri @proxy;
    }

    location @proxy {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/var/www/thejesuswebsite/thejesuswebsite.sock;
    }
}
