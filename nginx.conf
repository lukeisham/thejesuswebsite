# =============================================================================
#   THE JESUS WEBSITE — NGINX CONFIGURATION
#   File:    nginx.conf
#   Version: 1.3.0
#   Purpose: Web server static routing, clean URL rewrites, legacy redirects,
#            API proxies, and SSL termination.
#
#   CLEAN SLUG ARCHITECTURE:
#   - Internal rewrites map each clean slug (e.g. /records) to its static file
#     (e.g. /frontend/pages/records.html) so the browser address bar stays clean.
#   - 301 redirects send old /frontend/pages/... URLs to the new slugs for
#     backward compatibility.
#   - The record deep-dive view uses a named-capture rewrite so
#     /record/{slug} maps to /frontend/pages/record.html?slug={slug},
#     preserving the query-param reading pattern in single_view.js.
# =============================================================================

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name thejesuswebsite.org www.thejesuswebsite.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name thejesuswebsite.org www.thejesuswebsite.org;

    ssl_certificate     /etc/letsencrypt/live/thejesuswebsite.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thejesuswebsite.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/thejesuswebsite;
    index index.html;

    location / {

        # ====================================================================
        # CLEAN SLUG REWRITES (internal — browser bar stays clean)
        #   The `last` flag stops further rewrite processing and re-matches
        #   the rewritten URI against the location block.
        # ====================================================================

        # --- Top-level page slugs ---
        rewrite ^/records$            /frontend/pages/records.html              last;
        rewrite ^/evidence$           /frontend/pages/evidence.html             last;
        rewrite ^/timeline$           /frontend/pages/timeline.html             last;
        rewrite ^/maps$               /frontend/pages/maps.html                 last;
        rewrite ^/context$            /frontend/pages/context.html              last;
        rewrite ^/context/essay$      /frontend/pages/context_essay.html        last;
        rewrite ^/debate$             /frontend/pages/debate.html               last;
        rewrite ^/resources$          /frontend/pages/resources.html            last;
        rewrite ^/news$               /frontend/pages/news_and_blog.html        last;
        rewrite ^/news/feed$          /frontend/pages/news.html                 last;
        rewrite ^/blog$               /frontend/pages/blog.html                 last;
        rewrite ^/blog/post$          /frontend/pages/blog_post.html            last;
        rewrite ^/about$              /frontend/pages/about.html                last;

        # --- Record deep-dive view (named-capture slug → ?slug= query param) ---
        # single_view.js reads the slug from the query string, so we pass it
        # through for backward compatibility.
        rewrite ^/record/(.+)$        /frontend/pages/record.html?slug=$1       last;

        # --- Debate subdirectory slugs ---
        rewrite ^/debate/academic-challenges$  /frontend/pages/debate/academic_challenge.html  last;
        rewrite ^/debate/popular-challenges$   /frontend/pages/debate/popular_challenge.html   last;
        rewrite ^/debate/wikipedia-articles$   /frontend/pages/debate/wikipedia.html           last;
        rewrite ^/debate/historiography$       /frontend/pages/debate/historiography.html      last;
        rewrite ^/debate/response$             /frontend/pages/debate/response.html            last;

        # --- Resources subdirectory slugs ---
        rewrite ^/resources/events$               /frontend/pages/resources/Events.html              last;
        rewrite ^/resources/external-witnesses$   /frontend/pages/resources/External\ witnesses.html last;
        rewrite ^/resources/internal-witnesses$   /frontend/pages/resources/Internal\ witnesses.html last;
        rewrite ^/resources/manuscripts$          /frontend/pages/resources/Manuscripts.html         last;
        rewrite ^/resources/miracles$             /frontend/pages/resources/Miracles.html            last;
        rewrite ^/resources/ot-verses$            /frontend/pages/resources/OT\ Verses.html          last;
        rewrite ^/resources/objects$              /frontend/pages/resources/Objects.html             last;
        rewrite ^/resources/people$               /frontend/pages/resources/People.html              last;
        rewrite ^/resources/sermons-and-sayings$  /frontend/pages/resources/Sermons\ and\ Sayings.html last;
        rewrite ^/resources/sites$                /frontend/pages/resources/Sites.html               last;
        rewrite ^/resources/sources$              /frontend/pages/resources/Sources.html             last;
        rewrite ^/resources/world-events$         /frontend/pages/resources/World\ Events.html       last;

        # ====================================================================
        # 301 REDIRECTS (old /frontend/pages/... paths → new clean slugs)
        #   `permanent` sends a 301 Moved Permanently so search engines
        #   update their indexes and bookmarks update automatically.
        # ====================================================================

        # --- Top-level pages ---
        rewrite ^/frontend/pages/records\.html$       /records       permanent;
        rewrite ^/frontend/pages/evidence\.html$      /evidence      permanent;
        rewrite ^/frontend/pages/timeline\.html$       /timeline      permanent;
        rewrite ^/frontend/pages/maps\.html$           /maps          permanent;
        rewrite ^/frontend/pages/context\.html$        /context       permanent;
        rewrite ^/frontend/pages/context_essay\.html$  /context/essay permanent;
        rewrite ^/frontend/pages/debate\.html$         /debate        permanent;
        rewrite ^/frontend/pages/resources\.html$      /resources     permanent;
        rewrite ^/frontend/pages/news_and_blog\.html$  /news          permanent;
        rewrite ^/frontend/pages/news\.html$           /news/feed     permanent;
        rewrite ^/frontend/pages/blog\.html$           /blog          permanent;
        rewrite ^/frontend/pages/blog_post\.html$      /blog/post     permanent;
        rewrite ^/frontend/pages/about\.html$          /about         permanent;

        # --- Debate subdirectory pages ---
        rewrite ^/frontend/pages/debate/academic_challenge\.html$  /debate/academic-challenges  permanent;
        rewrite ^/frontend/pages/debate/popular_challenge\.html$   /debate/popular-challenges   permanent;
        rewrite ^/frontend/pages/debate/wikipedia\.html$           /debate/wikipedia-articles   permanent;
        rewrite ^/frontend/pages/debate/historiography\.html$      /debate/historiography       permanent;
        rewrite ^/frontend/pages/debate/response\.html$            /debate/response             permanent;

        # --- Resources subdirectory pages ---
        rewrite ^/frontend/pages/resources/Events\.html$              /resources/events              permanent;
        rewrite ^/frontend/pages/resources/External\ witnesses\.html$ /resources/external-witnesses  permanent;
        rewrite ^/frontend/pages/resources/Internal\ witnesses\.html$ /resources/internal-witnesses  permanent;
        rewrite ^/frontend/pages/resources/Manuscripts\.html$         /resources/manuscripts         permanent;
        rewrite ^/frontend/pages/resources/Miracles\.html$            /resources/miracles            permanent;
        rewrite ^/frontend/pages/resources/OT\ Verses\.html$          /resources/ot-verses           permanent;
        rewrite ^/frontend/pages/resources/Objects\.html$             /resources/objects             permanent;
        rewrite ^/frontend/pages/resources/People\.html$              /resources/people              permanent;
        rewrite ^/frontend/pages/resources/Sermons\ and\ Sayings\.html$ /resources/sermons-and-sayings permanent;
        rewrite ^/frontend/pages/resources/Sites\.html$               /resources/sites               permanent;
        rewrite ^/frontend/pages/resources/Sources\.html$             /resources/sources             permanent;
        rewrite ^/frontend/pages/resources/World\ Events\.html$       /resources/world-events        permanent;

        # ====================================================================
        # LEGACY RECORD URL REDIRECTS (query-param → path-based)
        #   Old links like /record.html?slug=jesus-baptism or
        #   /record.html?id=42 now redirect to /record/{slug|id}.
        #   Uses $arg_ prefix to capture query parameters in nginx.
        # ====================================================================

        if ($arg_slug) {
            return 301 /record/$arg_slug;
        }
        if ($arg_id) {
            return 301 /record/$arg_id;
        }

        # ====================================================================
        # STATIC FILE FALLBACK
        #   If none of the above rewrites matched, try to serve the request
        #   as a static file. If that fails, proxy to the Python backend.
        # ====================================================================

        try_files $uri @proxy;
    }

    location @proxy {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # This is the bridge to your working Python app
        proxy_pass http://unix:/var/www/thejesuswebsite/thejesuswebsite.sock;
    }
}
