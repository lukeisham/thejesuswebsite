# OpenAI Configuration for App Brain Workspace
version: "1.0"

# Global API Settings
api:
  url: "https://api.openai.com/v1"
  organization_id: "org-your-id-here" # Optional
  request_timeout_seconds: 30
  max_retries: 3

# Model Profiles tailored for specific app modules
profiles:
  # Used for high-level agent reasoning (agent.rs)
  reasoning:
    model: "gpt-4-turbo"
    temperature: 0.7
    max_tokens: 2048
    top_p: 1.0
    presence_penalty: 0.1
    frequency_penalty: 0.1

  # Used for structured data generation (app_schema/codegen.rs)
  structured_data:
    model: "gpt-4o"
    temperature: 0.0 # Deterministic for code/schema generation
    response_format: "json_object"
    max_tokens: 4096

  # Used for quick lookups or simple essay summaries (essay_search)
  utility:
    model: "gpt-3.5-turbo"
    temperature: 0.5
    max_tokens: 500

# Embeddings Config for vector storage (app_storage/chroma.rs)
embeddings:
  model: "text-embedding-3-small"
  dimensions: 1536

# Safety Guardrails
limits:
  monthly_budget_usd: 50.00
  warn_at_percent: 80
  interrupt_on_error: true
