<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
<defs>
<filter id="parchment-texture">
<feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
<feColorMatrix type="matrix" values="0 0 0 0 0.95  0 0 0 0 0.93  0 0 0 0 0.89  0 0 0 0.04 0" in="noise" result="tint"/>
<feBlend in="SourceGraphic" in2="tint" mode="multiply"/>
</filter>
</defs>
<rect x="0" y="0" width="1000" height="1000" fill="#F8F5F0"/>
<rect x="0" y="0" width="1000" height="1000" fill="#F1EDE4"/>
<circle cx="800" cy="330" r="25" fill="rgba(196,181,163,0.12)" stroke="#C4B5A3" stroke-width="0.8" stroke-dasharray="3,2"/>
<text x="800" y="300" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="9" fill="#8B7A6D">Mt. of Olives</text>
<circle cx="500" cy="350" r="20" fill="rgba(196,181,163,0.12)" stroke="#C4B5A3" stroke-width="0.8" stroke-dasharray="3,2"/>
<text x="500" y="325" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="9" fill="#8B7A6D">Temple Mount</text>
<!-- Hand-drawn overlay: jerusalem
  Features with no modern Natural Earth dataset:
  - City walls (First Wall, Second Wall, Third Wall)
  - Temple Mount enclosure
  - Kidron Valley and Hinnom Valley (geographic, but better as styled overlay)
  - Ancient road approaches
  All coordinates are in the viewBox space (1000×1000).
-->
<g id="overlay-jerusalem">
  <!-- Temple Mount enclosure (approximate Herodian platform) -->
  <rect x="430" y="280" width="140" height="100" rx="2" fill="none" stroke="#8B7D6B" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="435" y="285" width="130" height="90" rx="1" fill="rgba(241,237,228,0.4)" stroke="none"/>

  <!-- First Wall (approx. western hill circuit) -->
  <polyline points="350,350 380,380 400,430 410,500 400,560 370,600 330,620" fill="none" stroke="#8B7D6B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="350,350 320,370 300,380" fill="none" stroke="#8B7D6B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Second Wall (northern extension) -->
  <polyline points="380,340 400,310 430,290 470,280 510,280 540,290 560,300" fill="none" stroke="#A89680" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Third Wall (outer northern line, Agrippa I) -->
  <polyline points="350,240 400,230 450,225 500,225 550,230 600,240 650,255" fill="none" stroke="#C4B5A3" stroke-width="1" stroke-dasharray="3,5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Kidron Valley -->
  <polyline points="570,280 590,350 620,420 640,500 660,580 670,650" fill="none" stroke="#7A8B6D" stroke-width="1.2" stroke-dasharray="6,3" stroke-linecap="round"/>

  <!-- Hinnom Valley -->
  <polyline points="280,400 300,480 320,560 350,630 380,680" fill="none" stroke="#7A8B6D" stroke-width="1.2" stroke-dasharray="6,3" stroke-linecap="round"/>

  <!-- Ancient road approaches -->
  <g fill="none" stroke="#A89680" stroke-width="1" stroke-dasharray="4,4" stroke-linecap="round">
    <polyline points="300,200 370,230 430,280"/>  <!-- from north -->
    <polyline points="700,350 620,380 570,330"/>   <!-- from east (Bethany) -->
    <polyline points="500,700 500,620 500,550"/>   <!-- from south (Bethlehem) -->
    <polyline points="200,500 250,520 300,550 350,580"/> <!-- from west -->
  </g>

  <!-- Temple inner courts hint -->
  <rect x="470" y="300" width="60" height="60" rx="1" fill="none" stroke="#8B7D6B" stroke-width="1" stroke-dasharray="2,2"/>
</g>
<text x="500" y="350" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="normal" font-weight="bold" letter-spacing="0.15em" fill="#7A6B5D">TEMPLE MOUNT</text>
<text x="350" y="480" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="normal" font-weight="bold" letter-spacing="0.15em" fill="#7A6B5D">UPPER CITY</text>
<text x="550" y="580" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="normal" font-weight="bold" letter-spacing="0.15em" fill="#7A6B5D">LOWER CITY</text>
<text x="750" y="520" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" font-weight="normal" letter-spacing="0.1em" fill="#7A8B6D" transform="rotate(20, 750, 520)">KIDRON VALLEY</text>
<text x="350" y="720" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" font-weight="normal" letter-spacing="0.1em" fill="#7A8B6D" transform="rotate(-30, 350, 720)">HINNOM VALLEY</text>
<text x="800" y="320" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" font-weight="normal" letter-spacing="0.1em" fill="#8B7A6D">MOUNT OF OLIVES</text>
<rect x="12" y="12" width="976" height="976" fill="none" stroke="#5C4E3D" stroke-width="2"/>
<rect x="16" y="16" width="968" height="968" fill="none" stroke="#5C4E3D" stroke-width="0.8"/>
<rect x="310" y="930" width="380" height="50" rx="4" fill="rgba(248,245,240,0.92)" stroke="#8B7D6B" stroke-width="1"/><text x="500" y="952" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="bold" fill="#5C4E3D">Jerusalem</text><text x="500" y="970" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="9" font-style="italic" fill="#B8A68E">in the time of Jesus · c. AD 30</text>
<circle cx="945" cy="55" r="30" fill="#F1EDE4" stroke="#8B7D6B" stroke-width="1"/><polygon points="945,29 940,55 950,55" fill="#8B7D6B"/><polygon points="945,81 940,55 950,55" fill="#B8A68E"/><text x="945" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="8" font-weight="bold" fill="#8B7D6B">N</text>
</svg>