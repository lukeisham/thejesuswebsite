<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
<defs>
<filter id="parchment-texture">
<feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
<feColorMatrix type="matrix" values="0 0 0 0 0.95  0 0 0 0 0.93  0 0 0 0 0.89  0 0 0 0.04 0" in="noise" result="tint"/>
<feBlend in="SourceGraphic" in2="tint" mode="multiply"/>
</filter>
</defs>
<rect x="0" y="0" width="1000" height="1000" fill="#F8F5F0"/>
<rect x="0" y="0" width="1000" height="1000" fill="#F1EDE4"/>
<circle cx="715" cy="410" r="28" fill="rgba(196,181,163,0.12)" stroke="#C4B5A3" stroke-width="0.8" stroke-dasharray="3,2"/>
<text x="715" y="377" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="9" fill="#8B7A6D">Mt. of Olives</text>
<circle cx="637" cy="460" r="22" fill="rgba(196,181,163,0.12)" stroke="#C4B5A3" stroke-width="0.8" stroke-dasharray="3,2"/>
<text x="637" y="433" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="9" fill="#8B7A6D">Western Hill</text>
<!--
  Hand-drawn overlay: jerusalem — Second-Temple-period city plan
  Traced from the public-domain Britannica 1911 "Plan of Jerusalem"
  and OpenBible.info CC-BY topography overlay.

  GEOREFERENCING — anchor points projected from WGS84 to viewBox space:
    bbox:  lon 35.10–35.30, lat 31.72–31.82  →  viewBox 0 0 1000 1000
    x = (lon - 35.10) / 0.20 * 1000
    y = (31.82 - lat) / 0.10 * 1000

    Temple Mount centre (Dome of the Rock)   35.2354, 31.7780  →  x=677  y=420
    Golgotha (Church of the Holy Sepulchre)  35.2296, 31.7784  →  x=648  y=416
    City of David                            35.2350, 31.7730  →  x=675  y=470
    Herod's Palace / Citadel (Jaffa Gate)    35.2278, 31.7761  →  x=639  y=439
    Antonia Fortress (NW Temple Mount)       35.2340, 31.7800  →  x=670  y=400
    Mount of Olives summit                   35.2430, 31.7790  →  x=715  y=410
    Gethsemane (foot of Mt. of Olives)       35.2395, 31.7795  →  x=697  y=405
    Upper Room (traditional, Mount Zion)     35.2289, 31.7719  →  x=645  y=481
    Kidron Valley (east of Temple Mount)     ~35.238          →  x≈690
    Hinnom Valley (south of western hill)    ~35.227–35.238   →  x≈635–690 at y≈490

  Structures are drawn at a readable symbolic scale (3–5× true size),
  centred at their correct projected positions.

  Licence:  Britannica 1911 is PD.  Topography from OpenBible.info (CC BY 4.0).
            Attribution rendered separately by the SVG builder.
            Cities/sites come from map_pins via the admin editor — they are
            NOT baked into this overlay (per established convention).
-->
<g id="overlay-jerusalem">

  <!-- ═══════════════════════════════════════════════════════════════════════
       Temple Mount platform (Herodian enlargement, ~300 m N–S × ~150 m E–W)
       Drawn ~4× true scale for readability, centred at projected (677,420).
       ════════════════════════════════════════════════════════════════════ -->
  <rect x="642" y="390" width="70" height="60" rx="2" fill="none" stroke="#8B7D6B" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="646" y="394" width="62" height="52" rx="1" fill="rgba(241,237,228,0.35)" stroke="none"/>

  <!-- Temple inner courts / Holy of Holies hint -->
  <rect x="662" y="402" width="28" height="36" rx="1" fill="none" stroke="#8B7D6B" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Antonia Fortress (NW corner of Temple Mount platform)
       ════════════════════════════════════════════════════════════════════ -->
  <rect x="657" y="384" width="26" height="18" rx="1" fill="rgba(241,237,228,0.5)" stroke="#8B7D6B" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- ═══════════════════════════════════════════════════════════════════════
       First Wall — original Hasmonean / Herodian circuit
       Encloses the western hill (Upper City), the Tyropoeon Valley crossing,
       and the City of David spur south of the Temple Mount.
       ════════════════════════════════════════════════════════════════════ -->
  <g fill="none" stroke="#8B7D6B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Western arc: from Citadel (639,439) south along western hill -->
    <polyline points="639,439 637,455 636,470 635,485 638,495"/>
    <!-- Southern arc: east across Tyropoeon Valley toward Temple Mount -->
    <polyline points="638,495 650,498 662,496 672,490 677,480"/>
    <!-- City of David spur: south from Temple Mount SE, then loop back -->
    <polyline points="680,440 682,455 683,470 682,485 678,495"/>
    <polyline points="678,495 672,492 668,488"/>
    <!-- Northern return: from Citadel east along northern edge of Upper City -->
    <polyline points="639,439 648,432 658,425 666,420"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Second Wall — northern extension (Hasmonean/Herodian, standing in
       Jesus' time).  Ran from the NW Temple Mount area, curved west then
       south, enclosing the commercial quarter and Golgotha area.
       ════════════════════════════════════════════════════════════════════ -->
  <g fill="none" stroke="#A89680" stroke-width="1.8" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="666,420 664,408 658,395 648,388 638,386 630,392 626,402 626,412"/>
    <polyline points="626,412 628,422 633,430 639,439"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Golgotha marker — small cross-hatch at the traditional site
       (Church of the Holy Sepulchre, projected at 648,416).
       ════════════════════════════════════════════════════════════════════ -->
  <g fill="none" stroke="#8B7D6B" stroke-width="1.5" stroke-linecap="round">
    <line x1="643" y1="416" x2="653" y2="416"/>
    <line x1="648" y1="411" x2="648" y2="421"/>
  </g>
  <circle cx="648" cy="416" r="5" fill="none" stroke="#8B7D6B" stroke-width="0.8"/>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Herod's Palace marker (at or near the Citadel / Jaffa Gate area,
       projected at 639,439).
       ════════════════════════════════════════════════════════════════════ -->
  <rect x="633" y="433" width="12" height="12" rx="1" fill="none" stroke="#8B7D6B" stroke-width="1.5" stroke-linejoin="round"/>
  <rect x="635" y="435" width="8" height="8" rx="1" fill="rgba(241,237,228,0.4)" stroke="none"/>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Kidron Valley (east of Temple Mount and City of David)
       Runs N–S between the Temple Mount and the Mount of Olives,
       continuing southward toward the Dead Sea.
       ════════════════════════════════════════════════════════════════════ -->
  <polyline points="690,340 692,370 693,400 693,430 692,460 691,490 690,520 689,550 687,580 685,620" fill="none" stroke="#7A8B6D" stroke-width="1.5" stroke-dasharray="6,3" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Hinnom Valley (south of the western hill and City of David)
       Begins west of the city, runs east then south to meet the Kidron.
       ════════════════════════════════════════════════════════════════════ -->
  <polyline points="590,480 605,488 620,493 635,496 650,497 665,496 678,494 690,492" fill="none" stroke="#7A8B6D" stroke-width="1.5" stroke-dasharray="6,3" stroke-linecap="round"/>
  <!-- Southern continuation where Hinnom meets Kidron -->
  <polyline points="690,492 688,510 685,530 682,550 678,570" fill="none" stroke="#7A8B6D" stroke-width="1.5" stroke-dasharray="6,3" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Mount of Olives ridgeline (east of the Kidron Valley)
       ════════════════════════════════════════════════════════════════════ -->
  <g fill="none" stroke="#C4B5A3" stroke-width="0.8" stroke-dasharray="2,4" stroke-linecap="round">
    <polyline points="710,360 715,380 718,400 720,420 718,440 715,460 710,480 705,500"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Western hill ridgeline (Upper City spine)
       ════════════════════════════════════════════════════════════════════ -->
  <g fill="none" stroke="#C4B5A3" stroke-width="0.8" stroke-dasharray="2,4" stroke-linecap="round">
    <polyline points="640,420 638,440 636,460 635,480 636,500"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Ancient road approaches (stylized, anchored to projected directions)
       ════════════════════════════════════════════════════════════════════ -->
  <g fill="none" stroke="#A89680" stroke-width="1" stroke-dasharray="4,4" stroke-linecap="round">
    <!-- From the north (Samaria / Galilee road, entering via Damascus Gate area) -->
    <polyline points="660,300 662,330 664,360 665,380"/>
    <!-- From the east — Bethany / Jericho road, crossing the Kidron -->
    <polyline points="740,410 720,408 705,406 695,405"/>
    <!-- From the south — Bethlehem / Hebron road -->
    <polyline points="670,650 670,610 672,570 674,530 676,500"/>
    <!-- From the west — Jaffa / Emmaus road -->
    <polyline points="560,450 580,448 600,446 620,444 635,443"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Attribution line — rendered by the SVG builder per map config.
       (Topography: OpenBible.info CC BY 4.0 · Plan after Britannica 1911)
       ════════════════════════════════════════════════════════════════════ -->

</g>
<text x="677" y="375" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="normal" font-weight="bold" letter-spacing="0.15em" fill="#7A6B5D">TEMPLE MOUNT</text>
<text x="636" y="460" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="normal" font-weight="bold" letter-spacing="0.15em" fill="#7A6B5D">UPPER CITY</text>
<text x="675" y="505" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="normal" font-weight="bold" letter-spacing="0.15em" fill="#7A6B5D">LOWER CITY</text>
<text x="682" y="515" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="normal" font-weight="bold" letter-spacing="0.15em" fill="#7A6B5D">CITY OF DAVID</text>
<text x="725" y="480" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" font-weight="normal" letter-spacing="0.1em" fill="#7A8B6D" transform="rotate(12, 725, 480)">KIDRON VALLEY</text>
<text x="610" y="500" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" font-weight="normal" letter-spacing="0.1em" fill="#7A8B6D" transform="rotate(-10, 610, 500)">HINNOM VALLEY</text>
<text x="730" y="365" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" font-weight="normal" letter-spacing="0.1em" fill="#8B7A6D">MOUNT OF OLIVES</text>
<rect x="12" y="12" width="976" height="976" fill="none" stroke="#5C4E3D" stroke-width="2"/>
<rect x="16" y="16" width="968" height="968" fill="none" stroke="#5C4E3D" stroke-width="0.8"/>
<rect x="310" y="930" width="380" height="50" rx="4" fill="rgba(248,245,240,0.92)" stroke="#8B7D6B" stroke-width="1"/><text x="500" y="952" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="bold" fill="#5C4E3D">Jerusalem</text><text x="500" y="970" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="9" font-style="italic" fill="#B8A68E">in the time of Jesus · c. AD 30</text>
<text x="500" y="986" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="7" font-style="italic" fill="#B8A68E">Topography: OpenBible.info (CC BY 4.0) · Plan after Britannica 1911</text>
<circle cx="945" cy="55" r="30" fill="#F1EDE4" stroke="#8B7D6B" stroke-width="1"/><polygon points="945,29 940,55 950,55" fill="#8B7D6B"/><polygon points="945,81 940,55 950,55" fill="#B8A68E"/><text x="945" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="8" font-weight="bold" fill="#8B7D6B">N</text>
</svg>