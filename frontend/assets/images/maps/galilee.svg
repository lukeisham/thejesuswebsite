<!-- Hand-drawn overlay: galilee
  Features with no modern Natural Earth dataset:
  - Ancient roads (Via Maris segment, Capernaum corridor)
  - Lake Huleh historical extent (drained 1950s; may be absent from Natural Earth)
  - Upper/Lower Galilee regional boundary
  All coordinates are in the viewBox space (900×1000).
-->
<g id="overlay-galilee" fill="none" stroke="#A89680" stroke-width="1.5" stroke-dasharray="6,4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Via Maris (coastal segment) -->
  <polyline points="260,200 180,300 200,400 250,500 300,580"/>
  <!-- Road from coast inland to Capernaum area -->
  <polyline points="250,500 340,480 420,450 500,430 580,420"/>
  <!-- Road: Nazareth → Sea of Galilee -->
  <polyline points="380,350 420,380 460,410 500,430"/>
</g>
<!-- Lake Huleh historical extent (hand-drawn ellipse) -->
<g fill="#C9D4D8" fill-opacity="0.6" stroke="#9FB0B6" stroke-width="0.8">
  <ellipse cx="580" cy="170" rx="35" ry="18"/>
</g>
<!-- Upper / Lower Galilee boundary -->
<g fill="none" stroke="#C4B5A3" stroke-width="0.8" stroke-dasharray="2,4" stroke-linecap="round">
  <polyline points="205,280 200,280 280,290 360,300 440,300 520,280 600,260 680,240"/>
</g>
