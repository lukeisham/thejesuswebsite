<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Jerusalem — The Jesus Website</title>
        <meta
            name="description"
            content="Interactive map of Jerusalem showing detailed locations from the Gospels and early Christian history."
        />

        <link
            rel="icon"
            href="/assets/images/favicon.png"
            type="image/png"
        />
        <link rel="icon" href="/favicon.ico" sizes="32x32" />
        <link
            rel="apple-touch-icon"
            href="/assets/images/apple-touch-icon.png"
        />
        <link rel="manifest" href="/assets/images/site.webmanifest" />

        <link rel="stylesheet" href="/assets/css/base/variables.css" />
        <link rel="stylesheet" href="/assets/css/base/reset.css" />
        <link rel="stylesheet" href="/assets/css/base/typography.css" />
        <link rel="stylesheet" href="/assets/css/base/invisible-header.css" />
        <link rel="stylesheet" href="/assets/css/base/animations.css" />
        <link rel="stylesheet" href="/assets/css/layout/grid.css" />
        <link rel="stylesheet" href="/assets/css/layout/navigation.css" />
        <link rel="stylesheet" href="/assets/css/layout/footer.css" />
        <link rel="stylesheet" href="/assets/css/components/sidebar.css" />
        <link rel="stylesheet" href="/assets/css/components/icons.css" />
        <link rel="stylesheet" href="/assets/css/components/cookie-consent.css" />
        <link rel="stylesheet" href="/assets/css/components/buttons.css" />
        <link rel="stylesheet" href="/assets/css/components/breadcrumbs.css" />
        <link rel="stylesheet" href="/assets/css/components/loading.css" />
        <link rel="stylesheet" href="/assets/css/components/empty-states.css" />
        <link rel="stylesheet" href="/assets/css/components/toasts.css" />
        <link rel="stylesheet" href="/assets/css/pages/maps.css" />

        <link
            rel="preload"
            as="image"
            href="/assets/images/feather-sprite.svg"
            fetchpriority="high"
        />
    </head>
    <body data-map-key="jerusalem">
        <header class="sr-only">
            <a class="skip-link" href="#main-content">Skip to content</a>
            <h1 id="page-h1">Map — Jerusalem</h1>
        </header>

        <div class="sidebar-backdrop" hidden></div>
        <button
            class="sidebar__toggle"
            id="sidebar-toggle"
            aria-expanded="true"
            aria-label="Toggle navigation"
        >
            <svg width="20" height="20" aria-hidden="true">
                <use href="/assets/images/feather-sprite.svg#icon-menu" />
            </svg>
        </button>
        <nav class="sidebar" id="sidebar" aria-label="Site navigation">
            <ul class="sidebar__nav">
                <li class="nav-item"><a href="/">The Jesus Website</a></li>
                <li class="nav-item"><a href="/evidence/">Evidence</a></li>
                <li class="nav-item">
                    <a href="/evidence/search.html">Search</a>
                </li>
                <li class="nav-item">
                    <a href="/evidence/arbor.html">Arbor Diagram</a>
                </li>
                <li class="nav-item">
                    <a href="/evidence/timeline/">Timeline</a>
                </li>
                <li class="nav-item"><a href="/evidence/maps/">Maps</a></li>
                <li class="nav-item">
                    <a href="/contextual-essays/">Context</a>
                </li>
                <li class="nav-item"><a href="/debate/">Debate</a></li>
                <li class="nav-item"><a href="/news-and-blog/">News</a></li>
                <li class="nav-item"><a href="/about.html">About</a></li>
                <li class="nav-item nav-item--admin">
                    <a href="/admin/">Admin</a>
                </li>
            </ul>
        </nav>

        <main id="main-content">
            <nav
                class="breadcrumbs"
                id="breadcrumbs"
                aria-label="Breadcrumb"
            ></nav>

            <div class="maps-region-header">
                <h2 class="maps-region-title" id="map-page-title">Map</h2>
            </div>

            <nav
                class="maps-region-nav"
                id="region-nav"
                aria-label="Map regions"
            ></nav>

            <div class="loading" id="loading-state">
                <svg
                    class="loading__spinner"
                    width="24"
                    height="24"
                    aria-hidden="true"
                >
                    <use href="/assets/images/feather-sprite.svg#icon-loader" />
                </svg>
                <span class="loading__text">Loading map…</span>
            </div>

            <div class="empty-state" id="empty-state" hidden>
                <p class="empty-state__message">Map not found.</p>
                <a href="/evidence/maps/" class="btn btn--secondary"
                    >Back to Maps</a
                >
            </div>

            <div class="map-canvas" id="map-container" hidden>
                <div
                    class="map-controls"
                    id="map-controls"
                    role="toolbar"
                    aria-label="Zoom controls"
                >
                    <button
                        class="btn btn--secondary"
                        id="zoom-out"
                        aria-label="Zoom out"
                    >
                        <svg width="20" height="20" aria-hidden="true">
                            <use
                                href="/assets/images/feather-sprite.svg#icon-zoom-out"
                            />
                        </svg>
                    </button>
                    <button
                        class="btn btn--secondary"
                        id="zoom-reset"
                        aria-label="Reset zoom"
                    >
                        <svg width="20" height="20" aria-hidden="true">
                            <use
                                href="/assets/images/feather-sprite.svg#icon-maximize"
                            />
                        </svg>
                    </button>
                    <button
                        class="btn btn--secondary"
                        id="zoom-in"
                        aria-label="Zoom in"
                    >
                        <svg width="20" height="20" aria-hidden="true">
                            <use
                                href="/assets/images/feather-sprite.svg#icon-zoom-in"
                            />
                        </svg>
                    </button>
                </div>

                <div class="map-viewport" id="map-viewport">
                    <img class="map-image" id="map-image" src="" alt="" />
                    <div class="map-pins-layer" id="map-pins"></div>
                </div>
            </div>

            <div
                class="map-tooltip"
                id="map-tooltip"
                hidden
                role="tooltip"
            ></div>
        </main>

        <footer>
            <div class="footer__left">
                <img
                    src="/assets/images/favicon-64.png"
                    alt=""
                    width="20"
                    height="20"
                />
                <p>
                    &copy; <span id="footer-year"></span> The Jesus Website. <a href="https://creativecommons.org/licenses/by-nc/4.0/">CC BY-NC</a>.
                </p>
            </div>
            <div class="footer__right">
                <button
                    class="btn btn--ghost"
                    data-action="print"
                    aria-label="Print page"
                >
                    <svg width="16" height="16" aria-hidden="true">
                        <use
                            href="/assets/images/feather-sprite.svg#icon-printer"
                        />
                    </svg>
                    Print
                </button>
                <button
                    class="btn btn--ghost"
                    data-action="copy-contents"
                    aria-label="Copy page contents"
                >
                    <svg width="16" height="16" aria-hidden="true">
                        <use
                            href="/assets/images/feather-sprite.svg#icon-copy"
                        />
                    </svg>
                    Copy Contents
                </button>
                <button
                    class="btn btn--ghost"
                    data-action="copy-url"
                    aria-label="Copy page URL"
                >
                    <svg width="16" height="16" aria-hidden="true">
                        <use
                            href="/assets/images/feather-sprite.svg#icon-link"
                        />
                    </svg>
                    Copy URL
                </button>
            </div>
        </footer>

        <script type="module">
            import { initFromDataAttributes } from "/assets/js/maps/maps-render.js";
            initFromDataAttributes();
        </script>
        <script type="module" src="/assets/js/main.js" defer></script>
    </body>
</html>
