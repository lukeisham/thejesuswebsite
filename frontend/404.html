<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Page Not Found — The Jesus Website</title>
        <meta
            name="description"
            content="The page you were looking for could not be found."
        />
        <meta name="robots" content="index, follow" />

        <!-- Open Graph / Twitter Card -->
        <meta property="og:title" content="Page Not Found — The Jesus Website" />
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="The Jesus Website" />

        <link
            rel="icon"
            href="/assets/images/favicon.png"
            type="image/png"
        />
        <link rel="icon" href="/favicon.ico" sizes="32x32" />
        <link
            rel="apple-touch-icon"
            href="/assets/images/apple-touch-icon.png"
        />
        <link rel="manifest" href="/assets/images/site.webmanifest" />

        <!-- CSS (HTML-4: CSS in <head>) -->
        <link rel="stylesheet" href="/assets/css/base/variables.css" />
        <link rel="stylesheet" href="/assets/css/base/reset.css" />
        <link rel="stylesheet" href="/assets/css/base/typography.css" />
        <link rel="stylesheet" href="/assets/css/base/invisible-header.css" />
        <link rel="stylesheet" href="/assets/css/base/print.css" />
        <link rel="stylesheet" href="/assets/css/base/animations.css" />
        <link rel="stylesheet" href="/assets/css/layout/grid.css" />
        <link rel="stylesheet" href="/assets/css/components/buttons.css" />
        <link rel="stylesheet" href="/assets/css/components/empty-states.css" />

        <style>
            /* 404-specific: centred heading using design tokens (CSS-2) */
            .not-found__heading {
                font-family: var(--font-heading);
                font-size: var(--text-h2);
                color: var(--text-primary);
                margin-bottom: var(--space-md);
            }
        </style>
    </head>
    <body>
        <header class="sr-only">
            <a class="skip-link" href="#main-content">Skip to content</a>
            <h1>Page Not Found — The Jesus Website</h1>
        </header>

        <main id="main-content">
            <div class="empty-state" style="min-height: 60vh">
                <h2 class="not-found__heading">404 — Page Not Found</h2>
                <p class="empty-state__message">
                    The page you were looking for doesn&rsquo;t exist or has
                    moved.
                </p>
                <div class="empty-state__actions">
                    <a href="/" class="btn btn--primary">Home</a>
                    <a href="/evidence/" class="btn btn--secondary"
                        >Browse Evidence</a
                    >
                </div>
            </div>
        </main>
        <script type="module" src="/assets/js/utils/site-meta.js" defer></script>
    </body>
</html>
