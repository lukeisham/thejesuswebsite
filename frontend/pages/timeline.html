<!doctype html>
<html lang="en">
    <!-- =============================================================================
     THE JESUS WEBSITE — INTERACTIVE TIMELINE
     File:    frontend/pages/timeline.html
     Version: 1.1.0
     Purpose: Interactive chronological visualization of historical events.
     Source:  guide_timeline.md, guide_appearance.md, vibe_coding_rules.md §2
============================================================================= -->

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <base href="/frontend/pages/" />

        <title>Interactive Timeline | The Jesus Website</title>

        <!-- Stylesheets -->
        <link rel="stylesheet" href="../../css/1.0_foundation/typography.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/grid.css" />
        <link
            rel="stylesheet"
            href="../../css/1.0_foundation/frontend/buttons.css"
        />
        <link
            rel="stylesheet"
            href="../../css/1.0_foundation/frontend/forms.css"
        />
        <link
            rel="stylesheet"
            href="../../css/3.0_visualizations/frontend/timeline.css"
        />

        <!-- UI Logic Components -->
        <script src="../../js/1.0_foundation/frontend/header.js"></script>
        <script src="../../js/1.0_foundation/frontend/search_header.js"></script>
        <script src="../../js/1.0_foundation/frontend/sidebar.js"></script>
        <script src="../../js/1.0_foundation/frontend/footer.js"></script>

        <!-- Core DB access -->
        <script src="../../js/2.0_records/frontend/sql-wasm.js"></script>
        <script src="../../js/2.0_records/frontend/setup_db.js"></script>

        <!-- Component Logic -->
        <script src="../../js/3.0_visualizations/frontend/timeline_display.js"></script>

        <!-- Central Initializer -->
        <script src="../../js/1.0_foundation/frontend/initializer.js"></script>
    </head>

    <body
        data-page-title="Interactive Timeline"
        data-ai-subject="Jesus of Nazareth — timeline, chronology"
        data-page-description="Explore the chronological intersection of biblical events, secular history, and manuscript transmission."
        data-sidebar-active-nav="timeline"
        data-search-header-active-nav="timeline"
        data-footer-target="page-shell"
    >
        <!-- Main Page Shell Container -->
        <div class="page-shell" id="page-shell">
            <!-- Invisible Metadata Anchor -->
            <header id="invisible-header" aria-hidden="true"></header>

            <!-- Main Content Column -->
            <main class="site-main" id="site-main" role="main">
                <div class="content-wrap grid-single">
                    <header class="timeline-header">
                        <h1 class="record-title">Timeline</h1>
                        <p class="record-primary-verse">
                            Explore historical evidence of Jesus in a
                            chronological arrangement.
                        </p>
                    </header>

                    <div
                        class="timeline-interface-container"
                        id="timeline-interface"
                    >
                        <!-- Main Canvas Area -->
                        <div
                            class="timeline-canvas-wrapper"
                            id="timeline-canvas-wrapper"
                        >
                            <!-- Huge SVG rendering area, timeline horizontally scrollable/draggable -->
                            <svg
                                id="interactive-timeline"
                                class="timeline-svg-canvas"
                                viewBox="0 0 2000 600"
                            >
                                <!-- Background & Grid -->
                                <g id="grid-layer">
                                    <rect
                                        width="2000"
                                        height="600"
                                        fill="var(--color-bg-primary)"
                                    />
                                    <!-- Center Axis (Main Timeline pulse) -->
                                    <line
                                        x1="0"
                                        y1="300"
                                        x2="2000"
                                        y2="300"
                                        class="timeline-axis-line"
                                        stroke-dasharray="10, 4"
                                    />
                                </g>

                                <!-- Static axis markers or milestones -->
                                <g id="axis-markers-layer"></g>

                                <!-- Vertical Links (Synoptic links etc) -->
                                <g id="link-layer"></g>

                                <!-- Node Points (Events, Secular, Prophecy) -->
                                <g id="node-layer"></g>
                            </svg>
                        </div>

                        <!-- Interactive Controls -->
                        <div class="timeline-controls">
                            <div class="timeline-actions">
                                <button
                                    id="zoom-in"
                                    class="btn-primary"
                                    aria-label="Zoom In"
                                >
                                    Zoom In
                                </button>
                                <button
                                    id="zoom-out"
                                    class="btn-primary"
                                    aria-label="Zoom Out"
                                >
                                    Zoom Out
                                </button>
                            </div>

                            <div class="timeline-era-navigation">
                                <button
                                    id="prev-era"
                                    class="btn-primary"
                                    aria-label="Previous Era"
                                >
                                    &laquo; Prev Era
                                </button>
                                <span id="current-era-display"
                                    >Galilee Ministry</span
                                >
                                <button
                                    id="next-era"
                                    class="btn-primary"
                                    aria-label="Next Era"
                                >
                                    Next Era &raquo;
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Metadata panel (sidebar content from timeline clicks) -->
                    <aside
                        class="timeline-metadata-panel is-hidden"
                        id="timeline-metadata-panel"
                    >
                        <h2 id="metadata-title">Event Title</h2>
                        <p id="metadata-date">Year / Era / Date:</p>
                        <p id="metadata-category">Category:</p>
                        <p
                            id="metadata-verse"
                            class="timeline-metadata-verse"
                        ></p>
                        <div
                            id="metadata-snippet"
                            class="timeline-metadata-snippet"
                        >
                            Event details go here...
                        </div>
                        <a
                            href="#"
                            id="metadata-link"
                            class="timeline-metadata-link"
                            >View Full Record &rarr;</a
                        >
                    </aside>
                </div>
            </main>
        </div>
    </body>
</html>
