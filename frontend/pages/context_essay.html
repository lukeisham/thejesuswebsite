<!doctype html>
<html lang="en">
    <!-- =============================================================================

     THE JESUS WEBSITE — CONTEXT ESSAY
     File:    frontend/pages/context_essay.html
     Version: 1.1.0
     Purpose: Long-form premium typography layout for context essays.
     Source:  guide_appearance.md §5.1, vibe_coding_rules.md §2

============================================================================= -->

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <base href="/frontend/pages/" />

        <title>Context Essays | The Jesus Website</title>

        <!-- Stylesheets -->
        <link
            rel="stylesheet"
            href="../../css/1.0_foundation/typography.css"
        />
        <link rel="stylesheet" href="../../css/1.0_foundation/grid.css" />
        <link
            rel="stylesheet"
            href="../../css/5.0_essays_responses/frontend/essays.css"
        />
        <link rel="stylesheet" href="../../css/1.0_foundation/pictures.css" />

        <!-- UI Logic Components -->
        <script src="../../js/1.0_foundation/frontend/header.js"></script>
        <script src="../../js/1.0_foundation/frontend/search_header.js"></script>
        <script src="../../js/1.0_foundation/frontend/sidebar.js"></script>
        <script src="../../js/1.0_foundation/frontend/footer.js"></script>
        <script src="../../js/2.0_records/frontend/pictures_display.js"></script>
        <script src="../../js/5.0_essays_responses/frontend/mla_snippet_display.js"></script>
        <script src="../../js/5.0_essays_responses/frontend/sources_biblio_display.js"></script>

        <!-- Display Logic -->
        <script src="../../js/5.0_essays_responses/frontend/view_context_essays.js"></script>

        <!-- Central Initializer -->
        <script src="../../js/1.0_foundation/frontend/initializer.js"></script>
    </head>

    <body
        data-page-title="Context Essay"
        data-page-description="Thematic context regarding the historical world of Jesus."
        data-page-canonical="/context/essay"
        data-sidebar-active-nav="context"
        data-search-header-active-nav="context"
        data-footer-target="page-shell"
    >
        <!-- Main Page Shell Container -->
        <div class="page-shell" id="page-shell">
            <!-- Invisible Metadata Anchor -->
            <header id="invisible-header" aria-hidden="true"></header>

            <!-- Main Content Column -->
            <main class="site-main" id="site-main" role="main">
                <div class="layout-two-col">
                    <!-- Left internal sidebar (Table of Contents) -->
                    <aside class="essay-toc-aside">
                        <h3 class="text-sm font-semibold mb-2">
                            Table of Contents
                        </h3>
                        <ul id="essay-toc" class="essay-toc-list">
                            <!-- Injected by JS -->
                        </ul>
                    </aside>

                    <!-- Right Essay Content Area -->
                    <div class="essay-content-main">
                        <article
                            class="essay-container"
                            id="context-essay-container"
                        >
                            <!-- Injected by view_context_essays.js -->
                        </article>
                    </div>
                </div>
            </main>
        </div>
    </body>
</html>
