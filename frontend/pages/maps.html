<!doctype html>
<html lang="en">
    <!-- =============================================================================
     THE JESUS WEBSITE — INTERACTIVE MAPS
     File:    frontend/pages/maps.html
     Version: 1.1.0
     Purpose: Interactive geospatial visualization.
     Source:  guide_maps.md, guide_appearance.md, vibe_coding_rules.md §2
============================================================================= -->

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <base href="/frontend/pages/" />

        <title>Interactive Maps | The Jesus Website</title>

        <!-- Stylesheets -->
        <link rel="stylesheet" href="../../css/1.0_foundation/typography.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/grid.css" />
        <link
            rel="stylesheet"
            href="../../css/1.0_foundation/frontend/buttons.css"
        />
        <link
            rel="stylesheet"
            href="../../css/1.0_foundation/frontend/forms.css"
        />
        <link
            rel="stylesheet"
            href="../../css/3.0_visualizations/frontend/maps.css"
        />

        <!-- UI Logic Components -->
        <script src="../../js/1.0_foundation/frontend/header.js"></script>
        <script src="../../js/1.0_foundation/frontend/search_header.js"></script>
        <script src="../../js/1.0_foundation/frontend/sidebar.js"></script>
        <script src="../../js/1.0_foundation/frontend/footer.js"></script>

        <!-- Core DB access -->
        <script src="../../js/2.0_records/frontend/sql-wasm.js"></script>
        <script src="../../js/2.0_records/frontend/setup_db.js"></script>

        <!-- Component Logic -->
        <script src="../../js/3.0_visualizations/frontend/maps_display.js"></script>

        <!-- Central Initializer -->
        <script src="../../js/1.0_foundation/frontend/initializer.js"></script>
    </head>

    <body
        data-page-title="Interactive Maps"
        data-page-description="Explore the geography of historical events and records across the narrative landscape."
        data-sidebar-active-nav="maps"
        data-search-header-active-nav="maps"
        data-footer-target="page-shell"
    >
        <!-- Main Page Shell Container -->
        <div class="page-shell" id="page-shell">
            <!-- Invisible Metadata Anchor -->
            <header id="invisible-header" aria-hidden="true"></header>

            <!-- Main Content Column -->
            <main class="site-main" id="site-main" role="main">
                <div class="content-wrap grid-single">
                    <header class="map-header">
                        <h1 class="record-title">Maps</h1>
                        <p class="record-primary-verse">
                            Explore the geography of the evidence for Jesus.
                        </p>
                    </header>

                    <div class="map-interface-container" id="map-interface">
                        <!-- Main Canvas Area -->
                        <div class="map-canvas-wrapper" id="map-canvas-wrapper">
                            <!-- Target for map_*.html injections or dynamic rendering -->
                            <svg
                                id="interactive-map"
                                viewBox="0 0 1000 800"
                                class="map-svg-canvas"
                            >
                                <!-- Layer 1: Base -->
                                <g id="base-layer">
                                    <rect
                                        width="1000"
                                        height="800"
                                        fill="var(--color-bg-primary)"
                                    />
                                    <path
                                        d="M50,100 Q 150,200 100,500 T 200,800"
                                        stroke="var(--color-border)"
                                        stroke-width="40"
                                        fill="none"
                                        opacity="0.3"
                                    />
                                    <path
                                        d="M20,20 L980,20 L980,780 L20,780 Z"
                                        stroke="var(--color-text-secondary)"
                                        stroke-width="1"
                                        stroke-dasharray="4, 3"
                                        fill="none"
                                    />
                                </g>
                                <!-- Layer 2: Foundation (Labels) -->
                                <g id="foundation-layer">
                                    <text
                                        x="500"
                                        y="400"
                                        font-family="var(--font-heading)"
                                        font-size="24"
                                        fill="var(--color-bg-tertiary)"
                                        text-anchor="middle"
                                        letter-spacing="4"
                                    >
                                        JUDEA
                                    </text>
                                </g>
                                <!-- Layer 3: Nodes -->
                                <g id="node-layer"></g>
                            </svg>
                        </div>

                        <!-- Interactive Controls & Overlay -->
                        <div class="map-controls">
                            <div class="map-views">
                                <label
                                    ><input
                                        type="radio"
                                        name="map_view"
                                        value="empire"
                                    />
                                    Empire</label
                                >
                                <label
                                    ><input
                                        type="radio"
                                        name="map_view"
                                        value="levant"
                                    />
                                    Levant</label
                                >
                                <label
                                    ><input
                                        type="radio"
                                        name="map_view"
                                        value="judea"
                                        checked
                                    />
                                    Judea</label
                                >
                                <label
                                    ><input
                                        type="radio"
                                        name="map_view"
                                        value="galilee"
                                    />
                                    Galilee</label
                                >
                                <label
                                    ><input
                                        type="radio"
                                        name="map_view"
                                        value="jerusalem"
                                    />
                                    Jerusalem</label
                                >
                            </div>
                            <div class="map-actions">
                                <button
                                    id="zoom-in"
                                    class="btn-primary"
                                    aria-label="Zoom In"
                                >
                                    +
                                </button>
                                <button
                                    id="zoom-out"
                                    class="btn-primary"
                                    aria-label="Zoom Out"
                                >
                                    -
                                </button>
                                <button
                                    id="toggle-layers"
                                    class="btn-primary"
                                    aria-label="Toggle Layers"
                                >
                                    Layers
                                </button>
                            </div>
                            <div class="map-era-slider">
                                <label for="era-filter">Temporal Slider:</label>
                                <input
                                    type="range"
                                    id="era-filter"
                                    min="-100"
                                    max="100"
                                    value="30"
                                />
                                <span id="era-display" class="map-era-display"
                                    >30 AD</span
                                >
                            </div>
                        </div>
                    </div>

                    <!-- Metadata panel (sidebar content from map clicks) -->
                    <aside
                        class="map-metadata-panel is-hidden"
                        id="map-metadata-panel"
                    >
                        <h2 id="metadata-title">Record Title</h2>
                        <p id="metadata-date">Date:</p>
                        <p id="metadata-category">Category:</p>
                        <p id="metadata-verse" class="map-metadata-verse"></p>
                        <p id="metadata-snippet">Snippets go here...</p>
                        <a href="#" id="metadata-link" class="map-metadata-link"
                            >View Full Record &rarr;</a
                        >
                    </aside>
                </div>
            </main>
        </div>
    </body>
</html>
