<!doctype html>
<html lang="en">
    <!-- =============================================================================

     THE JESUS WEBSITE — BLOG POST
     File:    frontend/pages/blog_post.html
     Version: 1.0.0
     Purpose: Individual blog post page with long-form reading layout.
              Receives ?id= query param to identify the post.
     Source:  guide_appearance.md §5.3, url_slug_restructure.md

============================================================================= -->

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <base href="/frontend/pages/" />

        <title>Blog Post | The Jesus Website</title>

        <!-- Stylesheets -->
        <link
            rel="stylesheet"
            href="../../css/1.0_foundation/typography.css"
        />
        <link rel="stylesheet" href="../../css/1.0_foundation/grid.css" />
        <link
            rel="stylesheet"
            href="../../css/5.0_essays_responses/frontend/essays.css"
        />
        <link rel="stylesheet" href="../../css/1.0_foundation/pictures.css" />

        <!-- UI Logic Components -->
        <script src="../../js/1.0_foundation/frontend/header.js"></script>
        <script src="../../js/1.0_foundation/frontend/search_header.js"></script>
        <script src="../../js/1.0_foundation/frontend/sidebar.js"></script>
        <script src="../../js/1.0_foundation/frontend/footer.js"></script>

        <!-- Display Logic -->
        <script src="../../js/6.0_news_blog/frontend/list_blogpost.js"></script>

        <!-- Central Initializer -->
        <script src="../../js/1.0_foundation/frontend/initializer.js"></script>
    </head>

    <body
        data-page-title="Blog Post"
        data-page-description="An article from The Jesus Website blog."
        data-page-canonical="/blog/post"
        data-sidebar-active-nav="news"
        data-search-header-active-nav="news"
        data-footer-target="page-shell"
    >
        <!-- Main Page Shell Container -->
        <div class="page-shell" id="page-shell">
            <!-- Invisible Metadata Anchor -->
            <header id="invisible-header" aria-hidden="true"></header>

            <!-- Main Content Column -->
            <main class="site-main" id="site-main" role="main">
                <div class="layout-two-col">
                    <!-- Right Blog Post Content Area -->
                    <div class="essay-content-main">
                        <article
                            class="essay-container"
                            id="blog-post-container"
                        >
                            <!-- Injected by display logic when ?id= is present -->
                            <p class="text-sm text-muted">
                                Loading blog post...
                            </p>
                        </article>
                    </div>
                </div>
            </main>
        </div>
    </body>
</html>
