<!doctype html>
<html lang="en">
    <!-- =============================================================================

     THE JESUS WEBSITE — RECORD DEEP-DIVE
     File:    frontend/pages/record.html
     Version: 1.1.0
     Purpose: Displays a single database record in high detail.
     Source:  guide_appearance.md §2.2, vibe_coding_rules.md §2

============================================================================= -->

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <base href="/frontend/pages/" />

        <title>Loading Record... | The Jesus Website</title>

        <!-- Stylesheets -->
        <link rel="stylesheet" href="../../css/1.0_foundation/typography.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/grid.css" />
        <link rel="stylesheet" href="../../css/1.0_foundation/pictures.css" />
        <link
            rel="stylesheet"
            href="../../css/2.0_records/frontend/detail_view.css"
        />

        <!-- UI Logic Components -->
        <script src="../../js/1.0_foundation/frontend/header.js"></script>
        <script src="../../js/1.0_foundation/frontend/search_header.js"></script>
        <script src="../../js/1.0_foundation/frontend/sidebar.js"></script>
        <script src="../../js/1.0_foundation/frontend/footer.js"></script>

        <!-- Components specific to Record View -->
        <script src="../../js/5.0_essays_responses/frontend/sources_biblio_display.js"></script>
        <script src="../../js/2.0_records/frontend/pictures_display.js"></script>

        <!-- Core DB access -->
        <script src="../../js/2.0_records/frontend/sql-wasm.js"></script>
        <script src="../../js/2.0_records/frontend/setup_db.js"></script>

        <!-- Query sanitizer (must load before single_view.js) -->
        <script src="../../js/2.0_records/frontend/sanitize_query.js"></script>

        <!-- Renders the data -->
        <script src="../../js/2.0_records/frontend/single_view.js"></script>

        <!-- Central Initializer -->
        <script src="../../js/1.0_foundation/frontend/initializer.js"></script>
    </head>
    <body
        data-page-title="Loading Record..."
        data-sidebar-active-nav="records"
        data-search-header-active-nav="records"
        data-footer-target="page-shell"
    >
        <!-- Main Page Shell Container -->
        <div class="page-shell" id="page-shell">
            <!-- Invisible Metadata Anchor -->
            <header id="invisible-header" aria-hidden="true"></header>

            <!-- Main Content Column -->
            <main class="site-main" id="site-main" role="main">
                <div class="content-wrap grid-single">
                    <!-- Back Link -->
                    <a
                        href="javascript:history.back()"
                        class="record-back-link"
                        id="record-back-link"
                        aria-label="Go back to previous page"
                    >
                        ← Back
                    </a>

                    <!-- Container to be populated by single_view.js -->
                    <article id="record-container" aria-live="polite">
                        <!-- Target element placeholders -->

                        <header class="record-header">
                            <h1 class="record-title" id="record-title">
                                Loading...
                            </h1>
                            <p
                                class="record-primary-verse"
                                id="record-primary-verse"
                            ></p>
                        </header>

                        <figure
                            class="record-picture-container is-hidden"
                            id="record-picture-container"
                        >
                            <!-- Managed by pictures_display.js -->
                        </figure>

                        <div
                            class="record-description"
                            id="record-description"
                        ></div>

                        <section
                            class="record-section is-hidden"
                            id="record-section-bibliography"
                        >
                            <h2 class="record-section-title">Bibliography</h2>
                            <div id="record-bibliography-content">
                                <!-- Managed by sources_biblio_display.js -->
                            </div>
                        </section>

                        <section
                            class="record-section is-hidden"
                            id="record-section-context"
                        >
                            <h2 class="record-section-title">Context Links</h2>
                            <ul
                                class="record-context-list"
                                id="record-context-list"
                            >
                                <!-- Context internal links injected here -->
                            </ul>
                        </section>

                        <section
                            class="record-section is-hidden"
                            id="record-section-references"
                        >
                            <h2 class="record-section-title">
                                Unique Identifiers
                            </h2>
                            <ul
                                class="record-references-list"
                                id="record-references-list"
                            >
                                <!-- Unique identifiers (IAA, Pledius, Manuscript) injected here -->
                            </ul>
                        </section>

                        <section
                            class="record-section is-hidden"
                            id="record-section-metadata"
                        >
                            <h2 class="record-section-title">Other Data</h2>
                            <div
                                class="record-metadata-grid"
                                id="record-metadata-grid"
                            >
                                <!-- Metadata fields injected here (era, map, category, etc) -->
                            </div>
                        </section>
                    </article>
                </div>
            </main>
        </div>
    </body>
</html>
