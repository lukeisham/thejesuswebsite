<!doctype html>
<html lang="en">
    <!-- =============================================================================

     THE JESUS WEBSITE — External witnesses LIST VIEW
     File:    frontend/pages/resources/External witnesses.html
     Version: 1.0.0
     Purpose: Specialized list container for External witnesses.
     Source:  guide_appearance.md §2.3, §2.4, §4.1, §4.2

============================================================================= -->

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <base href="/frontend/pages/resources/" />

        <title>External witnesses | The Jesus Website</title>

        <!-- Stylesheets -->
        <link
            rel="stylesheet"
            href="../../../css/1.0_foundation/typography.css"
        />
        <link rel="stylesheet" href="../../../css/1.0_foundation/grid.css" />
        <link
            rel="stylesheet"
            href="../../../css/1.0_foundation/elements/buttons.css"
        />
        <link
            rel="stylesheet"
            href="../../../css/2.0_records/frontend/list_view.css"
        />

        <!-- SEO / Metadata API Header -->
        <script src="../../../js/1.0_foundation/frontend/header.js"></script>
    </head>
    <body>
        <!-- Main Page Shell Container -->
        <div class="page-shell" id="page-shell">
            <!-- Invisible Metadata Anchor -->
            <header id="invisible-header" aria-hidden="true"></header>

            <!-- Main Content Column -->
            <main class="site-main" id="site-main" role="main">
                <div class="content-wrap grid-single">
                    <article
                        class="list-view-container"
                        id="list-view-container"
                        aria-live="polite"
                    >
                        <header class="list-header">
                            <h1 class="list-title" id="list-title">
                                External witnesses
                            </h1>
                        </header>

                        <!-- Filter / Sort Header (if applicable) -->
                        <div
                            class="list-controls"
                            id="list-controls"
                            style="display: none"
                        >
                            <!-- JS injected controls -->
                        </div>

                        <!-- Main List Area -->
                        <div id="list-content-area">
                            <ul class="record-list" id="record-list">
                                <!-- Items injected here -->
                            </ul>
                        </div>

                        <!-- Pagination -->
                        <nav
                            class="list-pagination"
                            id="list-pagination"
                            aria-label="Pagination Navigation"
                            style="display: none"
                        >
                            <!-- Pagination buttons injected here -->
                        </nav>
                    </article>
                </div>
            </main>
        </div>

        <!-- Sidebar / Top Nav / Footer Injection -->
        <script src="../../../js/1.0_foundation/frontend/search_header.js"></script>
        <script src="../../../js/1.0_foundation/frontend/sidebar.js"></script>
        <script src="../../../js/1.0_foundation/frontend/footer.js"></script>

        <!-- Core DB access -->
        <script src="../../core/sql-wasm.js"></script>
        <script src="../../../js/2.0_records/frontend/setup_db.js"></script>

        <!-- Renders the data -->
        <script src="../../../js/2.0_records/frontend/list_view.js"></script>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                // Build Universal Layout Elements
                injectSidebar("site-main", "resources");
                injectSearchHeader("site-sidebar", "resources");
                injectFooter("page-shell");
            });
        </script>
    </body>
</html>
