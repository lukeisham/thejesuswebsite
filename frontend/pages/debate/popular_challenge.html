<!DOCTYPE html>
<html lang="en">

<!-- =============================================================================

     THE JESUS WEBSITE — POPULAR CHALLENGES RANKED LIST
     File:    frontend/pages/debate/popular_challenge.html
     Version: 1.0.0
     Purpose: Ranked listing of Popular Challenges with inserted responses.
     Source:  guide_appearance.md §4.2

============================================================================= -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Popular Challenges | The Jesus Website</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../../../css/elements/typography_colors.css">
    <link rel="stylesheet" href="../../../css/elements/grid.css">
    <link rel="stylesheet" href="../../../css/design_layouts/views/list_layout.css">
    <link rel="stylesheet" href="../../../css/elements/list_card_button.css">
    <link rel="stylesheet" href="../../../css/elements/thumbnails.css">

    <!-- SEO / Metadata API Header -->
    <script src="../../display_other/header.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            injectPageMetadata({
                title:       'Popular Challenges',
                description: 'Ranked list of common historical challenges with verified responses.',
                canonical:   window.location.origin + '/frontend/pages/debate/popular_challenge.html'
            });
        });
    </script>
</head>
<body>

    <!-- Main Page Shell Container -->
    <div class="page-shell" id="page-shell">
        
        <!-- Invisible Metadata Anchor -->
        <header id="invisible-header" aria-hidden="true"></header>
        
        <!-- Main Content Column -->
        <main class="site-main" id="site-main" role="main">
            <!-- 2-col sidebar + content layout for lists -->
            <div class="layout-two-col">
                
                <!-- Left internal sidebar (Filters) -->
                <aside class="list-filters" style="padding-right: var(--space-4); border-right: var(--border-width-thin) solid var(--color-border); margin-right: var(--space-4);">
                    <h3 class="text-sm font-semibold mb-2">Filters</h3>
                    <ul style="list-style: none; padding: 0; line-height: 2;">
                        <li><a href="#" class="text-sm text-secondary hover:text-primary">By Date</a></li>
                        <li><a href="#" class="text-sm text-secondary hover:text-primary">By Location</a></li>
                        <li><a href="#" class="text-sm text-secondary hover:text-primary">By Source</a></li>
                    </ul>
                </aside>

                <!-- Right list content area -->
                <div class="layout-two-col__content" style="padding-top: 0;">
                    <header class="mb-6">
                        <h1 class="text-2xl font-bold">Popular Challenges</h1>
                        <p class="text-sm text-muted">Addressing common historical claims with evidence-based responses.</p>
                    </header>

                    <!-- Target container for list_view_popular_challenges.js -->
                    <div id="popular-challenge-list-container"></div>
                    
                    <!-- Pagination Placeholder -->
                    <div class="pagination mt-6 text-sm" style="display: flex; gap: var(--space-2);">
                        <span>[1]</span> <span>[2]</span> <span>[3]</span>
                    </div>
                </div>

            </div>
        </main>
        
    </div>
    
    <!-- UI Components -->
    <script src="../../display_other/search_header.js"></script>
    <script src="../../display_other/sidebar.js"></script>
    <script src="../../display_other/footer.js"></script>
    <script src="../../display_other/thumbnails_display.js"></script>
    <script src="../../display_other/display_snippet.js"></script>
    
    <!-- Display Logic -->
    <script src="../../display_big/list_view_popular_challenges_with_response.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Build Universal Layout Elements
            injectSidebar('site-main', 'debate');
            injectSearchHeader('site-sidebar', 'debate');
            injectFooter('page-shell');
        });
    </script>
</body>
</html>
