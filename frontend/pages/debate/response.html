<!doctype html>
<html lang="en">
    <!-- =============================================================================

     THE JESUS WEBSITE — CHALLENGE RESPONSE
     File:    frontend/pages/debate/response.html
     Version: 1.0.0
     Purpose: Long-form premium typography layout addressing a specific historical challenge.
     Source:  guide_appearance.md §5.2

============================================================================= -->

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <base href="/frontend/pages/debate/" />

        <title>Challenge Response | The Jesus Website</title>

        <!-- Stylesheets -->
        <link
            rel="stylesheet"
            href="../../../css/1.0_foundation/typography.css"
        />
        <link rel="stylesheet" href="../../../css/1.0_foundation/grid.css" />
        <link
            rel="stylesheet"
            href="../../../css/5.0_essays_responses/frontend/responses.css"
        />
        <link rel="stylesheet" href="../../../css/1.0_foundation/pictures.css" />

        <!-- SEO / Metadata API Header -->
        <script src="../../../js/1.0_foundation/frontend/header.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                injectPageMetadata({
                    title: "Challenge Response",
                    description:
                        "Evidence-based response to a specific historical challenge or claim.",
                    canonical: window.location.origin + "/debate/response",
                });
            });
        </script>
    </head>
    <body data-ai-subject="Jesus of Nazareth — challenge response, apologetics">
        <!-- Main Page Shell Container -->
        <div class="page-shell" id="page-shell">
            <!-- Invisible Metadata Anchor -->
            <header id="invisible-header" aria-hidden="true"></header>

            <!-- Main Content Column -->
            <main class="site-main" id="site-main" role="main">
                <div class="layout-two-col">
                    <!-- Left internal sidebar (Table of Contents) -->
                    <aside
                        class="list-filters"
                        style="
                            padding-right: var(--space-4);
                            border-right: var(--border-width-thin) solid
                                var(--color-border);
                            margin-right: var(--space-4);
                        "
                    >
                        <div
                            class="mb-6 p-4 bg-secondary"
                            style="
                                border-left: 2px solid var(--color-dash-accent);
                                border-radius: var(--radius-sm);
                            "
                        >
                            <h4
                                class="text-xs font-semibold uppercase text-muted mb-1"
                            >
                                Responding To
                            </h4>
                            <p
                                id="challenge-target"
                                class="text-sm font-semibold text-primary"
                            >
                                Loading target challenge...
                            </p>
                        </div>

                        <h3 class="text-sm font-semibold mb-2">
                            Table of Contents
                        </h3>
                        <ul
                            id="essay-toc"
                            style="list-style: none; padding: 0; line-height: 2"
                        >
                            <!-- Injected by JS -->
                        </ul>
                    </aside>

                    <!-- Right Response Content Area -->
                    <div class="layout-two-col__content" style="padding-top: 0">
                        <article
                            class="essay-container"
                            id="response-container"
                        >
                            <!-- Injected by response_display.js -->
                        </article>
                    </div>
                </div>
            </main>
        </div>

        <!-- UI Components -->
        <script src="../../../js/1.0_foundation/frontend/search_header.js"></script>
        <script src="../../../js/1.0_foundation/frontend/sidebar.js"></script>
        <script src="../../../js/1.0_foundation/frontend/footer.js"></script>
        <script src="../../../js/2.0_records/frontend/pictures_display.js"></script>
        <script src="../../../js/5.0_essays_responses/frontend/mla_snippet_display.js"></script>
        <script src="../../../js/5.0_essays_responses/frontend/sources_biblio_display.js"></script>

        <!-- Display Logic -->
        <script src="../../../js/5.0_essays_responses/frontend/response_display.js"></script>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                // Build Universal Layout Elements
                injectSidebar("site-main", "debate");
                injectSearchHeader("site-sidebar", "debate");
                injectFooter("page-shell");
            });
        </script>
    </body>
</html>
