<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/frontend/pages/" />

    <title>The Jesus Website: news feed</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../../css/1.0_foundation/typography.css" />
    <link rel="stylesheet" href="../../css/1.0_foundation/grid.css" />
    <link rel="stylesheet" href="../../css/6.0_news_blog/frontend/news_blog_landing.css" />

    <!-- UI Logic Components -->
    <script src="../../js/1.0_foundation/frontend/header.js"></script>
    <script src="../../js/1.0_foundation/frontend/search_header.js"></script>
    <script src="../../js/1.0_foundation/frontend/sidebar.js"></script>
    <script src="../../js/1.0_foundation/frontend/footer.js"></script>

    <!-- Display Logic -->
    <script src="../../js/6.0_news_blog/frontend/list_newsitem.js"></script>

    <!-- Central Initializer -->
    <script src="../../js/1.0_foundation/frontend/initializer.js"></script>
</head>

<body data-page-title="News Feed" data-ai-subject="Jesus of Nazareth — news feed, current events" data-page-description="Latest news and updates from The Jesus Website archive."
    data-page-canonical="/news/feed" data-sidebar-active-nav="news" data-search-header-active-nav="news"
    data-footer-target="page-shell">
    <!-- Main Page Shell Container -->
    <div class="page-shell" id="page-shell">
        <!-- Invisible Metadata Anchor -->
        <header id="invisible-header" aria-hidden="true"></header>

        <!-- Main Content Column -->
        <main class="site-main" id="site-main" role="main">
            <div class="content-wrap">
                <header class="landing-page__header">
                    <h1 class="landing-page__heading">Latest News</h1>
                </header>

                <div id="news-feed-content">
                    <!-- Injected by list_newsitem.js -->
                    <p class="text-sm text-muted">Loading news feed...</p>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
