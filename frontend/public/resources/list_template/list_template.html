<!-- List Template — Reusable fragment for rendering a categorized list of items -->
<!-- Usage: Load this template and populate it dynamically via JavaScript -->
<template id="list-item-template">
    <li class="list-item" data-category="" data-id="">
        <div class="feed-container" style="border: 1px solid var(--border-color); margin-bottom: 0.75rem;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h3 class="list-item-title" style="margin-top: 0; font-size: 1rem;"></h3>
                    <p class="list-item-description" style="font-size: 0.85rem; color: #666; margin-bottom: 0.5rem;">
                    </p>
                    <span class="list-item-meta label" style="font-size: 0.65rem;"></span>
                </div>
                <a href="#" class="list-item-link nav-link"
                    style="font-size: 0.8rem; white-space: nowrap; margin-left: 1rem;">View →</a>
            </div>
        </div>
    </li>
</template>

<template id="list-category-header-template">
    <li class="list-category-header" style="list-style: none; margin-top: 1.5rem; margin-bottom: 0.5rem;">
        <h2 class="category-title"
            style="font-size: 1.3rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;"></h2>
    </li>
</template>
