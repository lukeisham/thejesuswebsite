services:
  # The Rust Application
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: app_brain_ui
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=http://chroma:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY} # Passed from your host shell
      - RUST_LOG=info
    depends_on:
      - chroma
    networks:
      - app-network
    restart: unless-stopped

  # Vector Database for app_storage/src/chroma.rs
  chroma:
    image: chromadb/chroma:latest
    container_name: chroma_db
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  chroma_data:
    driver: local
