services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/thejesuswebsite.org/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/thejesuswebsite.org/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    depends_on:
      - agentic_hub
    networks:
      - hub_network

  agentic_hub:
    build: .
    expose:
      - "3000" # Changed from 8080 to 3000
    env_file: .env
    restart: always
    networks:
      - hub_network

networks:
  hub_network:
    driver: bridge