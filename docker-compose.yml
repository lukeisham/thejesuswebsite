services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/thejesuswebsite.org/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/thejesuswebsite.org/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    depends_on:
      - agentic_hub
    networks:
      - hub_network

  agentic_hub:
    build:
      context: .
      dockerfile: dockerfile
    expose:
      - "3000"
    env_file: .env
    restart: always
    depends_on:
      - chroma
    networks:
      - hub_network
    volumes:
      - ./prod_data:/data

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - ./chroma_data:/chroma/chroma
    expose:
      - "8000"
    networks:
      - hub_network

networks:
  hub_network:
    driver: bridge